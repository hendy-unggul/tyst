<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>JEJAK — minimal</title>
<link rel="stylesheet" href="/shared.css">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;--sf:#141414;--sfe:#1E1E1E;--bd:#2A2A2A;--bd2:#333;--tx:#FFF;--txs:#888;--txm:#555;
  --spill:#ff3b6f;--cocomeo:#00e5ff;--jejak:#9900ff;--glitch:#FFD700;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--font-body);padding-bottom:100px}
.w{max-width:480px;margin:0 auto;padding:0 16px}
header{padding:24px 0 16px;display:flex;justify-content:space-between}
.logo{font-size:42px;font-weight:800;font-family:var(--font-display)}
.logo .diamond{color:var(--jejak);animation:spin 4s infinite}
@keyframes spin{95%{transform:rotate(180deg)}}
.tagline{font-family:'Instrument Serif',serif;font-size:13px;color:var(--txs);font-style:italic}
.huser{font-size:11px;padding:4px 8px;background:var(--sf);border:1px solid var(--bd)}
.hero{width:100%;aspect-ratio:1;background:var(--sf);border:2px solid var(--bd);margin-bottom:16px;position:relative}
.hero img{width:100%;height:100%;object-fit:cover}
.hnote{position:absolute;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top,#000,transparent);font-family:'Instrument Serif',serif;font-size:24px;font-style:italic}
.upbtn{position:absolute;top:16px;right:16px;width:48px;height:48px;background:var(--spill);border:none;color:#000;font-size:24px;cursor:pointer;box-shadow:4px 4px 0 #000}
.ri{width:100%;background:var(--sf);border:2px solid var(--bd);padding:16px;color:var(--tx);font-family:var(--font-body);font-size:16px;resize:none;min-height:120px}
.ri:focus{border-color:var(--spill)}
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0}
.mc{padding:16px;background:var(--sf);border:2px solid var(--bd);cursor:pointer}
.mc.act{border-color:var(--ms);background:var(--sfe)}
.mc.act::before{content:'✓';float:right}
.sbtn{padding:14px 32px;background:var(--spill);border:none;color:#000;cursor:pointer;box-shadow:4px 4px 0 #000;margin-bottom:32px}
.shdr{display:flex;align-items:center;gap:8px;margin:16px 0;border-bottom:2px solid var(--bd)}
.stit{font-size:12px;font-weight:800;text-transform:uppercase}
.entry{background:var(--sf);border:2px solid var(--bd);margin-bottom:16px}
.ehdr{padding:8px 16px;border-bottom:1px solid var(--bd);background:var(--sfe)}
.econt{padding:16px}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--bd);border:2px solid var(--bd);margin-bottom:16px}
.ti{aspect-ratio:1;background:var(--sf);cursor:pointer}
.ti img{width:100%;height:100%;object-fit:cover}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:2px solid var(--bd);z-index:1000}
.bnav-c{max-width:480px;margin:0 auto;display:flex;justify-content:space-around;height:64px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txm);text-decoration:none;font-size:10px}
.ni.act[href*="jejak"]{color:var(--jejak)}
.ni.act[href*="jejak"]::before{content:'';position:absolute;top:0;width:100%;height:2px;background:var(--jejak)}
.nico{font-size:20px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:8px 16px;z-index:10000;opacity:0;transition:.3s}
.toast.show{opacity:1}
.proc{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:center}
.proc.on{display:flex}
.pspin{width:48px;height:48px;border:3px solid var(--bd);border-top-color:var(--spill);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:10001;padding:16px;overflow-y:auto}
.modal.on{display:block}
.mc2{max-width:480px;margin:0 auto;background:var(--sf);border:2px solid var(--bd);padding:24px}
.ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.gi{aspect-ratio:1;background:var(--sfe);border:2px solid var(--bd);cursor:pointer}
.gi.sel{border-color:var(--spill)}
.gi.sel::after{content:'✓';position:absolute;background:var(--spill);width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.tmsl{width:100%;height:4px;background:var(--bd);margin:8px 0}
.tmlabs{display:flex;justify-content:space-between;font-size:9px;color:var(--txm)}
.noti{width:100%;background:var(--sf);border:2px solid var(--bd);padding:8px;color:var(--tx)}
.macts{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.mbtn{padding:12px 24px;border:2px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer}
.mbtn.pri{background:var(--spill);color:#000}
.fm{filter:grayscale(100%)}
.sensored-overlay{position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;color:#f00;font-size:14px}
</style>
</head>
<body>
<div class="w">
<header>
  <div><div class="logo">J<span class="diamond">◈</span>K</div><div class="tagline">minimal</div></div>
  <div class="huser" id="huser">@loading</div>
</header>

<div class="hero" id="hero">
  <img id="himg" src="https://images.unsplash.com/photo-1517842645767-c639042777db?w=400&q=80">
  <div class="hnote" id="hnote">"jeda"</div>
  <button class="upbtn" id="upbtn">+</button>
</div>

<textarea class="ri" id="ri" placeholder="Spill your truth..." maxlength="500"></textarea>
<div class="mgrid">
  <div class="mc act" data-mood="surviving">😮‍💨 Surviving</div>
  <div class="mc" data-mood="thriving">✨ Thriving</div>
  <div class="mc" data-mood="chaotic">🌀 Chaotic</div>
  <div class="mc" data-mood="doom">🛌 Doom</div>
</div>
<button class="sbtn" id="sbtn">JEJAKKAN</button>

<div class="shdr"><span class="stit">RIWAYAT</span></div>
<div id="econ"></div>

<div class="shdr"><span class="stit">MEMORI</span></div>
<div class="tgrid" id="tgrid"></div>
</div>

<nav class="bnav"><div class="bnav-c">
  <a href="/spill.html" class="ni"><span class="nico">✕</span>Spill</a>
  <a href="/jejak.html" class="ni act"><span class="nico">◈</span>Jejak</a>
  <a href="/glitch.html" class="ni"><span class="nico">‼</span>Glitch</a>
  <a href="/cocomeo.html" class="ni"><span class="nico">〜</span>Cocomeo</a>
</div></nav>

<div class="proc" id="proc"><div class="pspin"></div><div class="ptxt">Loading...</div></div>
<div class="modal" id="gmodal"><div class="mc2">
  <h3>Upload Artefak</h3>
  <div class="ggrid" id="ggrid"></div>
  <input type="range" class="tmsl" id="tmsl" min="0" max="11" value="0">
  <div class="tmlabs"><span>B&W</span><span>Warm</span><span>Cool</span></div>
  <input type="text" class="noti" id="noti" placeholder="Notasi (max 4 kata)">
  <div class="macts">
    <button class="mbtn" id="cancel-upload">Batal</button>
    <button class="mbtn pri" id="konfirmbtn">Konfirmasi (<span id="selcnt">0</span>)</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>
<input type="file" id="finput" accept="image/*" multiple style="display:none">

<!-- 1. Supabase - UMD version (paling stabil) -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- 2. Constants & utils -->
<script src="/shared-constants.js"></script>
<script src="/shared-utils.js"></script>

<!-- 3. Kode utama jejak -->
<script>
// ========== CEK SUPABASE READY ==========
console.log('[DEBUG] window.supabase:', window.supabase);
console.log('[DEBUG] window.supabase?.createClient:', window.supabase?.createClient);

if (!window.supabase || typeof window.supabase.createClient !== 'function') {
  console.error('[FATAL] Supabase gagal load!');
  
  // Fallback - coba load dari CDN lain
  document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>');
  
  // Tunggu sebentar lalu coba lagi
  setTimeout(() => {
    if (!window.supabase?.createClient) {
      alert('Gagal load Supabase. Coba refresh atau cek koneksi.');
      return;
    }
    initJejak();
  }, 1000);
} else {
  initJejak();
}

// ========== FUNGSI UTAMA ==========
function initJejak() {
  console.log('[OK] Supabase ready, init client...');
  
  // ========== SUPABASE CLIENT ==========
  const supabaseClient = window.supabase.createClient(
    JEJAK.SUPABASE_URL,
    JEJAK.SUPABASE_KEY,
    { auth: { persistSession: true, autoRefreshToken: true } }
  );
  
  // ========== AUTH CHECK ==========
  const session = JEJAK.getSession();
  console.log('[AUTH] Session:', session);
  
  if (!session?.loggedIn || !session?.uid || !session?.username) {
    console.warn('[AUTH] No valid session');
    window.location.replace('/index.html');
    return;
  }
  
  // ========== GLOBAL STATE ==========
  const S = {
    username: session.username,
    userId: session.uid,
    entries: [],
    artefacts: []
  };
  
  console.log('[STATE]', { 
    username: S.username, 
    userId: S.userId?.substring(0,8)
  });
  
  // Update UI
  const huser = document.getElementById('huser');
  if (huser) huser.textContent = '@' + S.username;
  
  // ========== BOTTOM NAV ACTIVE ==========
  (function setActiveNav() {
    const current = window.location.pathname.split('/').pop() || 'spill.html';
    document.querySelectorAll('.bnav .ni').forEach(link => {
      link.classList.toggle('act', link.getAttribute('href') === current);
    });
  })();
  
  // ========== TEST KONEKSI ==========
  async function testConnection() {
    try {
      console.log('[TEST] Testing Supabase connection...');
      const { error } = await supabaseClient
        .from('entries')
        .select('count', { count: 'exact', head: true });
      
      if (error) {
        console.error('[TEST] Connection failed:', error);
        toast('Koneksi database error: ' + error.message);
      } else {
        console.log('[TEST] Connection OK');
      }
    } catch(e) {
      console.error('[TEST] Exception:', e);
    }
  }
  
  // ========== LOAD ENTRIES ==========
  async function loadEntries() {
    if (!S.userId) return;
    
    console.log('[ENTRIES] Loading for user:', S.userId);
    
    try {
      const { data, error } = await supabaseClient
        .from('entries')
        .select('*')
        .eq('user_id', S.userId)
        .order('created_at', { ascending: false })
        .limit(6);
      
      if (error) {
        console.error('[ENTRIES] Error:', error);
        toast('Gagal load entries: ' + error.message);
        return;
      }
      
      console.log('[ENTRIES] Loaded:', data?.length || 0);
      S.entries = data || [];
      renderEntries();
    } catch(err) {
      console.error('[ENTRIES] Exception:', err);
      toast('Gagal load entries');
    }
  }
  
  // ========== RENDER ENTRIES ==========
  function renderEntries() {
    const con = document.getElementById('econ');
    if (!con) return;
    
    const html = S.entries.map(e => `
      <div class="entry">
        <div class="ehdr">
          <span class="etime">${new Date(e.created_at).toLocaleDateString('id-ID')}</span>
          <span class="emood ${e.mood}">${e.mood}</span>
        </div>
        <div class="econt">${escapeHtml(e.content)}</div>
      </div>
    `).join('');
    
    con.innerHTML = html || '<div class="entry"><div class="econt">Belum ada jejak</div></div>';
  }
  
  // ========== SAVE ENTRY ==========
async function saveEntry() {
  // Ambil element textarea
  const ri = document.getElementById('ri');
  
  // Ambil value dan trim (hapus spasi di awal/akhir)
  const content = ri?.value.trim();
  
  // ===== DEBUG: CEK VALUE =====
  console.log('[DEBUG] ri element:', ri);
  console.log('[DEBUG] content value:', content);
  console.log('[DEBUG] content length:', content?.length);
  
  // Validasi: jangan lanjut kalo kosong
  if (!content) {
    toast('Tulis dulu spill-nya');
    ri?.focus();  // Kembalikan kursor ke textarea
    return;
  }
  
  // Ambil mood yang aktif
  const moodEl = document.querySelector('.mc.act');
  const mood = moodEl?.dataset.mood || 'surviving';
  
  // Tampilkan loading
  showProc('Menyimpan spill...');
  
  // ===== DEBUG: DATA YANG AKAN DIKIRIM =====
  const dataToSend = {
    user_id: S.userId,
    username: S.username,
    content: content,
    mood: mood
  };
  console.log('[SAVE] Data to insert:', dataToSend);
  
  try {
    // Insert ke Supabase
    const { error } = await supabaseClient
      .from('entries')
      .insert(dataToSend);
    
    if (error) {
      console.error('[SAVE] Error:', error);
      
      if (error.message?.includes('row-level security')) {
        toast('RLS Policy error: cek user_id');
        console.log('[RLS DEBUG]', {
          user_id: S.userId,
          user_id_type: typeof S.userId,
          username: S.username
        });
      } else {
        toast('Gagal: ' + error.message);
      }
    } else {
      console.log('[SAVE] Success');
      ri.value = '';  // Kosongkan textarea
      document.getElementById('ccount').textContent = '0/500';
      await loadEntries();  // Reload daftar entries
      toast('✓ Spill terkirim!');
    }
  } catch(err) {
    console.error('[SAVE] Exception:', err);
    toast('Gagal menyimpan');
  } finally {
    hideProc();  // Sembunyikan loading
  }
}
  
  // ========== RENDER TRAY ==========
  function renderTray() {
    const con = document.getElementById('tgrid');
    if (!con) return;
    
    const html = S.artefacts.map(a => `
      <div class="ti" onclick="setHero('${a.id}')">
        <img src="${a.url}" class="${a.theme || 'fm'}" alt="${escapeHtml(a.note || 'memory')}">
      </div>
    `).join('');
    
    con.innerHTML = html || Array(6).fill('<div class="ti" style="border:2px dashed #333"></div>').join('');
  }
  
  // ========== SET HERO ==========
  window.setHero = function(id) {
    const a = S.artefacts.find(x => x.id === id);
    if (!a) return;
    
    const himg = document.getElementById('himg');
    const hnote = document.getElementById('hnote');
    
    if (himg) {
      himg.src = a.url;
      himg.className = a.theme || 'fm';
    }
    if (hnote) hnote.textContent = '"' + (a.note || 'memory') + '"';
  };
  
  // ========== UPLOAD FUNCTIONS ==========
  let pendingFiles = [], selectedFiles = new Set(), currentTheme = 0, currentNote = '';
  
  const THEMES = [
    { name:'MONOCHROME', filter:'fm' }, { name:'NOIR', filter:'fn' },
    { name:'SEPIA', filter:'fsp' }, { name:'WARM', filter:'fw' },
    { name:'GOLDEN', filter:'fg' }, { name:'LOMO', filter:'fl' },
    { name:'DREAM', filter:'fd' }, { name:'COLD', filter:'fco' },
    { name:'CYBER', filter:'fc' }, { name:'VIGNETTE', filter:'fv' },
    { name:'CRISP', filter:'fcr' }, { name:'MOODY', filter:'fmo' }
  ];
  
  function initUpload() {
    const upbtn = document.getElementById('upbtn');
    const finput = document.getElementById('finput');
    
    if (upbtn && finput) {
      upbtn.onclick = () => {
        finput.value = '';
        finput.click();
      };
      finput.onchange = handleFiles;
    }
  }
  
  async function handleFiles(e) {
    const files = Array.from(e.target.files).slice(0, 6);
    if (!files.length) return;
    if (!S.userId) { 
      toast('Login dulu'); 
      return; 
    }
    
    const previews = files.map(f => ({ 
      file: f, 
      hasFace: false, 
      preview: URL.createObjectURL(f) 
    }));
    
    openGallery(previews);
  }
  
  function openGallery(files) {
    selectedFiles = new Set(Array.from({length: files.length}, (_,i) => i));
    currentTheme = 0;
    currentNote = '';
    
    const grid = document.getElementById('ggrid');
    if (!grid) return;
    
    grid.innerHTML = '';
    files.forEach((f, idx) => {
      const div = document.createElement('div');
      div.className = 'gi sel';
      div.innerHTML = `<img src="${f.preview}" class="fm" id="pv${idx}">`;
      
      div.addEventListener('click', () => {
        if (selectedFiles.has(idx)) selectedFiles.delete(idx);
        else selectedFiles.add(idx);
        div.classList.toggle('sel');
        updateSelectedCount();
      });
      
      grid.appendChild(div);
    });
    
    const tmsl = document.getElementById('tmsl');
    if (tmsl) tmsl.value = 0;
    
    const tmnm = document.getElementById('tmnm');
    if (tmnm) tmnm.textContent = 'MONOCHROME';
    
    const noti = document.getElementById('noti');
    if (noti) noti.value = '';
    
    const notcnt = document.getElementById('notcnt');
    if (notcnt) notcnt.textContent = '0/4';
    
    updateSelectedCount();
    document.getElementById('gmodal')?.classList.add('on');
    pendingFiles = files;
  }
  
  function updateSelectedCount() {
    const sel = document.getElementById('selcnt');
    if (sel) sel.textContent = selectedFiles.size;
  }
  
  function updateTheme(v) {
    currentTheme = parseInt(v);
    const theme = THEMES[currentTheme];
    
    const tmnm = document.getElementById('tmnm');
    if (tmnm) tmnm.textContent = theme.name;
    
    for (let i = 0; i < pendingFiles.length; i++) {
      const img = document.getElementById('pv' + i);
      if (img) img.className = theme.filter;
    }
  }
  
  function validateNote(inp) {
    const words = inp.value.trim().split(/\s+/).filter(x => x.length);
    const notcnt = document.getElementById('notcnt');
    if (notcnt) notcnt.textContent = Math.min(words.length, 4) + '/4';
    
    if (words.length > 4) {
      inp.value = words.slice(0, 4).join(' ');
    }
    currentNote = inp.value.trim();
  }
  
  function closeGallery() {
    document.getElementById('gmodal')?.classList.remove('on');
    pendingFiles = [];
    selectedFiles.clear();
  }
  
  async function confirmUpload() {
    if (selectedFiles.size === 0) { 
      toast('Pilih minimal 1'); 
      return; 
    }
    
    const kbtn = document.getElementById('konfirmbtn');
    if (kbtn) kbtn.disabled = true;
    
    const theme = THEMES[currentTheme];
    const note = currentNote || 'memory';
    
    const items = Array.from(selectedFiles)
      .map(i => pendingFiles[i])
      .filter(x => x && x.file)
      .map(x => ({ 
        file: x.file, 
        note, 
        hasFace: x.hasFace || false, 
        theme: theme.filter 
      }));
    
    closeGallery();
    
    const pw = document.getElementById('upload-progress-wrap');
    const pf = document.getElementById('upload-progress-fill');
    const pl = document.getElementById('upload-progress-label-text');
    
    if (pw) pw.classList.add('show');
    
    let uploaded = 0;
    const newArts = [];
    
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const file = item.file;
      const ext = (['jpg','jpeg','png','webp','gif'].includes((file.name.split('.').pop() || '').toLowerCase()))
        ? file.name.split('.').pop().toLowerCase() : 'jpg';
      const path = `${Date.now()}_${i}_${S.userId.substring(0,8)}.${ext}`;
      
      try {
        const { error: uploadError } = await supabaseClient
          .storage
          .from('artefacts')
          .upload(path, file, { 
            contentType: file.type || ('image/' + ext), 
            upsert: true 
          });
        
        if (uploadError) {
          toast('Upload gagal: ' + uploadError.message);
          continue;
        }
        
        const { data: urlData } = supabaseClient
          .storage
          .from('artefacts')
          .getPublicUrl(path);
        const url = urlData.publicUrl;
        
        const { data: insertData, error: insertError } = await supabaseClient
          .from('artefacts')
          .insert({
            user_id: S.userId,
            username: S.username,
            url: url,
            note: item.note,
            has_face: item.hasFace,
            theme: item.theme
          })
          .select();
        
        if (!insertError && insertData?.[0]) {
          newArts.push({
            id: insertData[0].id,
            url: url,
            note: item.note,
            hasFace: item.hasFace,
            theme: item.theme,
            timestamp: Date.now(),
            username: S.username,
            user_id: S.userId,
            isDummy: false
          });
          uploaded++;
        }
        
        if (pf) pf.style.width = Math.round(((i + 1) / items.length) * 100) + '%';
        if (pl) pl.textContent = (i + 1) + '/' + items.length + ' foto';
        
      } catch(err) {
        toast('Error: ' + err.message);
      }
    }
    
    if (pw) pw.classList.remove('show');
    if (pf) pf.style.width = '0%';
    
    S.artefacts = [...newArts, ...S.artefacts].slice(0, 6);
    await loadArtefacts();
    
    if (S.artefacts.length > 0) setHero(S.artefacts[0].id);
    if (kbtn) kbtn.disabled = false;
    
    toast(uploaded > 0 ? `✓ ${uploaded} foto diupload` : '⚠ Upload gagal');
  }
  
  // ========== HELPER FUNCTIONS ==========
  function escapeHtml(text) {
    if (!text) return '';
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  
  function toast(msg, dur = 3000) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }
  
  function showProc(msg) {
    const p = document.getElementById('proctxt');
    if (p) p.innerHTML = msg || 'Mengupload...';
    document.getElementById('proc')?.classList.add('on');
  }
  
  function hideProc() {
    document.getElementById('proc')?.classList.remove('on');
  }
  
  function updateCharCount() {
    const ri = document.getElementById('ri');
    const cc = document.getElementById('ccount');
    if (ri && cc) cc.textContent = ri.value.length + '/500';
  }
  
  function toggleMenu() {
    document.getElementById('mdd')?.classList.toggle('on');
  }
  
  window.toggleMenu = toggleMenu;
  
  function logoutUser() {
    if (!confirm('Yakin logout?')) return;
    JEJAK.clearSession('manual logout');
    sessionStorage.clear();
    window.location.href = '/index.html';
  }
  
  window.logoutUser = logoutUser;
  
  function selectMood(mood) {
    document.querySelectorAll('.mc').forEach(c => {
      c.classList.toggle('act', c.dataset.mood === mood);
    });
  }
  
  // ========== DEBUG ==========
  window.debugSession = () => console.table(JEJAK.getSession());
  window.debugS = () => console.log('S:', S);
  
  // ========== EVENT LISTENERS ==========
  document.addEventListener('DOMContentLoaded', function() {
    // Character count
    const ri = document.getElementById('ri');
    if (ri) ri.addEventListener('input', updateCharCount);
    
    // Mood selection
    document.querySelectorAll('.mc').forEach(c => {
      c.addEventListener('click', () => selectMood(c.dataset.mood));
    });
    
    // Save button
    const sb = document.getElementById('sbtn');
    if (sb) sb.addEventListener('click', saveEntry);
    
    // Theme slider
    const ts = document.getElementById('tmsl');
    if (ts) ts.addEventListener('input', function() { updateTheme(this.value); });
    
    // Note input
    const ni = document.getElementById('noti');
    if (ni) ni.addEventListener('input', function() { validateNote(this); });
    
    // Gallery buttons
    const gc = document.getElementById('gallery-close-btn');
    if (gc) gc.addEventListener('click', closeGallery);
    
    const cu = document.getElementById('cancel-upload-btn');
    if (cu) cu.addEventListener('click', closeGallery);
    
    const kb = document.getElementById('konfirmbtn');
    if (kb) kb.addEventListener('click', confirmUpload);
    
    // Close menu when clicking outside
    document.addEventListener('click', e => {
      if (!e.target.closest('.smenu')) {
        const mdd = document.getElementById('mdd');
        if (mdd) mdd.classList.remove('on');
      }
    });
    
    // Render dummy data first
    renderEntries();
    renderTray();
    
    // Initialize upload
    initUpload();
    
    // Load real data
    testConnection();
    loadEntries();
    loadArtefacts();
    
    // Polling for reactions (optional)
    setInterval(() => {
      if (!S.userId) return;
      supabaseClient
        .from('entries')
        .select('id,reactions')
        .eq('user_id', S.userId)
        .then(({ data, error }) => {
          if (error || !data) return;
          data.forEach(row => {
            const entry = S.entries.find(e => e.id === row.id);
            if (entry) entry.reactions = row.reactions || entry.reactions;
          });
        });
    }, 15000);
  });
}

// ========== SERVICE WORKER ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => {
      console.warn('[SW] Registration failed:', e);
    });
  });
}
</script>
</body>
