<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JEJAK — masuk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--sf:#0f0f0f;--bd:#222;--bd2:#2e2e2e;--tx:#f0ece6;--txs:#777;--txm:#444;--ap:#ff2d55;--as:#00e5ff;--aq:#bfff00;--gold:#ffd60a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:Syne,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px 20px 40px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px);z-index:0}
.shell{max-width:400px;width:100%;position:relative;z-index:1}
.accent{height:3px;background:linear-gradient(90deg,var(--ap),var(--as),var(--aq))}
.logo-zone{background:var(--sf);border:2px solid var(--bd2);border-top:none;padding:28px 24px 20px;position:relative;box-shadow:6px 6px 0 #000}
.logo-zone::before{content:'';position:absolute;top:-1px;left:-1px;width:18px;height:18px;border-top:3px solid var(--as);border-left:3px solid var(--as)}
.logo-zone::after{content:'';position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-bottom:3px solid var(--ap);border-right:3px solid var(--ap)}
.logo-corner-tr{position:absolute;top:-1px;right:-1px;width:18px;height:18px;border-top:3px solid var(--aq);border-right:3px solid var(--aq)}
.logo-corner-bl{position:absolute;bottom:-1px;left:-1px;width:18px;height:18px;border-bottom:3px solid var(--gold);border-left:3px solid var(--gold)}
.eyebrow{font-family:'DM Mono',monospace;font-size:9px;color:var(--txm);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px}
.wordmark{font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:.9;letter-spacing:3px;color:var(--tx)}
.wordmark .x{color:var(--ap);display:inline-block;animation:spin 4s ease-in-out infinite}
@keyframes spin{0%,90%,100%{transform:rotate(0)}95%{transform:rotate(180deg)}}
.tagline{font-family:'DM Mono',monospace;font-size:10px;color:var(--txs);letter-spacing:2px;text-transform:uppercase;margin-top:8px}
.auth-box{margin-top:10px;background:var(--sf);border:2px solid var(--bd2);padding:24px;box-shadow:6px 6px 0 #000;position:relative}
.auth-box::before{content:'';position:absolute;top:-1px;left:-1px;width:14px;height:14px;border-top:2px solid var(--as);border-left:2px solid var(--as)}
.auth-box::after{content:'';position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-bottom:2px solid var(--ap);border-right:2px solid var(--ap)}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.form-title::after{content:'LIVE';font-family:'DM Mono',monospace;font-size:9px;background:var(--ap);color:#fff;padding:2px 7px;letter-spacing:1px}
.lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--txs);letter-spacing:.5px;margin-bottom:5px}
.inp{width:100%;background:var(--bg);border:2px solid var(--bd2);padding:12px 14px;color:var(--tx);font-family:'DM Mono',monospace;font-size:14px;outline:none;margin-bottom:12px;letter-spacing:.06em;box-shadow:2px 2px 0 #000;transition:border-color .15s}
.inp:focus{border-color:var(--ap)}
.inp::placeholder{color:var(--txm)}
.pin{text-align:center;letter-spacing:.8em;font-size:20px;font-weight:700;-webkit-text-security:disc}
.pin::placeholder{letter-spacing:.3em;-webkit-text-security:none;font-size:13px}
.fb{font-family:'DM Mono',monospace;font-size:10px;padding:7px 10px;border:1px solid;margin-bottom:10px;display:none;line-height:1.5}
.fb.show{display:block}
.fb.e{border-color:var(--ap);color:var(--ap);background:rgba(255,45,85,.08)}
.fb.s{border-color:var(--aq);color:var(--aq);background:rgba(191,255,0,.06)}
.btn{width:100%;background:var(--ap);color:#fff;border:2px solid #000;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer;box-shadow:5px 5px 0 #000;transition:transform .08s,box-shadow .08s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn::before{content:'⬡';font-size:16px;opacity:.8}
.btn:hover{transform:translate(-1px,-1px);box-shadow:6px 6px 0 #000}
.btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:5px 5px 0 #000}
.toggle{text-align:center;margin-top:12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--txs)}
.toggle button{background:none;border:none;color:var(--as);text-decoration:underline;cursor:pointer;font-family:'DM Mono',monospace;font-size:10px}
.note{padding:10px 12px;background:rgba(255,45,85,.05);border:1px solid var(--ap);border-left:3px solid var(--ap);margin-top:12px}
.note p{font-family:'DM Mono',monospace;font-size:9px;color:var(--txs);line-height:1.6}
.note p b{color:var(--ap)}
.agree{display:flex;gap:10px;align-items:flex-start;margin:10px 0}
.agree input{margin-top:2px;width:16px;height:16px;flex-shrink:0;accent-color:var(--ap)}
.agree label{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx);line-height:1.6;cursor:pointer}
.footer{margin-top:10px;padding:10px 14px;border:1px solid var(--bd);display:flex;justify-content:space-between}
.footer span{font-family:'DM Mono',monospace;font-size:9px;color:var(--txm);letter-spacing:1px}
.footer-dot{display:inline-block;width:5px;height:5px;background:var(--aq);transform:rotate(45deg);margin-right:6px;animation:blink 2s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.browse{text-align:center;margin-top:10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--txs)}
.browse a{color:var(--as);text-decoration:underline;cursor:pointer}
</style>
</head>
<body>
<div class="shell">
  <div class="accent"></div>
  <div class="logo-zone">
    <span class="logo-corner-tr"></span>
    <span class="logo-corner-bl"></span>
    <div class="eyebrow">zero-knowledge platform</div>
    <div class="wordmark">JE<span class="x">✕</span>AK</div>
    <div class="tagline">your space · your rules</div>
  </div>

  <div class="auth-box">
    <!-- LOGIN -->
    <form id="fLogin">
      <div class="form-title">MASUK</div>
      <div class="lbl">username</div>
      <input class="inp" id="lU" placeholder="over.thinker" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="30">
      <div class="lbl">PIN 6 digit</div>
      <input class="inp pin" id="lP" placeholder="●  ●  ●  ●  ●  ●" autocomplete="off" maxlength="6" inputmode="numeric">
      <div class="fb" id="lFb"></div>
      <button type="submit" class="btn" id="lBtn" disabled>MASUK →</button>
      <div class="toggle"><button type="button" onclick="showReg()">Belum punya akun? Daftar</button></div>
      <div class="note"><p>Lupa PIN? <b>Tidak bisa recovery</b> — buat akun baru.</p></div>
    </form>

    <!-- REGISTER -->
    <form id="fReg" style="display:none">
      <div class="form-title">DAFTAR</div>
      <div class="lbl">username — format <span style="color:var(--as);font-family:'DM Mono',monospace">kata.kata</span></div>
      <input class="inp" id="rU" placeholder="over.thinker" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="30">
      <div class="lbl">PIN 6 digit</div>
      <input class="inp pin" id="rP" placeholder="●  ●  ●  ●  ●  ●" autocomplete="off" maxlength="6" inputmode="numeric">
      <div class="lbl">konfirmasi PIN</div>
      <input class="inp pin" id="rP2" placeholder="●  ●  ●  ●  ●  ●" autocomplete="off" maxlength="6" inputmode="numeric">
      <div class="fb" id="rFb"></div>
      <div class="agree">
        <input type="checkbox" id="rAg">
        <label for="rAg">PIN hilang = akun hilang <b style="color:var(--ap)">PERMANENT</b> — no recovery</label>
      </div>
      <button type="submit" class="btn" id="rBtn" disabled style="margin-top:8px">DAFTAR →</button>
      <div class="toggle"><button type="button" onclick="showLogin()">Sudah punya akun? Masuk</button></div>
    </form>
  </div>

  <div class="browse">atau <a href="/spill.html">lihat spill tanpa login →</a></div>

  <div class="footer">
    <span><span class="footer-dot"></span>soul by itsALrUdio</span>
    <span>v3.1 · 2025</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  JEJAK AUTH v3.1 — plain fetch, no SDK, no GoTrue
//  PIN tidak pernah dikirim ke server
// ══════════════════════════════════════════════
const SU  = 'https://fuovfrdicdhnlymnacpz.supabase.co';
const SK  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';
const LS  = {u:'jejak_username',i:'jejak_uid',l:'jejak_logged_in',a:'jejak_auth_v1'};

// Sudah login? langsung ke spill
if (localStorage.getItem(LS.l) === 'true') {
  window.location.replace('/spill.html');
}

// ── Supabase REST — plain fetch ───────────────
async function sbGet(path) {
  const r = await fetch(SU+'/rest/v1'+path, {
    headers: {apikey:SK, Authorization:'Bearer '+SK}
  });
  const t = await r.text();
  return t ? JSON.parse(t) : [];
}
async function sbPost(path, body) {
  const r = await fetch(SU+'/rest/v1'+path, {
    method: 'POST',
    headers: {apikey:SK, Authorization:'Bearer '+SK, 'Content-Type':'application/json', Prefer:'return=representation'},
    body: JSON.stringify(body)
  });
  const t = await r.text();
  const d = t ? JSON.parse(t) : null;
  if (!r.ok) { const e = new Error((d&&(d.message||d.code))||'failed'); e.code = d&&d.code; throw e; }
  return d;
}

// ── Crypto ────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function deviceFP() {
  const p = [];
  try {
    const cv = document.createElement('canvas');
    cv.width = 100; cv.height = 30;
    const ctx = cv.getContext('2d');
    ctx.font = '12px sans-serif';
    ctx.fillText('jejak_fp', 2, 15);
    p.push(cv.toDataURL());
  } catch(e) { p.push('nc'); }
  p.push(navigator.userAgent, screen.width+'x'+screen.height, navigator.language);
  return sha256(p.join('|'));
}
async function authHash(pin, username) {
  const fp = await deviceFP();
  return sha256(pin+':'+username+':'+fp+':jejak_local_v1');
}

// ── Validasi ──────────────────────────────────
function validU(v) {
  v = (v||'').trim().toLowerCase();
  if (!v.includes('.')) return null;
  const p = v.split('.');
  if (p.length !== 2 || p[0].length < 2 || p[1].length < 2) return null;
  if (!/^[a-z][a-z0-9]*$/.test(p[0]) || !/^[a-z][a-z0-9]*$/.test(p[1])) return null;
  return v;
}
function validP(p) {
  if (!/^\d{6}$/.test(p)) return false;
  if (p[0]===p[1]&&p[1]===p[2]&&p[2]===p[3]&&p[3]===p[4]&&p[4]===p[5]) return false;
  if (p==='123456'||p==='654321'||p==='000000'||p==='999999') return false;
  return true;
}

// ── Feedback ──────────────────────────────────
function fb(id, type, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!type) { el.className='fb'; el.textContent=''; return; }
  el.className = 'fb show '+type;
  el.textContent = msg;
}

// ── Nav ───────────────────────────────────────
function showReg() {
  document.getElementById('fLogin').style.display = 'none';
  document.getElementById('fReg').style.display   = '';
  document.getElementById('rU').focus();
}
function showLogin() {
  document.getElementById('fReg').style.display   = 'none';
  document.getElementById('fLogin').style.display = '';
  document.getElementById('lU').focus();
}

// ── Button enable logic ───────────────────────
function chkLogin() {
  document.getElementById('lBtn').disabled =
    !(validU(document.getElementById('lU').value) && validP(document.getElementById('lP').value));
}
function chkReg() {
  const pin = document.getElementById('rP').value;
  document.getElementById('rBtn').disabled = !(
    validU(document.getElementById('rU').value) &&
    validP(pin) &&
    pin === document.getElementById('rP2').value &&
    document.getElementById('rAg').checked
  );
}

// ── LOGIN ─────────────────────────────────────
document.getElementById('fLogin').addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = validU(document.getElementById('lU').value);
  const pin      = document.getElementById('lP').value;
  fb('lFb','','');
  if (!username) { fb('lFb','e','Format username: kata.kata'); return; }
  if (!validP(pin)) { fb('lFb','e','PIN: 6 digit angka'); return; }
  const btn = document.getElementById('lBtn');
  btn.disabled = true; btn.textContent = 'VERIFIKASI...';
  try {
    const data = await sbGet('/profiles?username=eq.'+encodeURIComponent(username)+'&select=id,username&limit=1');
    const user = Array.isArray(data) ? data[0] : null;
    if (!user) throw new Error('Username tidak ditemukan');
    const stored = localStorage.getItem(LS.a);
    if (!stored) throw new Error('Akun belum terdaftar di device ini');
    const hash = await authHash(pin, username);
    if (hash !== stored) throw new Error('PIN salah');
    localStorage.setItem(LS.u, user.username);
    localStorage.setItem(LS.i, user.id);
    localStorage.setItem(LS.l, 'true');
    fb('lFb','s','Login berhasil!');
    setTimeout(() => window.location.replace('/spill.html'), 600);
  } catch(err) {
    fb('lFb','e', err.message||'Login gagal');
    btn.disabled = false; btn.textContent = 'MASUK';
  }
});

// ── REGISTER ─────────────────────────────────
document.getElementById('fReg').addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = validU(document.getElementById('rU').value);
  const pin      = document.getElementById('rP').value;
  fb('rFb','','');
  if (!username) { fb('rFb','e','Format username: kata.kata'); return; }
  if (!validP(pin)) { fb('rFb','e','PIN terlalu lemah'); return; }
  const btn = document.getElementById('rBtn');
  btn.disabled = true; btn.textContent = 'PROSES...';
  try {
    const data = await sbPost('/profiles?select=id,username', {username});
    const user = Array.isArray(data) ? data[0] : data;
    if (!user||!user.id) throw new Error('Tidak ada data returned');
    const hash = await authHash(pin, username);
    localStorage.setItem(LS.u, user.username);
    localStorage.setItem(LS.i, user.id);
    localStorage.setItem(LS.l, 'true');
    localStorage.setItem(LS.a, hash);
    fb('rFb','s','Akun dibuat!');
    setTimeout(() => {
      alert('Akun dibuat!\n\nUsername: '+user.username+'\n\nSIMPAN PIN — tidak bisa dipulihkan!');
      window.location.replace('/spill.html');
    }, 800);
  } catch(err) {
    const isDupe = err.code==='23505'||(err.message||'').includes('duplicate');
    fb('rFb','e', isDupe ? 'Username sudah dipakai' : (err.message||'Gagal'));
    btn.disabled = false; btn.textContent = 'DAFTAR';
  }
});

// ── Wire inputs ───────────────────────────────
function wireText(id, fn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', function() {
    let v = this.value.toLowerCase().replace(/[^a-z0-9.]/g,'');
    const dot = v.indexOf('.');
    if (dot !== -1) v = v.slice(0,dot+1) + v.slice(dot+1).replace(/\./g,'');
    if (v !== this.value) this.value = v;
    fn();
  });
}
function wirePin(id, fn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g,'').slice(0,6);
    fn();
  });
}
wireText('lU',  chkLogin);
wirePin ('lP',  chkLogin);
wireText('rU',  chkReg);
wirePin ('rP',  chkReg);
wirePin ('rP2', chkReg);
document.getElementById('rAg').addEventListener('change', chkReg);
</script>
</body>
</html>
