<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Brotherhood — Jejalah Negeri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A0A;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
    }
    /* wrapper lebar penuh dengan max-width konten */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    /* header */
    .hero-gallery {
      position: relative;
      height: 70vh;
      min-height: 400px;
      background: linear-gradient(135deg, #0A0A0A, #1A1A1A);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 48px;
    }
    .hero-slider {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .slide.active { opacity: 1; }
    .hero-overlay {
      position: relative;
      z-index: 2;
      background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }
    .hero-title {
      font-family: 'Space Grotesk', monospace;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    .hero-title span { color: #FF6B00; }
    .hero-sub {
      font-size: 16px;
      color: #CCC;
      margin-top: 12px;
    }
    /* section umum */
    .section {
      margin-bottom: 64px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
      border-bottom: 2px solid #2A2A2A;
      padding-bottom: 12px;
    }
    .section-title {
      font-size: 28px;
      font-weight: 800;
      font-family: 'Space Grotesk', monospace;
      letter-spacing: -0.5px;
    }
    .section-link {
      color: #FF6B00;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    /* klub grid */
    .clubs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 24px;
    }
    .club-card {
      background: #141414;
      border: 1px solid #2A2A2A;
      border-radius: 16px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .club-card:hover {
      transform: translateY(-6px);
      border-color: #FF6B00;
    }
    .club-logo {
      width: 80px;
      height: 80px;
      background: #2A2A2A;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 40px;
      border: 2px solid #FF6B00;
    }
    .club-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .club-location {
      font-size: 12px;
      color: #888;
    }
    /* jalur touring & kuliner grid */
    .routes-grid, .culinary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .route-card, .culinary-card {
      background: #141414;
      border: 1px solid #2A2A2A;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .route-card:hover, .culinary-card:hover { transform: translateY(-4px); }
    .route-image, .culinary-image {
      height: 160px;
      background: #2A2A2A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .route-info, .culinary-info {
      padding: 16px;
    }
    .route-name, .culinary-name {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 4px;
    }
    .route-meta, .culinary-meta {
      font-size: 12px;
      color: #FF6B00;
      margin-bottom: 8px;
    }
    .route-desc, .culinary-desc {
      font-size: 13px;
      color: #AAA;
    }
    /* tombol */
    .btn-brutal {
      background: #FF6B00;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-weight: 700;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }
    .btn-brutal:hover { background: #FF8C33; transform: scale(0.98); }
    /* modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: #141414;
      border: 1px solid #2A2A2A;
      border-radius: 24px;
      max-width: 500px;
      width: 100%;
      padding: 32px;
    }
    /* detail club (sementara sederhana, bisa pakai modal atau halaman baru) */
    .club-detail {
      position: fixed;
      inset: 0;
      background: #0A0A0A;
      z-index: 1100;
      overflow-y: auto;
      display: none;
      padding: 24px;
    }
    .club-detail.active { display: block; }
    .back-btn {
      background: none;
      border: none;
      color: #FF6B00;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 24px;
    }
    /* responsive */
    @media (max-width: 768px) {
      .hero-title { font-size: 32px; }
      .clubs-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="hero-gallery" id="heroGallery">
    <div class="hero-slider" id="heroSlider"></div>
    <div class="hero-overlay">
      <div class="hero-title">Jejalah <span>Negeri</span></div>
      <div class="hero-sub">Komunitas motor • touring • kuliner nusantara</div>
    </div>
  </div>

  <div class="container">
    <!-- Daftar Klub -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">🏍️ Klub Motor</h2>
        <button class="section-link" id="openRegClubBtn">+ Daftarkan Klub</button>
      </div>
      <div class="clubs-grid" id="clubsGrid"></div>
    </div>

    <!-- Jalur Touring Terbaik -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">🗺️ Jalur Touring Terbaik</h2>
        <a href="#" class="section-link">Lihat semua →</a>
      </div>
      <div class="routes-grid" id="routesGrid"></div>
    </div>

    <!-- Kuliner Nusantara -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">🍜 Kuliner Nusantara</h2>
        <a href="#" class="section-link">Jelajahi →</a>
      </div>
      <div class="culinary-grid" id="culinaryGrid"></div>
    </div>
  </div>

  <!-- Modal Daftar Klub -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <h3 style="margin-bottom: 20px;">Daftarkan Klub Motor</h3>
      <input type="text" id="regClubName" placeholder="Nama Klub" style="width:100%; margin-bottom:12px; padding:12px; background:#1E1E1E; border:1px solid #333; color:white; border-radius:8px;">
      <input type="text" id="regAddress" placeholder="Alamat Sekretariat" style="width:100%; margin-bottom:12px; padding:12px; background:#1E1E1E; border:1px solid #333; color:white; border-radius:8px;">
      <input type="text" id="regChairman" placeholder="Nama Ketua" style="width:100%; margin-bottom:12px; padding:12px; background:#1E1E1E; border:1px solid #333; color:white; border-radius:8px;">
      <input type="text" id="regContact" placeholder="Nomor Kontak" style="width:100%; margin-bottom:20px; padding:12px; background:#1E1E1E; border:1px solid #333; color:white; border-radius:8px;">
      <button id="submitRegister" class="btn-brutal" style="width:100%;">DAFTARKAN</button>
      <button id="closeModal" style="margin-top:12px; width:100%; background:none; border:1px solid #333; padding:10px; border-radius:8px; color:white;">Batal</button>
    </div>
  </div>

  <!-- Detail Club (halaman sementara) -->
  <div id="clubDetail" class="club-detail">
    <button class="back-btn" id="closeDetail">← Kembali</button>
    <div id="clubDetailContent"></div>
  </div>

  <script>
    // Supabase
    const SUPABASE_URL = 'https://fuovfrdicdhnlymnacpz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Simulasi user (ganti dengan auth nanti)
    let currentUser = localStorage.getItem('brotherhood_user') || 'guest_' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('brotherhood_user', currentUser);

    // Hero gallery (mockup foto touring)
    const galleryImages = [
      'https://images.unsplash.com/photo-1558981806-ec527fa84c39?w=1200',
      'https://images.unsplash.com/photo-1566478989037-eec170495d9e?w=1200',
      'https://images.unsplash.com/photo-1522770179533-24471fcdba45?w=1200',
      'https://images.unsplash.com/photo-1541625602330-2277a4c46182?w=1200'
    ];
    let currentSlide = 0;
    function initHeroSlider() {
      const slider = document.getElementById('heroSlider');
      slider.innerHTML = galleryImages.map((img, idx) => `<div class="slide ${idx === 0 ? 'active' : ''}" style="background-image: url('${img}');"></div>`).join('');
      setInterval(() => {
        const slides = document.querySelectorAll('.slide');
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
      }, 5000);
    }
    initHeroSlider();

    // Load data
    async function loadClubs() {
      const { data, error } = await supabase.from('clubs').select('*').order('created_at', { ascending: false });
      if (error) return;
      const grid = document.getElementById('clubsGrid');
      grid.innerHTML = data.map(club => `
        <div class="club-card" onclick="openClub('${club.id}')">
          <div class="club-logo">🏍️</div>
          <div class="club-name">${escapeHtml(club.name)}</div>
          <div class="club-location">${escapeHtml(club.secretariat_address.split(',')[0])}</div>
        </div>
      `).join('');
    }

    async function loadRoutes() {
      const { data, error } = await supabase.from('touring_routes').select('*').limit(6);
      if (error) return;
      const grid = document.getElementById('routesGrid');
      grid.innerHTML = (data || []).map(route => `
        <div class="route-card">
          <div class="route-image">🏔️</div>
          <div class="route-info">
            <div class="route-name">${escapeHtml(route.name)}</div>
            <div class="route-meta">${route.distance_km || '?'} km • ${route.difficulty || 'Medium'}</div>
            <div class="route-desc">${escapeHtml(route.start_point || '')} → ${escapeHtml(route.end_point || '')}</div>
          </div>
        </div>
      `).join('');
    }

    async function loadCulinary() {
      const { data, error } = await supabase.from('culinary_spots').select('*').limit(6);
      if (error) return;
      const grid = document.getElementById('culinaryGrid');
      grid.innerHTML = (data || []).map(c => `
        <div class="culinary-card">
          <div class="culinary-image">🍲</div>
          <div class="culinary-info">
            <div class="culinary-name">${escapeHtml(c.name)}</div>
            <div class="culinary-meta">⭐ ${c.rating_avg || 0}/5</div>
            <div class="culinary-desc">${escapeHtml(c.location)}</div>
          </div>
        </div>
      `).join('');
    }

    // Buka detail klub (halaman sederhana)
    window.openClub = async (clubId) => {
      const { data: club, error } = await supabase.from('clubs').select('*').eq('id', clubId).single();
      if (error) return;
      const detailDiv = document.getElementById('clubDetailContent');
      detailDiv.innerHTML = `
        <div style="background:#141414; border-radius:24px; padding:24px;">
          <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
            <div style="width:100px; height:100px; background:#2A2A2A; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:48px;">🏍️</div>
            <div>
              <h2>${escapeHtml(club.name)}</h2>
              <p>📍 ${escapeHtml(club.secretariat_address)}</p>
              <p>👑 ${escapeHtml(club.chairman_name)}</p>
              <p>📞 ${escapeHtml(club.contact_number)}</p>
            </div>
          </div>
          <hr style="margin:20px 0; border-color:#333;">
          <h3>Forum Komunitas</h3>
          <div id="forumMessages" style="height:300px; overflow-y:auto; background:#1E1E1E; border-radius:12px; padding:12px; margin-top:12px;"></div>
          <div style="display:flex; gap:8px; margin-top:12px;">
            <input type="text" id="forumInput" placeholder="Tulis pesan..." style="flex:1; background:#2A2A2A; border:none; padding:12px; border-radius:24px; color:white;">
            <button id="sendForumBtn" class="btn-brutal" style="padding:12px 20px;">Kirim</button>
          </div>
        </div>
      `;
      document.getElementById('clubDetail').classList.add('active');
      loadForumMessages(clubId);
      subscribeForum(clubId);
    };

    async function loadForumMessages(clubId) {
      const { data, error } = await supabase
        .from('club_forum_messages')
        .select('*')
        .eq('club_id', clubId)
        .order('created_at', { ascending: false })
        .limit(30);
      if (error) return;
      const container = document.getElementById('forumMessages');
      container.innerHTML = (data || []).reverse().map(m => `
        <div style="margin-bottom:12px; padding:8px; background:#2A2A2A; border-radius:12px;">
          <strong>${escapeHtml(m.username)}</strong> <span style="font-size:11px; color:#888;">${new Date(m.created_at).toLocaleTimeString()}</span>
          <div>${escapeHtml(m.message)} ${m.emoji || ''}</div>
        </div>
      `).join('');
      const sendBtn = document.getElementById('sendForumBtn');
      const input = document.getElementById('forumInput');
      sendBtn.onclick = async () => {
        const text = input.value.trim();
        if (!text) return;
        await supabase.from('club_forum_messages').insert({
          club_id: clubId,
          user_id: currentUser,
          username: currentUser.substring(0,10),
          message: text
        });
        input.value = '';
        loadForumMessages(clubId);
      };
    }

    let forumSub = null;
    function subscribeForum(clubId) {
      if (forumSub) supabase.removeChannel(forumSub);
      forumSub = supabase
        .channel('forum-channel')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'club_forum_messages', filter: `club_id=eq.${clubId}` }, () => {
          loadForumMessages(clubId);
        })
        .subscribe();
    }

    document.getElementById('closeDetail').onclick = () => {
      document.getElementById('clubDetail').classList.remove('active');
      if (forumSub) supabase.removeChannel(forumSub);
    };

    // Registrasi klub
    document.getElementById('openRegClubBtn').onclick = () => document.getElementById('registerModal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('registerModal').style.display = 'none';
    document.getElementById('submitRegister').onclick = async () => {
      const name = document.getElementById('regClubName').value.trim();
      const addr = document.getElementById('regAddress').value.trim();
      const chairman = document.getElementById('regChairman').value.trim();
      const contact = document.getElementById('regContact').value.trim();
      if (!name || !addr || !chairman || !contact) return alert('Isi semua field');
      const { error } = await supabase.from('club_registrations').insert({
        club_name: name,
        secretariat_address: addr,
        chairman_name: chairman,
        contact_number: contact,
        registered_by: currentUser
      });
      if (error) alert('Gagal: ' + error.message);
      else alert('Pendaftaran berhasil! Butuh 25 anggota dalam 7 hari untuk aktivasi.');
      document.getElementById('registerModal').style.display = 'none';
    };

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    loadClubs();
    loadRoutes();
    loadCulinary();
  </script>
</body>
</html>
