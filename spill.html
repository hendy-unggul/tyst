<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    
    <!-- SHARED CSS -->
    <link rel="stylesheet" href="/shared.css">
    
    <style>
        /* ========== SPILL-SPECIFIC STYLES ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            padding-top: calc(14px + var(--st));
            border-bottom: 2px solid var(--bd);
            background: var(--bg);
        }
        
        .logo {
            font-family: var(--font-display);
            font-size: 34px;
        }
        
        .logo .x {
            color: var(--ap);
            display: inline-block;
            animation: spin 4s infinite;
        }
        
        @keyframes spin {
            95% { transform: rotate(180deg); }
        }
        
        .user-badge {
            font-family: var(--font-mono);
            background: #000;
            border: 2px solid var(--bd);
            padding: 4px 8px;
            color: var(--as);
        }
        
        .scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 62px;
        }
        
        /* RADAR */
        .radar-sect {
            background: var(--sf);
            border-bottom: 2px solid var(--bd);
        }
        
        .radar-header {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
        }
        
        .radar-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--as);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .label-dot {
            width: 8px;
            height: 8px;
            background: var(--as);
            transform: rotate(45deg);
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0.2; }
        }
        
        .online-badge {
            background: rgba(0,229,255,0.1);
            padding: 6px 12px;
            border: 1px solid var(--bd);
            font-family: var(--font-mono);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--aq);
            transform: rotate(45deg);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%,100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.2); }
        }
        
        .radar-wrapper {
            padding: 0 18px 16px;
        }
        
        .radar-bezel {
            position: relative;
            padding: 4px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            box-shadow: 6px 6px 0 #000;
        }
        
        .radar-cont {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #020a02;
            overflow: hidden;
        }
        
        .radar-grid {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px),
                repeating-linear-gradient(90deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px);
        }
        
        .radar-ring {
            position: absolute;
            inset: 8%;
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 50%;
        }
        
        .radar-ring::before {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0,229,255,0.05);
            inset: 28%;
        }
        
        .radar-cross {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(90deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(0deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px));
        }
        
        .radar-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: block;
        }
        
        .radar-dots {
            position: absolute;
            inset: 0;
            z-index: 5;
        }
        
        .radar-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            transform: translate(-50%,-50%) rotate(45deg);
            background: var(--as);
            opacity: 0.3;
            transition: opacity 0.1s;
        }
        
        .radar-dot.active {
            opacity: 1;
            transform: translate(-50%,-50%) rotate(45deg) scale(2.5);
        }
        
        /* TOMBOL GENDER */
        .radar-ctas {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .gender-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .btn-gender {
            flex: 1;
            padding: 18px 8px;
            border: 2px solid #000;
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.1s;
        }
        
        .btn-gender:active { 
            transform: translate(3px, 3px); 
            box-shadow: 2px 2px 0 #000; 
        }
        
        .btn-heart { 
            background: linear-gradient(145deg, var(--ap), #ff6b8b); 
            color: white; 
        }
        
        .btn-spade { 
            background: linear-gradient(145deg, var(--as), #4d7aff); 
            color: black; 
        }
        
        .gender-icon { 
            font-size: 38px; 
        }
        
        .gender-tag { 
            font-family: var(--font-mono); 
            font-size: 9px; 
            background: #000; 
            color: var(--aq); 
            padding: 4px 8px; 
        }
        
        .btn-whisper { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 2px dashed var(--bd2); 
            font-family: var(--font-body); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            color: var(--txs);
        }
        
        /* FILTER */
        .filter-sect {
            padding: 18px;
            border-bottom: 2px solid var(--bd);
        }
        
        .filter-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        
        .filter-title {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--txs);
            letter-spacing: 3px;
        }
        
        .match-pct {
            font-family: var(--font-display);
            font-size: 26px;
            color: var(--ap);
        }
        
        .vibe-slider {
            width: 100%;
            height: 3px;
            background: var(--bd2);
            -webkit-appearance: none;
        }
        
        .vibe-slider::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            background: var(--ap);
            border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--ap), 3px 3px 0 #000;
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        /* SPILLS - CARD & REACTIONS */
        .spills-sect {
            padding: 18px;
        }
        
        .sect-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        
        .sect-title {
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .spill-card {
            background: var(--sf);
            border: 2px solid var(--bd2);
            margin-bottom: 20px;
            padding: 16px;
            box-shadow: 4px 4px 0 #000;
            position: relative;
        }
        
        .spill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        
        .spill-author {
            color: var(--as);
        }
        
        .spill-mood {
            padding: 4px 8px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* WARNA MOOD */
        .spill-mood.surviving { 
            background: var(--ap); 
            color: white; 
        }
        
        .spill-mood.thriving { 
            background: var(--aq); 
            color: black; 
        }
        
        .spill-mood.chaotic { 
            background: var(--as); 
            color: black; 
        }
        
        .spill-mood.doom { 
            background: #9900ff; 
            color: white; 
        }
        
        .spill-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--tx);
            font-family: var(--font-body);
            margin-bottom: 12px;
        }
        
        /* REACTIONS HORISONTAL */
        .spill-reactions {
            display: flex;
            gap: 8px;
            border-top: 2px solid var(--bd);
            padding-top: 12px;
        }
        
        .react-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 8px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            color: var(--txs);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 14px;
            transition: all 0.1s;
        }
        
        .react-btn:active {
            background: var(--bd2);
            transform: translate(2px, 2px);
        }
        
        .react-count {
            font-size: 11px;
            font-weight: bold;
        }
        
        /* AI BADGE - TETAP ADA TAPI DISEMBUNYIKAN */
        .ai-badge {
            display: none;
        }
        
        /* WAITING OVERLAY */
        .waiting-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .waiting-box {
            background: var(--sf);
            border: 3px solid var(--as);
            padding: 30px;
            text-align: center;
            box-shadow: 12px 12px 0 #000;
        }
        
        .waiting-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .waiting-timer {
            width: 100px;
            height: 100px;
            border: 4px solid var(--aq);
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 36px;
            color: var(--aq);
        }
        
        #cancelWaiting {
            background: transparent;
            border: 2px solid var(--bd2);
            color: var(--txs);
            padding: 14px 24px;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
        }
        
        /* CHAT ROOM */
        .chat-room {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 500;
            flex-direction: column;
        }
        
        .chat-room.on { display: flex; }
        
        .chat-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 2px solid var(--bd);
            background: var(--sf);
        }
        
        #partnerLabel {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--as);
            background: rgba(0,229,255,0.1);
            padding: 6px 14px;
            border: 1px solid var(--bd);
        }
        
        .chat-timer {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--aq);
            background: var(--bg);
            padding: 8px 14px;
            border: 2px solid var(--bd);
            box-shadow: 3px 3px 0 #000;
        }
        
        .chat-close {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 2px solid var(--bd);
            color: var(--txs);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
        }
        
        .chat-close:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }
        
        .chat-input-wrap {
            display: flex;
            gap: 10px;
            padding: 12px 18px;
            border-top: 2px solid var(--bd);
            background: var(--sf);
        }
        
        .chat-input {
            flex: 1;
            padding: 13px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            color: var(--tx);
            font-family: var(--font-body);
            outline: none;
        }
        
        .chat-input:focus {
            border-color: var(--as);
        }
        
        .chat-send {
            width: 48px;
            height: 48px;
            background: var(--ap);
            border: 2px solid #000;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
        }
        
        .chat-send:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        .chat-send.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--tx);
            color: var(--bg);
            padding: 12px 22px;
            z-index: 2000;
            opacity: 0;
            transition: 0.25s;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 #000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.error {
            background: var(--ap);
            color: #fff;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--txs);
            font-family: var(--font-mono);
            font-size: 14px;
            border: 2px dashed var(--bd2);
        }
    </style>
</head>

                'motor mogok, dompet tipis, pacar ngambek. triple combo 🫠',
                'rasanya pengen rebahan aja selamanya 🛌',
                'udah 6 bulan nganggur, lamaran kerja ga ada yang dipanggil'
            ]
        };
        
        // Buat AI entries dengan timestamp lebih lama (7-30 hari yang lalu)
        return Array(count).fill().map(() => {
            const author = aiAuthors[Math.floor(Math.random() * aiAuthors.length)];
            const mood = moods[Math.floor(Math.random() * moods.length)];
            const contentList = contents[mood];
            const content = contentList[Math.floor(Math.random() * contentList.length)];
            
            // Random antara 7-30 hari yang lalu
            const daysAgo = 7 + Math.floor(Math.random() * 23);
            const timestamp = new Date(Date.now() - daysAgo * 24 * 60 * 60 * 1000);
            
            return {
                author,  // ← AI username dari array terpisah
                mood,
                content,
                reactions: {
                    skull: Math.floor(Math.random() * 30) + 5,
                    cry: Math.floor(Math.random() * 40) + 10,
                    fire: Math.floor(Math.random() * 20) + 1,
                    upside: Math.floor(Math.random() * 15) + 2
                },
                created_at: timestamp.toISOString(),
                is_ai: true  // ini AI entry
            };
        });
    }
    
    // ========== INIT AI ENTRIES ==========
    function initAIEntries() {
        aiEntries = generateAIEntries(6);
        combineAndRender();
        
        // Generator setiap 3 menit
        if (aiGeneratorTimer) clearInterval(aiGeneratorTimer);
        aiGeneratorTimer = setInterval(() => {
            console.log('[AI] Generating new entry...');
            const newEntry = generateAIEntries(1)[0];
            aiEntries = [newEntry, ...aiEntries.slice(0, 5)];
            combineAndRender();
        }, 180000); // 3 menit
    }
    
    // ========== GABUNG & URUTKAN ==========
    function combineAndRender() {
        // Gabungkan REAL user entries + AI entries
        allEntries = [...userEntries, ...aiEntries];
        
        // Urutkan berdasarkan created_at (terbaru di atas)
        allEntries.sort((a, b) => {
            return new Date(b.created_at) - new Date(a.created_at);
        });
        
        renderSpills();
    }
    
    // ========== RENDER SPILLS ==========
    function renderSpills() {
        const container = $('spillsList');
        if (!container) return;
        
        if (allEntries.length === 0) {
            container.innerHTML = '<div class="empty-state">🍃 Belum ada spill</div>';
            return;
        }
        
        let html = '';
        allEntries.forEach((spill, index) => {
            html += `
                <div class="spill-card">
                    <div class="spill-header">
                        <span class="spill-author">@${spill.author}</span>
                        <span class="spill-mood ${spill.mood}">${spill.mood.toUpperCase()}</span>
                    </div>
                    <div class="spill-content">
                        ${spill.content}
                    </div>
                    
                    <div class="spill-reactions">
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'skull')">
                            💀 <span class="react-count">${spill.reactions.skull || 0}</span>
                        </button>
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'cry')">
                            😭 <span class="react-count">${spill.reactions.cry || 0}</span>
                        </button>
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'fire')">
                            🔥 <span class="react-count">${spill.reactions.fire || 0}</span>
                        </button>
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'upside')">
                            🙃 <span class="react-count">${spill.reactions.upside || 0}</span>
                        </button>
                    </div>
                    
                    ${spill.is_ai ? '<div class="ai-badge">🤖</div>' : ''}
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        const meta = $('feedMeta');
        if (meta) meta.textContent = allEntries.length + ' spill';
    }
    
    // ========== REACTION HANDLER ==========
    window.reactToSpill = function(index, type) {
        const spill = allEntries[index];
        if (!spill) return;
        
        spill.reactions[type] = (spill.reactions[type] || 0) + 1;
        renderSpills();
    };
    
    // ========== RADAR ==========
    let rdots = [];
    let needleA = 0, needleO = 0, phA = Math.random() * Math.PI * 2;
    const BASE_OM = (60/4 * Math.PI * 2) / (60 * 60);
    const TRAIL_CAP = 120;
    const trail = new Float32Array(TRAIL_CAP);
    let trailPtr = 0;
    const dotGlow = new Map();
    let radarRAF = null;
    let radarInterval = null;
    
    function initRadar() {
        const cv = $('radarCanvas');
        const ct = $('radarCont');
        if (!cv || !ct) return;
        
        const resize = () => {
            const r = ct.getBoundingClientRect();
            if (r.width > 0 && r.height > 0) {
                cv.width = r.width;
                cv.height = r.height;
            }
        };
        resize();
        window.addEventListener('resize', resize);
        
        spawnDots();
        if (radarInterval) clearInterval(radarInterval);
        radarInterval = setInterval(() => {
            rdots.forEach(d => {
                d.vx = d.vx * 0.88 + (Math.random() - 0.5) * 0.3;
                d.vy = d.vy * 0.88 + (Math.random() - 0.5) * 0.3;
                d.x = Math.max(9, Math.min(91, d.x + d.vx));
                d.y = Math.max(9, Math.min(91, d.y + d.vy));
                if (d.el) {
                    d.el.style.left = d.x + '%';
                    d.el.style.top = d.y + '%';
                }
            });
        }, 100);
        
        needleA = Math.random() * Math.PI * 2;
        trail.fill(needleA);
        radarLoop(cv);
    }
    
    function spawnDots() {
        const c = $('radarDots');
        if (!c) return;
        c.innerHTML = '';
        rdots = [];
        const types = ['ai', 'purple', 'red', 'lime'];
        for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = 12 + Math.random() * 70;
            const x = 50 + Math.cos(a) * d / 2;
            const y = 50 + Math.sin(a) * d / 2;
            const dot = document.createElement('div');
            const type = types[Math.floor(Math.random() * types.length)];
            dot.className = 'radar-dot ' + type;
            dot.style.left = x + '%';
            dot.style.top = y + '%';
            c.appendChild(dot);
            rdots.push({ el: dot, x, y, vx: 0, vy: 0, type, id: i });
        }
    }
    
    function radarLoop(cv) {
        const ctx = cv.getContext('2d');
        function draw() {
            const W = cv.width, H = cv.height;
            const cx = W / 2, cy = H / 2;
            const R = Math.min(cx, cy) * 0.88;
            
            if (!W || !H) {
                radarRAF = requestAnimationFrame(draw);
                return;
            }
            
            phA += 0.007;
            needleO += (BASE_OM * (1 + Math.sin(phA) * 0.35) - needleO) * 0.028;
            needleA = (needleA + needleO) % (Math.PI * 2);
            trail[trailPtr] = needleA;
            trailPtr = (trailPtr + 1) % TRAIL_CAP;
            
            ctx.fillStyle = 'rgba(2,10,2,0.18)';
            ctx.fillRect(0, 0, W, H);
            
            for (let i = 0; i < TRAIL_CAP - 1; i++) {
                const alpha = Math.pow(1 - i / TRAIL_CAP, 2.2) * 0.12;
                if (alpha < 0.002) break;
                const s = needleA - (i + 1) * needleO;
                const e = needleA - i * needleO;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, Math.min(s, e), Math.max(s, e), false);
                ctx.closePath();
                ctx.fillStyle = `rgba(0,229,255,${alpha})`;
                ctx.fill();
                ctx.restore();
            }
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(needleA);
            ctx.shadowColor = 'rgba(0,229,255,0.95)';
            ctx.shadowBlur = 12;
            const lg = ctx.createLinearGradient(0, 0, R, 0);
            lg.addColorStop(0, 'rgba(0,229,255,1)');
            lg.addColorStop(0.8, 'rgba(0,229,255,0.4)');
            lg.addColorStop(1, 'rgba(0,229,255,0)');
            ctx.beginPath();
            ctx.moveTo(3, 0);
            ctx.lineTo(R, 0);
            ctx.strokeStyle = lg;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.rect(-4, -4, 8, 8);
            ctx.fillStyle = '#00e5ff';
            ctx.fill();
            ctx.restore();
            
            rdots.forEach((d, di) => {
                const px = d.x / 100 * W;
                const py = d.y / 100 * H;
                let da = Math.atan2(py - cy, px - cx);
                if (da < 0) da += Math.PI * 2;
                let diff = needleA - da;
                if (diff < 0) diff += Math.PI * 2;
                const age = dotGlow.get(di) ?? 999;
                
                if (diff < 0.18 && age > 30) {
                    dotGlow.set(di, 0);
                    if (d.el) {
                        d.el.classList.add('active');
                        setTimeout(() => d.el?.classList.remove('active'), 800);
                    }
                } else {
                    dotGlow.set(di, age + 1);
                }
                
                if (age < 55) {
                    const t = age / 55;
                    const ga = (1 - t) * (1 - t) * 0.9;
                    if (ga < 0.01) return;
                    const col = d.type === 'purple' ? '191,90,242' :
                               d.type === 'red' ? '255,45,85' :
                               d.type === 'lime' ? '191,255,0' : '0,229,255';
                    const gr = ctx.createRadialGradient(px, py, 0, px, py, 16 * (1 - t) + 3);
                    gr.addColorStop(0, `rgba(${col},${ga})`);
                    gr.addColorStop(1, `rgba(${col},0)`);
                    ctx.beginPath();
                    ctx.arc(px, py, 16 * (1 - t) + 3, 0, Math.PI * 2);
                    ctx.fillStyle = gr;
                    ctx.fill();
                }
            });
            
            radarRAF = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ========== VIBE CHECK ==========
    function startVibeCheck(type) {
        console.log(`[Vibe] ${type} clicked`);
        
        const overlay = $('waitingOverlay');
        const icon = $('waitingIcon');
        if (overlay && icon) {
            icon.textContent = type === 'heart' ? '❤️' : '♠️';
            overlay.style.display = 'flex';
            
            let seconds = 15;
            const timerEl = $('waitingTimer');
            if (timerEl) timerEl.textContent = seconds;
            
            const timer = setInterval(() => {
                seconds--;
                if (timerEl) timerEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    
                    // Buka chat room setelah waiting selesai
                    const room = $('chatRoom');
                    if (room) room.classList.add('on');
                }
            }, 1000);
            
            const cancelBtn = $('cancelWaiting');
            if (cancelBtn) {
                cancelBtn.onclick = () => {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                };
            }
        }
    }
    
    // ========== INIT ==========
    window.addEventListener('load', async function() {
        console.log('[App] Starting...');
        
        // Set username
        const userEl = $('userNameDisplay');
        if (userEl) {
            const saved = localStorage.getItem('spill_username') || 'beby.manis';
            userEl.textContent = '@' + saved;
        }
        
        // Set online count
        const onlineEl = $('onlineCount');
        if (onlineEl) onlineEl.textContent = '21 ONLINE';
        
        // Init radar
        setTimeout(initRadar, 100);
        
        // Fetch REAL user entries dari Supabase
        await fetchUserEntries();
        
        // Init AI entries
        initAIEntries();
        
        // ===== TOMBOL HEART & SPADE =====
        const heartBtn = $('vibeFemaleBtn');
        const spadeBtn = $('vibeMaleBtn');
        const whisperBtn = $('whisperBtn');
        const closeChatBtn = $('closeChatBtn');
        const sendBtn = $('sendButton');
        const chatInput = $('chatInput');
        const slider = $('vibeSlider');
        const pct = $('vibePct');
        
        if (heartBtn) {
            heartBtn.onclick = (e) => {
                e.preventDefault();
                startVibeCheck('heart');
            };
        }
        
        if (spadeBtn) {
            spadeBtn.onclick = (e) => {
                e.preventDefault();
                startVibeCheck('spade');
            };
        }
        
        if (whisperBtn) {
            whisperBtn.onclick = () => {
                alert('✨ Whisperer mode (premium)');
            };
        }
        
        if (closeChatBtn) {
            closeChatBtn.onclick = () => {
                const room = $('chatRoom');
                if (room) room.classList.remove('on');
            };
        }
        
        if (sendBtn && chatInput) {
            sendBtn.onclick = () => {
                const msg = chatInput.value.trim();
                if (msg) {
                    const msgs = $('chatMessages');
                    if (msgs) {
                        msgs.innerHTML += `<div style="text-align: right; margin: 10px 0;"><span style="background: var(--as); padding: 8px 12px; display: inline-block;">${msg}</span></div>`;
                        chatInput.value = '';
                        msgs.scrollTop = msgs.scrollHeight;
                    }
                }
            };
            
            chatInput.onkeypress = (e) => {
                if (e.key === 'Enter') sendBtn.click();
            };
        }
        
        if (slider && pct) {
            slider.oninput = function() {
                pct.textContent = this.value + '%';
            };
        }
        
        console.log('[App] Ready!');
    });
    // ========== EXPOSE FOR TESTING ==========
// Tambahkan ini sebelum baris terakhir: })();
window.testAPI = {
    getAllEntries: () => allEntries,
    getUserEntries: () => userEntries,
    getAIEntries: () => aiEntries,
    generateOneAI: () => {
        const newAI = generateAIEntries(1)[0];
        aiEntries = [newAI, ...aiEntries.slice(0, 5)];
        combineAndRender();
        console.log('[Test] AI generated:', newAI.author, newAI.content);
        return newAI;
    },
    addTestEntry: (author = 'test.user') => {
        const newEntry = {
            author: author,
            mood: 'chaotic',
            content: 'Test entry at ' + new Date().toLocaleTimeString(),
            reactions: { skull: 0, cry: 0, fire: 0, upside: 0 },
            created_at: new Date().toISOString(),
            is_ai: false
        };
        userEntries = [newEntry, ...userEntries.slice(0, 9)];
        combineAndRender();
        console.log('[Test] Entry added. Total user entries:', userEntries.length);
        return newEntry;
    },
    getStats: () => ({
        total: allEntries?.length || 0,
        user: userEntries?.length || 0,
        ai: aiEntries?.length || 0,
        latest: allEntries?.[0] ? {
            author: allEntries[0].author,
            content: allEntries[0].content.substring(0, 30),
            time: new Date(allEntries[0].created_at).toLocaleString()
        } : null
    }),
    startMonitor: (interval = 30000) => {
        if (window._monitor) clearInterval(window._monitor);
        window._monitor = setInterval(() => {
            const stats = window.testAPI.getStats();
            console.log('=== MONITORING ===', new Date().toLocaleTimeString());
            console.log('Total:', stats.total, '| User:', stats.user, '| AI:', stats.ai);
            if (stats.latest) {
                console.log('Latest:', `@${stats.latest.author}`, stats.latest.content);
            }
            console.log('===================');
        }, interval);
        console.log('[Test] Monitor started every', interval/1000, 'seconds');
    },
    stopMonitor: () => {
        if (window._monitor) {
            clearInterval(window._monitor);
            window._monitor = null;
            console.log('[Test] Monitor stopped');
        }
    }
};
  // ========== EXPOSE VIBE CHECK FOR TESTING ==========
window.startVibeCheck = startVibeCheck;
window.testVibe = {
    heart: () => startVibeCheck('heart'),
    spade: () => startVibeCheck('spade'),
    cancel: () => document.getElementById('cancelWaiting')?.click(),
    closeChat: () => document.getElementById('closeChatBtn')?.click(),
    sendMessage: (msg) => {
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendButton');
        if (input && sendBtn) {
            input.value = msg;
            sendBtn.click();
            return 'Message sent: ' + msg;
        }
        return 'Failed to send message';
    },
    openChat: () => document.getElementById('chatRoom')?.classList.add('on'),
    getStatus: () => ({
        overlay: document.getElementById('waitingOverlay')?.style.display,
        chatOpen: document.getElementById('chatRoom')?.classList.contains('on'),
        timer: document.getElementById('waitingTimer')?.textContent
    })
};  
})();
