<script>
(function() {
    'use strict';
    
    // ========== SUPABASE CONFIG ==========
    const SUPABASE_URL = 'https://fuovfrdicdhnlymnacpz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';
    
    // ========== STATE ==========
    let userEntries = [];
    let aiEntries = [];
    let allEntries = [];
    let aiGeneratorTimer = null;
    
    // ========== USERNAME MAPPING ==========
    // List username yang tersedia
    const AVAILABLE_USERNAMES = [
        'beby.manis', 'chili.padi', 'pretty.sad', 'sejuta.badai', 
        'agak.koplak', 'strawberry.shortcake', 'cinnamon.girl', 'satria.bajahitam',
        'malam.minggu', 'hujan.gerimis', 'kopi.pahit', 'luka.luka',
        'senja.redup', 'kota.tua', 'patah.hati', 'move.on'
    ];
    
    // Cache untuk menyimpan mapping userId -> username
    const usernameCache = new Map();
    
    // ========== GENERATE KONSISTEN USERNAME DARI USER ID ==========
    function getUsernameFromUserId(userId) {
        if (!userId) return 'anonymous';
        
        // Cek cache dulu
        if (usernameCache.has(userId)) {
            return usernameCache.get(userId);
        }
        
        // Generate username konsisten dari userId
        // Gunakan hash sederhana untuk memilih username yang sama setiap kali
        let hash = 0;
        for (let i = 0; i < userId.length; i++) {
            hash = ((hash << 5) - hash) + userId.charCodeAt(i);
            hash |= 0; // Convert ke 32-bit integer
        }
        
        const index = Math.abs(hash) % AVAILABLE_USERNAMES.length;
        const username = AVAILABLE_USERNAMES[index];
        
        // Simpan di cache
        usernameCache.set(userId, username);
        
        console.log(`[Username] Mapped ${userId.substring(0,8)}... → @${username}`);
        return username;
    }
    
    // ========== SAFE GET ELEMENT ==========
    function $(id) {
        const el = document.getElementById(id);
        if (!el) console.warn('Element not found:', id);
        return el;
    }
    
    // ========== FETCH USER ENTRIES ==========
    async function fetchUserEntries() {
        try {
            console.log('[Supabase] Fetching entries...');
            
            const response = await fetch(
                `${SUPABASE_URL}/rest/v1/entries?` + 
                `select=*&` +
                `order=created_at.desc&` +
                `limit=10`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                }
            );
            
            if (!response.ok) {
                throw new Error(`HTTP error ${response.status}`);
            }
            
            const data = await response.json();
            console.log('[Supabase] Data received:', data.length, 'entries');
            
            if (data && data.length > 0) {
                // Tampilkan mapping untuk debugging
                console.log('=== USERNAME MAPPING ===');
                
                // Format data dengan username yang proper dari mapping
                userEntries = data.map(entry => {
                    const username = getUsernameFromUserId(entry.user_id);
                    
                    // Log mapping untuk debugging
                    console.log(`${entry.user_id.substring(0,8)}... → @${username} : "${entry.content?.substring(0,30)}..."`);
                    
                    return {
                        author: username, // PAKAI USERNAME BUKAN UUID!
                        mood: entry.mood || 'chaotic',
                        content: entry.content || '...',
                        reactions: entry.reactions || { skull: 0, cry: 0, fire: 0, upside: 0 },
                        created_at: entry.created_at,
                        is_ai: false
                    };
                });
                
                console.log('========================');
            } else {
                console.log('[Supabase] No entries found, using dummy data');
                userEntries = getDummyEntries();
            }
            
        } catch (error) {
            console.error('[Supabase] Error:', error);
            userEntries = getDummyEntries();
        }
        
        combineAndRender();
    }
    
    // ========== DATA DUMMY ==========
    function getDummyEntries() {
        return [
            {
                author: 'beby.manis',
                mood: 'chaotic',
                content: 'hari ini nangis karena liat mantan bahagia, padahal udah move on 3 bulan',
                reactions: { skull: 15, cry: 30, fire: 2, upside: 5 },
                created_at: new Date().toISOString(),
                is_ai: false
            },
            {
                author: 'chili.padi',
                mood: 'thriving',
                content: 'akhirnya sidang ACC, lulus 🥳🥳🥳',
                reactions: { skull: 3, cry: 2, fire: 45, upside: 8 },
                created_at: new Date(Date.now() - 3600000).toISOString(),
                is_ai: false
            },
            {
                author: 'pretty.sad',
                mood: 'doom',
                content: 'ga semangat ngapa-ngapain 😭😭😭',
                reactions: { skull: 22, cry: 35, fire: 1, upside: 4 },
                created_at: new Date(Date.now() - 7200000).toISOString(),
                is_ai: false
            }
        ];
    }
    
    // ========== GENERATE AI ENTRIES ==========
    function generateAIEntries(count = 6) {
        const authors = ['sejuta.badai', 'agak.koplak', 'strawberry.shortcake', 'cinnamon.girl', 'satria.bajahitam', 'malam.minggu', 'hujan.gerimis', 'kopi.pahit'];
        const moods = ['surviving', 'thriving', 'chaotic', 'doom'];
        
        const contents = {
            surviving: [
                'deadline skripsi makin deket, anxiety naik turun 😮‍💨',
                'capek banget hari ini, pengen rebahan aja 🥲',
                'bangun tidur langsung overthinking masa depan'
            ],
            thriving: [
                'alhamdulillah hari ini cuan! 💰',
                'akhirnya sidang kelar, nilai A alhamdulillah',
                'hari ini closing 3 client dalam sehari'
            ],
            chaotic: [
                'client minta revisi jam 11 malem, this is fine 🔥',
                'hidup lagi kacau balau 🔥',
                'hari ini chaotic banget: pagi dimarahin boss'
            ],
            doom: [
                'motor mogok, dompet tipis, pacar ngambek. triple combo 🫠',
                'rasanya pengen rebahan aja selamanya 🛌',
                'udah 6 bulan nganggur, lamaran kerja ga ada yang dipanggil'
            ]
        };
        
        // Buat AI entries dengan timestamp lebih lama (7-30 hari yang lalu)
        const entries = Array(count).fill().map(() => {
            const author = authors[Math.floor(Math.random() * authors.length)];
            const mood = moods[Math.floor(Math.random() * moods.length)];
            const contentList = contents[mood];
            const content = contentList[Math.floor(Math.random() * contentList.length)];
            
            // Random antara 7-30 hari yang lalu biar real entries lebih baru
            const daysAgo = 7 + Math.floor(Math.random() * 23);
            const timestamp = new Date(Date.now() - daysAgo * 24 * 60 * 60 * 1000);
            
            return {
                author,
                mood,
                content,
                reactions: {
                    skull: Math.floor(Math.random() * 30) + 5,
                    cry: Math.floor(Math.random() * 40) + 10,
                    fire: Math.floor(Math.random() * 20) + 1,
                    upside: Math.floor(Math.random() * 15) + 2
                },
                is_ai: true,
                created_at: timestamp.toISOString()
            };
        });
        
        return entries;
    }
    
    // ========== INIT AI ENTRIES ==========
    function initAIEntries() {
        aiEntries = generateAIEntries(6);
        combineAndRender();
        
        // Generator setiap 3 menit
        if (aiGeneratorTimer) clearInterval(aiGeneratorTimer);
        aiGeneratorTimer = setInterval(() => {
            console.log('[AI] Generating new entry...');
            const newEntry = generateAIEntries(1)[0];
            aiEntries = [newEntry, ...aiEntries.slice(0, 5)];
            combineAndRender();
        }, 180000); // 3 menit
    }
    
    // ========== GABUNG & URUTKAN ==========
    function combineAndRender() {
        allEntries = [...userEntries, ...aiEntries];
        
        // Urutkan berdasarkan created_at (terbaru di atas)
        allEntries.sort((a, b) => {
            return new Date(b.created_at) - new Date(a.created_at);
        });
        
        renderSpills();
    }
    
    // ========== RENDER SPILLS ==========
    function renderSpills() {
        const container = $('spillsList');
        if (!container) return;
        
        if (allEntries.length === 0) {
            container.innerHTML = '<div class="empty-state">🍃 Belum ada spill</div>';
            return;
        }
        
        let html = '';
        allEntries.forEach((spill, index) => {
            // Hitung jumlah total reactions untuk badge (optional)
            const totalReactions = (spill.reactions.skull || 0) + 
                                  (spill.reactions.cry || 0) + 
                                  (spill.reactions.fire || 0) + 
                                  (spill.reactions.upside || 0);
            
            html += `
                <div class="spill-card">
                    <div class="spill-header">
                        <span class="spill-author">@${spill.author}</span>
                        <span class="spill-mood ${spill.mood}">${spill.mood.toUpperCase()}</span>
                    </div>
                    <div class="spill-content">
                        ${spill.content}
                    </div>
                    
                    <div class="spill-reactions">
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'skull')">
                            💀 <span class="react-count">${spill.reactions.skull || 0}</span>
                        </button>
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'cry')">
                            😭 <span class="react-count">${spill.reactions.cry || 0}</span>
                        </button>
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'fire')">
                            🔥 <span class="react-count">${spill.reactions.fire || 0}</span>
                        </button>
                        <button class="react-btn" onclick="window.reactToSpill(${index}, 'upside')">
                            🙃 <span class="react-count">${spill.reactions.upside || 0}</span>
                        </button>
                    </div>
                    
                    ${spill.is_ai ? '<div class="ai-badge" style="display:none;">🤖</div>' : ''}
                </div>
            `;
        });
        
        container.innerHTML = html;
        
        const meta = $('feedMeta');
        if (meta) meta.textContent = allEntries.length + ' spill';
    }
    
    // ========== REACTION HANDLER ==========
    window.reactToSpill = function(index, type) {
        const spill = allEntries[index];
        if (!spill) return;
        
        spill.reactions[type] = (spill.reactions[type] || 0) + 1;
        renderSpills();
        
        // TODO: nanti POST ke Supabase
        console.log(`[Reaction] ${type} on @${spill.author}'s spill`);
    };
    
    // ========== RADAR (SAMA) ==========
    let rdots = [];
    let needleA = 0, needleO = 0, phA = Math.random() * Math.PI * 2;
    const BASE_OM = (60/4 * Math.PI * 2) / (60 * 60);
    const TRAIL_CAP = 120;
    const trail = new Float32Array(TRAIL_CAP);
    let trailPtr = 0;
    const dotGlow = new Map();
    let radarRAF = null;
    let radarInterval = null;
    
    function initRadar() {
        const cv = $('radarCanvas');
        const ct = $('radarCont');
        if (!cv || !ct) return;
        
        const resize = () => {
            const r = ct.getBoundingClientRect();
            if (r.width > 0 && r.height > 0) {
                cv.width = r.width;
                cv.height = r.height;
            }
        };
        resize();
        window.addEventListener('resize', resize);
        
        spawnDots();
        if (radarInterval) clearInterval(radarInterval);
        radarInterval = setInterval(() => {
            rdots.forEach(d => {
                d.vx = d.vx * 0.88 + (Math.random() - 0.5) * 0.3;
                d.vy = d.vy * 0.88 + (Math.random() - 0.5) * 0.3;
                d.x = Math.max(9, Math.min(91, d.x + d.vx));
                d.y = Math.max(9, Math.min(91, d.y + d.vy));
                if (d.el) {
                    d.el.style.left = d.x + '%';
                    d.el.style.top = d.y + '%';
                }
            });
        }, 100);
        
        needleA = Math.random() * Math.PI * 2;
        trail.fill(needleA);
        radarLoop(cv);
    }
    
    function spawnDots() {
        const c = $('radarDots');
        if (!c) return;
        c.innerHTML = '';
        rdots = [];
        const types = ['ai', 'purple', 'red', 'lime'];
        for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            const d = 12 + Math.random() * 70;
            const x = 50 + Math.cos(a) * d / 2;
            const y = 50 + Math.sin(a) * d / 2;
            const dot = document.createElement('div');
            const type = types[Math.floor(Math.random() * types.length)];
            dot.className = 'radar-dot ' + type;
            dot.style.left = x + '%';
            dot.style.top = y + '%';
            c.appendChild(dot);
            rdots.push({ el: dot, x, y, vx: 0, vy: 0, type, id: i });
        }
    }
    
    function radarLoop(cv) {
        const ctx = cv.getContext('2d');
        function draw() {
            const W = cv.width, H = cv.height;
            const cx = W / 2, cy = H / 2;
            const R = Math.min(cx, cy) * 0.88;
            
            if (!W || !H) {
                radarRAF = requestAnimationFrame(draw);
                return;
            }
            
            phA += 0.007;
            needleO += (BASE_OM * (1 + Math.sin(phA) * 0.35) - needleO) * 0.028;
            needleA = (needleA + needleO) % (Math.PI * 2);
            trail[trailPtr] = needleA;
            trailPtr = (trailPtr + 1) % TRAIL_CAP;
            
            ctx.fillStyle = 'rgba(2,10,2,0.18)';
            ctx.fillRect(0, 0, W, H);
            
            for (let i = 0; i < TRAIL_CAP - 1; i++) {
                const alpha = Math.pow(1 - i / TRAIL_CAP, 2.2) * 0.12;
                if (alpha < 0.002) break;
                const s = needleA - (i + 1) * needleO;
                const e = needleA - i * needleO;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, Math.min(s, e), Math.max(s, e), false);
                ctx.closePath();
                ctx.fillStyle = `rgba(0,229,255,${alpha})`;
                ctx.fill();
                ctx.restore();
            }
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(needleA);
            ctx.shadowColor = 'rgba(0,229,255,0.95)';
            ctx.shadowBlur = 12;
            const lg = ctx.createLinearGradient(0, 0, R, 0);
            lg.addColorStop(0, 'rgba(0,229,255,1)');
            lg.addColorStop(0.8, 'rgba(0,229,255,0.4)');
            lg.addColorStop(1, 'rgba(0,229,255,0)');
            ctx.beginPath();
            ctx.moveTo(3, 0);
            ctx.lineTo(R, 0);
            ctx.strokeStyle = lg;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.rect(-4, -4, 8, 8);
            ctx.fillStyle = '#00e5ff';
            ctx.fill();
            ctx.restore();
            
            rdots.forEach((d, di) => {
                const px = d.x / 100 * W;
                const py = d.y / 100 * H;
                let da = Math.atan2(py - cy, px - cx);
                if (da < 0) da += Math.PI * 2;
                let diff = needleA - da;
                if (diff < 0) diff += Math.PI * 2;
                const age = dotGlow.get(di) ?? 999;
                
                if (diff < 0.18 && age > 30) {
                    dotGlow.set(di, 0);
                    if (d.el) {
                        d.el.classList.add('active');
                        setTimeout(() => d.el?.classList.remove('active'), 800);
                    }
                } else {
                    dotGlow.set(di, age + 1);
                }
                
                if (age < 55) {
                    const t = age / 55;
                    const ga = (1 - t) * (1 - t) * 0.9;
                    if (ga < 0.01) return;
                    const col = d.type === 'purple' ? '191,90,242' :
                               d.type === 'red' ? '255,45,85' :
                               d.type === 'lime' ? '191,255,0' : '0,229,255';
                    const gr = ctx.createRadialGradient(px, py, 0, px, py, 16 * (1 - t) + 3);
                    gr.addColorStop(0, `rgba(${col},${ga})`);
                    gr.addColorStop(1, `rgba(${col},0)`);
                    ctx.beginPath();
                    ctx.arc(px, py, 16 * (1 - t) + 3, 0, Math.PI * 2);
                    ctx.fillStyle = gr;
                    ctx.fill();
                }
            });
            
            radarRAF = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ========== VIBE CHECK ==========
    function startVibeCheck(type) {
        console.log(`[Vibe] ${type} clicked`);
        
        const overlay = $('waitingOverlay');
        const icon = $('waitingIcon');
        if (overlay && icon) {
            icon.textContent = type === 'heart' ? '❤️' : '♠️';
            overlay.style.display = 'flex';
            
            let seconds = 15;
            const timerEl = $('waitingTimer');
            if (timerEl) timerEl.textContent = seconds;
            
            const timer = setInterval(() => {
                seconds--;
                if (timerEl) timerEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                    
                    const room = $('chatRoom');
                    if (room) room.classList.add('on');
                }
            }, 1000);
            
            const cancelBtn = $('cancelWaiting');
            if (cancelBtn) {
                cancelBtn.onclick = () => {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                };
            }
        }
    }
    
    // ========== INIT ==========
    window.addEventListener('load', async function() {
        console.log('[App] Starting...');
        
        // Set username
        const userEl = $('userNameDisplay');
        if (userEl) {
            const saved = localStorage.getItem('spill_username') || 'beby.manis';
            userEl.textContent = '@' + saved;
        }
        
        // Set online count
        const onlineEl = $('onlineCount');
        if (onlineEl) onlineEl.textContent = '21 ONLINE';
        
        // Init radar
        setTimeout(initRadar, 100);
        
        // Fetch data
        await fetchUserEntries();
        initAIEntries();
        
        // ===== TOMBOL HEART & SPADE =====
        const heartBtn = $('vibeFemaleBtn');
        const spadeBtn = $('vibeMaleBtn');
        const whisperBtn = $('whisperBtn');
        const closeChatBtn = $('closeChatBtn');
        const sendBtn = $('sendButton');
        const chatInput = $('chatInput');
        const slider = $('vibeSlider');
        const pct = $('vibePct');
        
        if (heartBtn) {
            heartBtn.onclick = (e) => {
                e.preventDefault();
                startVibeCheck('heart');
            };
        }
        
        if (spadeBtn) {
            spadeBtn.onclick = (e) => {
                e.preventDefault();
                startVibeCheck('spade');
            };
        }
        
        if (whisperBtn) {
            whisperBtn.onclick = () => {
                alert('✨ Whisperer mode (premium)');
            };
        }
        
        if (closeChatBtn) {
            closeChatBtn.onclick = () => {
                const room = $('chatRoom');
                if (room) room.classList.remove('on');
            };
        }
        
        if (sendBtn && chatInput) {
            sendBtn.onclick = () => {
                const msg = chatInput.value.trim();
                if (msg) {
                    const msgs = $('chatMessages');
                    if (msgs) {
                        msgs.innerHTML += `<div style="text-align: right; margin: 10px 0;"><span style="background: var(--as); padding: 8px 12px; display: inline-block;">${msg}</span></div>`;
                        chatInput.value = '';
                        msgs.scrollTop = msgs.scrollHeight;
                    }
                }
            };
            
            chatInput.onkeypress = (e) => {
                if (e.key === 'Enter') sendBtn.click();
            };
        }
        
        if (slider && pct) {
            slider.oninput = function() {
                pct.textContent = this.value + '%';
            };
        }
        
        console.log('[App] Ready!');
    });
})();
</script>
