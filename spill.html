<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — TEST</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: monospace; padding: 20px; }
        .app { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; padding: 20px; background: #111; border: 2px solid #333; }
        .logo { font-size: 32px; }
        .spills-sect { margin-top: 20px; padding: 20px; background: #111; border: 2px solid #333; }
        .spill-card { background: #1a1a1a; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .spill-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .spill-author { color: #00e5ff; }
        .spill-mood { padding: 4px 8px; background: #333; }
        .spill-mood.chaotic { background: #ff00ff; }
        .spill-reactions { display: flex; gap: 10px; margin-top: 10px; }
        .react-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 10px; cursor: pointer; }
        .empty-state { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">SP<span>✕</span>LL</div>
            <span class="user-badge" id="userNameDisplay">@beby.manis</span>
        </div>
        
        <!-- SPILLS SECTION -->
        <div class="spills-sect">
            <div class="sect-header" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <div class="sect-title">SPILL TERKINI</div>
                <span id="feedMeta">0 spill</span>
            </div>
            <div id="spillsList">
                <div class="empty-state">🍃 MEMUAT SPILL...</div>
            </div>
        </div>
    </div>

    <script>
    // Simple test
    console.log('✅ HTML Loaded');
    document.body.style.border = '5px solid red';
    
    // Test data
    setTimeout(() => {
        const container = document.getElementById('spillsList');
        if (container) {
            container.innerHTML = `
                <div class="spill-card">
                    <div class="spill-header">
                        <span class="spill-author">@test.user</span>
                        <span class="spill-mood chaotic">CHAOTIC</span>
                    </div>
                    <div class="spill-content">Test spill content</div>
                    <div class="spill-reactions">
                        <button class="react-btn">💀 10</button>
                        <button class="react-btn">😭 20</button>
                    </div>
                </div>
            `;
            document.getElementById('feedMeta').textContent = '1 spill';
        }
    }, 1000);
    </script>
</body>
</html>
