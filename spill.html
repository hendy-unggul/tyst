<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    
    <!-- SHARED CSS -->
    <link rel="stylesheet" href="/shared.css">
    
    <style>
        /* ========== SPILL-SPECIFIC STYLES ========== */
        :root {
            --bg: #0a0a0a;
            --sf: #111111;
            --bd: #222222;
            --bd2: #333333;
            --tx: #ffffff;
            --txs: #888888;
            --ap: #ff3b6f;
            --as: #00e5ff;
            --aq: #ccff00;
            --purple: #9900ff;
            --font-display: 'Arial Black', sans-serif;
            --font-mono: 'Courier New', monospace;
            --font-body: 'Arial', sans-serif;
            --st: 0px;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: var(--bg); 
            color: var(--tx); 
            font-family: var(--font-body); 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app { 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            border-left: 2px solid var(--bd);
            border-right: 2px solid var(--bd);
            position: relative;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 2px solid var(--bd);
            background: var(--sf);
            position: relative;
        }
        
        .logo {
            font-family: var(--font-display);
            font-size: 34px;
        }
        
        .logo .x {
            color: var(--ap);
            display: inline-block;
            animation: spin 4s infinite;
        }
        
        @keyframes spin {
            95% { transform: rotate(180deg); }
        }
        
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-badge {
            font-family: var(--font-mono);
            background: #000;
            border: 2px solid var(--bd);
            padding: 4px 8px;
            color: var(--as);
            font-size: 12px;
        }
        
        .settings-btn {
            width: 30px;
            height: 30px;
            background: transparent;
            border: 2px solid var(--bd2);
            color: var(--txs);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: 0.1s;
        }
        
        .settings-btn:active {
            border-color: var(--as);
            color: var(--as);
        }
        
        .settings-dropdown {
            position: absolute;
            top: 60px;
            right: 18px;
            background: var(--sf);
            border: 2px solid var(--bd);
            box-shadow: 6px 6px 0 #000;
            z-index: 100;
            min-width: 180px;
            display: none;
        }
        
        .settings-dropdown.show {
            display: block;
        }
        
        .dropdown-item {
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--tx);
            cursor: pointer;
            border-bottom: 1px solid var(--bd);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .dropdown-item:last-child {
            border-bottom: none;
        }
        
        .dropdown-item:active {
            background: var(--bd);
        }
        
        .dropdown-item.language {
            display: flex;
            justify-content: space-between;
        }
        
        .language-select {
            display: flex;
            gap: 8px;
        }
        
        .lang-option {
            padding: 2px 8px;
            border: 1px solid var(--bd2);
            color: var(--txs);
            cursor: pointer;
        }
        
        .lang-option.active {
            background: var(--as);
            color: black;
            border-color: var(--as);
        }
        
        .scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 62px;
            scrollbar-width: thin;
            scrollbar-color: var(--bd2) var(--bg);
        }
        
        .scroll::-webkit-scrollbar {
            width: 4px;
        }
        
        .scroll::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        .scroll::-webkit-scrollbar-thumb {
            background: var(--bd2);
            border-radius: 4px;
        }
        
        /* RADAR */
        .radar-sect {
            background: var(--sf);
            border-bottom: 2px solid var(--bd);
        }
        
        .radar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
        }
        
        .radar-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--as);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .online-badge {
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border: 1px solid var(--bd);
            font-family: var(--font-mono);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .online-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: switchIcon 2s infinite;
        }
        
        @keyframes switchIcon {
            0%, 45% { content: '❤️'; opacity: 1; color: var(--ap); }
            50%, 95% { content: '♠️'; opacity: 1; color: var(--as); }
            100% { content: '❤️'; opacity: 1; color: var(--ap); }
        }
        
        .online-icon::before {
            content: '❤️';
            color: var(--ap);
            animation: switchIcon 2s infinite;
        }
        
        .radar-wrapper {
            padding: 0 18px 16px;
        }
        
        .radar-bezel {
            position: relative;
            padding: 4px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            box-shadow: 6px 6px 0 #000;
        }
        
        .radar-cont {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #020a02;
            overflow: hidden;
        }
        
        .radar-grid {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px),
                repeating-linear-gradient(90deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px);
        }
        
        .radar-ring {
            position: absolute;
            inset: 8%;
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 50%;
        }
        
        .radar-ring::before {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0,229,255,0.05);
            inset: 28%;
        }
        
        .radar-cross {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(90deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(0deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px));
        }
        
        .radar-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: block;
        }
        
        .radar-dots {
            position: absolute;
            inset: 0;
            z-index: 5;
        }
        
        .radar-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            transform: translate(-50%,-50%) rotate(45deg);
            background: var(--as);
            opacity: 0.3;
            transition: opacity 0.1s;
        }
        
        .radar-dot.active {
            opacity: 1;
            transform: translate(-50%,-50%) rotate(45deg) scale(2.5);
        }
        
        /* TOMBOL GENDER */
        .radar-ctas {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .gender-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .btn-gender {
            flex: 1;
            padding: 18px 8px;
            border: 2px solid #000;
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.1s;
            background: var(--sf);
            color: var(--tx);
        }
        
        .btn-gender:active { 
            transform: translate(3px, 3px); 
            box-shadow: 2px 2px 0 #000; 
        }
        
        .btn-heart { 
            background: linear-gradient(145deg, var(--ap), #ff6b8b); 
            color: white; 
        }
        
        .btn-spade { 
            background: linear-gradient(145deg, var(--as), #4d7aff); 
            color: black; 
        }
        
        .gender-icon { 
            font-size: 38px; 
        }
        
        .gender-tag { 
            font-family: var(--font-mono); 
            font-size: 9px; 
            background: #000; 
            color: var(--aq); 
            padding: 4px 8px; 
        }
        
        .btn-whisper { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 2px dashed var(--bd2); 
            font-family: var(--font-body); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            color: var(--txs);
            transition: 0.1s;
        }
        
        .btn-whisper:active {
            border-color: var(--as);
            color: var(--as);
        }
        
        /* WHISPER MODE */
        .whisper-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1500;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .whisper-overlay.show {
            display: flex;
        }
        
        .whisper-box {
            background: var(--sf);
            border: 3px solid var(--as);
            padding: 25px;
            text-align: center;
            box-shadow: 12px 12px 0 #000;
            max-width: 350px;
            width: 90%;
        }
        
        .whisper-title {
            font-family: var(--font-display);
            font-size: 24px;
            color: var(--as);
            margin-bottom: 15px;
        }
        
        .whisper-input {
            width: 100%;
            padding: 15px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            color: var(--tx);
            font-family: var(--font-body);
            margin: 15px 0;
            resize: none;
            min-height: 100px;
        }
        
        .whisper-input:focus {
            border-color: var(--as);
            outline: none;
        }
        
        .whisper-timer {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--txs);
            margin-bottom: 15px;
        }
        
        .whisper-actions {
            display: flex;
            gap: 10px;
        }
        
        .whisper-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #000;
            font-family: var(--font-mono);
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            transition: 0.1s;
        }
        
        .whisper-btn.send {
            background: var(--as);
            color: black;
        }
        
        .whisper-btn.cancel {
            background: transparent;
            color: var(--txs);
        }
        
        .whisper-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        .whisper-message {
            background: var(--sf);
            border: 2px solid var(--as);
            padding: 15px;
            margin: 10px 0;
            position: relative;
            animation: whisperGlow 2s infinite;
        }
        
        @keyframes whisperGlow {
            0%, 100% { box-shadow: 0 0 5px var(--as); }
            50% { box-shadow: 0 0 15px var(--as); }
        }
        
        .whisper-timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--as);
            animation: timerShrink 5s linear forwards;
        }
        
        @keyframes timerShrink {
            from { width: 100%; }
            to { width: 0%; }
        }
        
        /* FILTER */
        .filter-sect {
            padding: 18px;
            border-bottom: 2px solid var(--bd);
        }
        
        .filter-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        
        .filter-title {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--txs);
            letter-spacing: 3px;
        }
        
        .match-pct {
            font-family: var(--font-display);
            font-size: 26px;
            color: var(--ap);
            transition: color 0.3s;
        }
        
        .vibe-slider {
            width: 100%;
            height: 4px;
            background: var(--bd2);
            -webkit-appearance: none;
            border-radius: 2px;
        }
        
        .vibe-slider::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            background: var(--ap);
            border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--ap), 3px 3px 0 #000;
            cursor: pointer;
            -webkit-appearance: none;
            border-radius: 50%;
            transition: 0.1s;
        }
        
        .vibe-slider::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }
        
        /* SPILLS */
        .spills-sect {
            padding: 18px;
        }
        
        .sect-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        
        .sect-title {
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .spill-card {
            background: var(--sf);
            border: 2px solid var(--bd2);
            margin-bottom: 20px;
            padding: 16px;
            box-shadow: 4px 4px 0 #000;
            position: relative;
            transition: 0.2s;
        }
        
        .spill-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }
        
        .spill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        
        .spill-author {
            color: var(--as);
        }
        
        .spill-mood {
            padding: 4px 8px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .spill-mood.surviving { 
            background: var(--ap); 
            color: white; 
        }
        
        .spill-mood.thriving { 
            background: var(--aq); 
            color: black; 
        }
        
        .spill-mood.chaotic { 
            background: var(--as); 
            color: black; 
        }
        
        .spill-mood.doom { 
            background: #9900ff; 
            color: white; 
        }
        
        .spill-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--tx);
            font-family: var(--font-body);
            margin-bottom: 12px;
        }
        
        .spill-reactions {
            display: flex;
            gap: 8px;
            border-top: 2px solid var(--bd);
            padding-top: 12px;
        }
        
        .react-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 8px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            color: var(--txs);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 14px;
            transition: 0.1s;
        }
        
        .react-btn:active {
            background: var(--bd2);
            transform: translate(2px, 2px);
        }
        
        .react-count {
            font-size: 11px;
            font-weight: bold;
        }
        
        .ai-badge {
            display: none;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--txs);
            font-family: var(--font-mono);
            font-size: 14px;
            border: 2px dashed var(--bd2);
        }
        
        /* BOTTOM NAV */
        .bottom-nav {
            background: var(--sf);
            border-top: 2px solid var(--bd);
            padding: 8px 12px;
            width: 100%;
            max-width: 500px;
            z-index: 50;
        }
        
        .nav-container {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }
        
        .nav-item {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--txs);
            cursor: pointer;
            padding: 10px 8px;
            transition: 0.1s;
            text-align: center;
            flex: 1;
            border: 1px solid transparent;
            user-select: none;
            text-decoration: none;
            display: block;
        }
        
        .nav-item:active {
            background: var(--bd);
            transform: scale(0.95);
        }
        
        .nav-item.active {
            color: var(--as);
            border-bottom: 2px solid var(--as);
            background: rgba(0,229,255,0.05);
        }
        
        /* CHAT ROOM */
        .chat-room {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 500;
            flex-direction: column;
        }
        
        .chat-room.on { display: flex; }
        
        .chat-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 18px;
            border-bottom: 2px solid var(--bd);
            background: var(--sf);
        }
        
        #partnerLabel {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--as);
            background: rgba(0,229,255,0.1);
            padding: 6px 14px;
            border: 1px solid var(--bd);
        }
        
        .chat-timer {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--aq);
            background: var(--bg);
            padding: 8px 14px;
            border: 2px solid var(--bd);
            box-shadow: 3px 3px 0 #000;
        }
        
        .chat-close {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 2px solid var(--bd);
            color: var(--txs);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-close:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--bd2) var(--bg);
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--bd2);
            border-radius: 4px;
        }
        
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }
        
        .message.user {
            align-self: flex-end;
            background: var(--as);
            color: black;
            border-bottom-right-radius: 4px;
        }
        
        .message.stranger {
            align-self: flex-start;
            background: var(--sf);
            color: var(--tx);
            border: 1px solid var(--bd2);
            border-bottom-left-radius: 4px;
        }
        
        .typing-indicator {
            align-self: flex-start;
            color: var(--txs);
            font-style: italic;
            font-size: 12px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .typing-dots {
            display: flex;
            gap: 3px;
        }
        
        .typing-dots span {
            width: 4px;
            height: 4px;
            background: var(--txs);
            border-radius: 50%;
            animation: typingDot 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }
        
        .chat-input-wrap {
            display: flex;
            gap: 10px;
            padding: 12px 18px;
            border-top: 2px solid var(--bd);
            background: var(--sf);
        }
        
        .chat-input {
            flex: 1;
            padding: 13px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            color: var(--tx);
            font-family: var(--font-body);
            outline: none;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .chat-input:focus {
            border-color: var(--as);
        }
        
        .chat-input::placeholder {
            color: var(--txs);
        }
        
        .chat-send {
            width: 48px;
            height: 48px;
            background: var(--ap);
            border: 2px solid #000;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-send:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        .chat-send.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--tx);
            color: var(--bg);
            padding: 12px 22px;
            z-index: 2000;
            opacity: 0;
            transition: 0.25s;
            border: 2px solid #000;
            box-shadow: 4px 4px 0 #000;
            border-radius: 30px;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.error {
            background: var(--ap);
            color: #fff;

            const y = 50 + Math.sin(a) * d / 2;
            const dot = document.createElement('div');
            dot.className = 'radar-dot';
            dot.style.left = x + '%';
            dot.style.top = y + '%';
            c.appendChild(dot);
            rdots.push({ el: dot, x, y, vx: 0, vy: 0, id: i });
        }
    }
    
    function radarLoop(cv) {
        const ctx = cv.getContext('2d');
        function draw() {
            const W = cv.width, H = cv.height;
            const cx = W / 2, cy = H / 2;
            const R = Math.min(cx, cy) * 0.88;
            
            if (!W || !H) {
                radarRAF = requestAnimationFrame(draw);
                return;
            }
            
            phA += 0.007;
            needleO += (BASE_OM * (1 + Math.sin(phA) * 0.35) - needleO) * 0.028;
            needleA = (needleA + needleO) % (Math.PI * 2);
            trail[trailPtr] = needleA;
            trailPtr = (trailPtr + 1) % TRAIL_CAP;
            
            ctx.fillStyle = 'rgba(2,10,2,0.18)';
            ctx.fillRect(0, 0, W, H);
            
            for (let i = 0; i < TRAIL_CAP - 1; i++) {
                const alpha = Math.pow(1 - i / TRAIL_CAP, 2.2) * 0.12;
                if (alpha < 0.002) break;
                const s = needleA - (i + 1) * needleO;
                const e = needleA - i * needleO;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, Math.min(s, e), Math.max(s, e), false);
                ctx.closePath();
                ctx.fillStyle = `rgba(0,229,255,${alpha})`;
                ctx.fill();
                ctx.restore();
            }
            
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(needleA);
            ctx.shadowColor = 'rgba(0,229,255,0.95)';
            ctx.shadowBlur = 12;
            const lg = ctx.createLinearGradient(0, 0, R, 0);
            lg.addColorStop(0, 'rgba(0,229,255,1)');
            lg.addColorStop(0.8, 'rgba(0,229,255,0.4)');
            lg.addColorStop(1, 'rgba(0,229,255,0)');
            ctx.beginPath();
            ctx.moveTo(3, 0);
            ctx.lineTo(R, 0);
            ctx.strokeStyle = lg;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.rect(-4, -4, 8, 8);
            ctx.fillStyle = '#00e5ff';
            ctx.fill();
            ctx.restore();
            
            rdots.forEach((d, di) => {
                const px = d.x / 100 * W;
                const py = d.y / 100 * H;
                let da = Math.atan2(py - cy, px - cx);
                if (da < 0) da += Math.PI * 2;
                let diff = needleA - da;
                if (diff < 0) diff += Math.PI * 2;
                const age = dotGlow.get(di) ?? 999;
                
                if (diff < 0.18 && age > 30) {
                    dotGlow.set(di, 0);
                    if (d.el) {
                        d.el.classList.add('active');
                        setTimeout(() => d.el?.classList.remove('active'), 800);
                    }
                } else {
                    dotGlow.set(di, age + 1);
                }
                
                if (age < 55) {
                    const t = age / 55;
                    const ga = (1 - t) * (1 - t) * 0.9;
                    if (ga < 0.01) return;
                    const gr = ctx.createRadialGradient(px, py, 0, px, py, 16 * (1 - t) + 3);
                    gr.addColorStop(0, `rgba(0,229,255,${ga})`);
                    gr.addColorStop(1, `rgba(0,229,255,0)`);
                    ctx.beginPath();
                    ctx.arc(px, py, 16 * (1 - t) + 3, 0, Math.PI * 2);
                    ctx.fillStyle = gr;
                    ctx.fill();
                }
            });
            
            radarRAF = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ========== VIBE CHECK ==========

        overlay.style.display = 'flex';

        timerEl.textContent = seconds;

                }
            }
        }, 1000);
        
        const checkInterval = setInterval(() => {
            // Placeholder untuk real user
        }, 2000);

    // ========== OPEN CHAT ==========
    function openChat(characterName) {
        const chatRoom = $('chatRoom');
        const partnerLabel = $('partnerLabel');
        const chatMessages = $('chatMessages');
        const chatTimer = $('chatTimer');
        
        if (!chatRoom || !partnerLabel || !chatMessages) return;
        
        partnerLabel.textContent = 'STRANGER';
        if (chatTimer) chatTimer.textContent = '15:00';
        chatMessages.innerHTML = '';
        chatRoom.classList.add('on');
        
        currentAIPartner = characterName;
        chatHistory = [];
        
        setTimeout(() => {
            sendMessage('', true);
        }, 500);
    }
    
    // ========== SEND MESSAGE ==========
    async function sendMessage(message, isFirst = false) {
        if (!currentAIPartner) return;
        
        if (!isFirst) {
            addMessage('user', message);
        }
        
        showTypingIndicator();
        isTyping = true;
        
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: message || 'hai',
                    characterName: currentAIPartner,
                    lastMessages: chatHistory
                })
            });
            
            if (!response.ok) throw new Error(`HTTP error ${response.status}`);
            
            const data = await response.json();
            
            if (message) {
                chatHistory.push({ role: 'assistant', content: data.reply });
            }
            
            hideTypingIndicator();
            isTyping = false;
            
            await typeMessage('stranger', data.reply, data.typing);
            
        } catch (error) {
            console.error('[Chat] Error:', error);
            hideTypingIndicator();
            isTyping = false;
            addMessage('stranger', '😅');
        }
    }
    
    // ========== TYPING EFFECT ==========
    async function typeMessage(sender, fullText, typingInfo) {
        const chatMessages = $('chatMessages');
        if (!chatMessages) return;
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        chatMessages.appendChild(messageDiv);
        
        const words = fullText.split(' ');
        let currentText = '';
        let wordIndex = 0;
        let charIndex = 0;
        
        return new Promise((resolve) => {
            function typeNextChar() {
                if (wordIndex >= words.length) {
                    resolve();
                    return;
                }
                
                const currentWord = words[wordIndex];
                
                if (charIndex < currentWord.length) {
                    currentText += currentWord[charIndex];
                    messageDiv.textContent = currentText + (wordIndex < words.length - 1 ? ' ' : '');
                    charIndex++;
                    
                    let delay = typingInfo?.speed || 80;
                    if (typingInfo?.wordSpeedFactors?.[wordIndex]) {
                        delay *= typingInfo.wordSpeedFactors[wordIndex];
                    }
                    
                    setTimeout(typeNextChar, delay);
                } else {
                    wordIndex++;
                    charIndex = 0;
                    
                    if (wordIndex < words.length) {
                        currentText += ' ';
                        let wordPause = typingInfo?.wordPause || 150;
                        
                        if (typingInfo?.longPause?.has && typingInfo.longPause.position === wordIndex) {
                            wordPause = typingInfo.longPause.duration;
                        }
                        
                        setTimeout(typeNextChar, wordPause);
                    } else {
                        messageDiv.textContent = fullText;
                        
                        if (typingInfo?.backspace?.has) {
                            simulateBackspace(messageDiv, fullText, typingInfo.backspace.count, resolve);
                        } else {
                            resolve();
                        }
                    }
                }
            }
            
            function simulateBackspace(element, originalText, count, resolve) {
                let text = originalText;
                let backspaceCount = 0;
                
                function doBackspace() {
                    if (backspaceCount < count) {
                        text = text.slice(0, -1);
                        element.textContent = text + '...';
                        backspaceCount++;
                        setTimeout(doBackspace, 200);
                    } else {
                        element.textContent = originalText;
                        setTimeout(resolve, 300);
                    }
                }
                
                setTimeout(doBackspace, 500);
            }
            
            setTimeout(typeNextChar, typingInfo?.initialDelay || 500);
        });
    }
    
    // ========== ADD MESSAGE ==========
    function addMessage(sender, text) {
        const chatMessages = $('chatMessages');
        if (!chatMessages) return;
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        messageDiv.textContent = text;
        
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

        chatMessages.appendChild(indicator);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }
