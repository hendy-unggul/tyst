<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SPILL — vibe radar</title>
<link rel="stylesheet" href="/shared.css">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;--sf:#141414;--sfe:#1E1E1E;--bd:#2A2A2A;--bd2:#333;--tx:#FFF;--txs:#888;--txm:#555;
  --spill:#ff3b6f;--cocomeo:#00e5ff;--jejak:#9900ff;--glitch:#FFD700;
  --ap:var(--spill);--as:var(--cocomeo);--at:#FF006E;--aq:#bfff00;--aw:#FFD700;
  --ms:#FF9500;--mt:#bfff00;--mc:#00e5ff;--md:#8B5CF6;--rd:#FF3333;--void:#050505;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:var(--font-body);font-weight:500;font-size:15px;line-height:1.4;min-height:100vh;padding-bottom:100px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4}
.w{max-width:480px;margin:0 auto;padding:0 16px}

/* ===== HEADER ===== */
header{padding:24px 0 16px;display:flex;justify-content:space-between;align-items:flex-start}
.logo{font-size:42px;font-weight:800;font-family:var(--font-display);cursor:pointer;line-height:.9}
.logo .x{color:var(--spill);display:inline-block;animation:spin 4s infinite}
@keyframes spin{95%{transform:rotate(180deg)}}
.tagline{font-family:'Instrument Serif',serif;font-size:13px;color:var(--txs);font-style:italic;margin-top:4px}
.top-right{display:flex;align-items:center;gap:8px}
.huser{font-size:11px;background:var(--sf);border:1px solid var(--bd);padding:4px 8px;color:var(--tx);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:8px;height:8px;background:var(--aq);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.smenu{position:relative}
.mtrig{width:32px;height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;cursor:pointer}
.mtrig span{width:4px;height:4px;background:var(--tx);border-radius:50%}
.mtrig:hover span{background:var(--spill)}
.mdd{position:absolute;top:100%;right:0;margin-top:8px;background:var(--sf);border:2px solid var(--bd);min-width:120px;display:none;z-index:100}
.mdd.on{display:block}
.mi{width:100%;padding:8px 16px;background:transparent;border:none;color:var(--tx);font-family:var(--font-body);font-size:12px;font-weight:600;text-align:left;cursor:pointer}
.mi:hover{background:var(--sfe);color:var(--spill)}

/* ===== VIBE RADAR ===== */
.radar-sect{background:var(--sf);border-bottom:2px solid var(--bd)}
.radar-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
.radar-label{font-family:var(--font-mono);font-size:10px;color:var(--spill)}
.online-badge{background:rgba(0,0,0,.3);padding:6px 12px;border:1px solid var(--bd);font-family:var(--font-mono);font-size:11px}
.radar-wrapper{padding:0 18px 16px}
.radar-bezel{position:relative;padding:4px;background:var(--bg);border:2px solid var(--bd2);box-shadow:6px 6px 0 #000}
.radar-cont{position:relative;width:100%;aspect-ratio:1;background:#020a02;overflow:hidden}
.radar-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:10}
.radar-ctas{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px}
.gender-row{display:flex;gap:10px}
.btn-vibe{flex:1;padding:18px 8px;border:2px solid #000;font-family:var(--font-display);font-size:18px;cursor:pointer;box-shadow:5px 5px 0 #000;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--sf)}
.btn-vibe:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000}
.btn-soft{background:linear-gradient(145deg,var(--spill),#ff6b8b);color:#fff}
.btn-hot{background:linear-gradient(145deg,var(--cocomeo),#4d7aff);color:#000}
.vibe-icon{font-size:38px}
.vibe-temp{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:14px;background:rgba(0,0,0,.3);padding:4px 12px;border-radius:20px}
.btn-whisper{width:100%;padding:14px;background:0 0;border:2px dashed var(--bd2);cursor:pointer;display:flex;justify-content:space-between;color:var(--txs)}

/* ===== FILTER ===== */
.filter-sect{padding:18px;border-bottom:2px solid var(--bd)}
.filter-top{display:flex;justify-content:space-between;margin-bottom:14px}
.filter-title{font-family:var(--font-mono);font-size:9px;color:var(--txs);letter-spacing:3px}
.match-pct{font-family:var(--font-display);font-size:26px;color:var(--spill)}
.vibe-slider{width:100%;height:4px;background:var(--bd2);-webkit-appearance:none}
.vibe-slider::-webkit-slider-thumb{width:20px;height:20px;background:var(--spill);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--spill),3px 3px 0 #000;cursor:pointer;-webkit-appearance:none;border-radius:50%}

/* ===== SPILLS ===== */
.spills-sect{padding:18px}
.sect-header{display:flex;justify-content:space-between;margin-bottom:18px;font-family:var(--font-mono);font-size:12px}
.spill-card{background:var(--sf);border:2px solid var(--bd2);margin-bottom:20px;padding:16px;box-shadow:4px 4px 0 #000}
.spill-header{display:flex;justify-content:space-between;margin-bottom:12px;font-family:var(--font-mono);font-size:12px}
.spill-author{color:var(--spill)}
.spill-mood{padding:4px 8px;font-size:10px;font-weight:700;border:1px solid currentColor}
.spill-mood.surviving{color:var(--ms)}.spill-mood.thriving{color:var(--mt)}.spill-mood.chaotic{color:var(--mc)}.spill-mood.doom{color:var(--md)}
.spill-content{font-size:14px;line-height:1.6;color:var(--tx);margin-bottom:12px}
.spill-reactions{display:flex;gap:8px;border-top:2px solid var(--bd);padding-top:12px}
.react-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;background:var(--bg);border:2px solid var(--bd2);color:var(--txs);cursor:pointer;font-family:var(--font-mono);font-size:14px}
.react-btn:active{background:var(--bd2);transform:translate(2px,2px)}
.react-btn.act{border-color:var(--spill);background:var(--spill);color:#000}
.rcount{font-size:11px;font-weight:700}

/* ===== CHAT ROOM ===== */
.chat-room{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column}
.chat-room.on{display:flex}
.chat-head{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:2px solid var(--bd);background:var(--sf)}
#partnerLabel{padding:6px 14px;border:1px solid var(--bd)}
.chat-timer{font-family:var(--font-display);font-size:22px;color:var(--aq);background:var(--bg);padding:8px 14px;border:2px solid var(--bd);box-shadow:3px 3px 0 #000}
.chat-close{width:40px;height:40px;background:var(--bg);border:2px solid var(--bd);cursor:pointer}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.message{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px}
.message.user{align-self:flex-end;background:var(--spill);color:#000}
.message.stranger{align-self:flex-start;background:var(--sf);border:1px solid var(--bd2)}
.typing-indicator{color:var(--txs);font-size:12px;padding:5px 10px;display:flex;align-items:center;gap:4px}
.chat-input-wrap{display:flex;gap:10px;padding:12px 18px;border-top:2px solid var(--bd);background:var(--sf)}
.chat-input{flex:1;padding:13px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);border-radius:8px}
.chat-send{width:48px;height:48px;background:var(--spill);border:2px solid #000;cursor:pointer;border-radius:8px;box-shadow:3px 3px 0 #000}

/* ===== BOTTOM NAV ===== */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:2px solid var(--bd);z-index:1000;padding-bottom:env(safe-area-inset-bottom)}
.bnav-c{max-width:480px;margin:0 auto;display:flex;justify-content:space-around;align-items:center;height:64px}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;height:100%;color:var(--txm);text-decoration:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;position:relative;cursor:pointer}
.ni::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;transition:width .2s}
.ni:hover{color:var(--txs);background:var(--sfe)}
.ni.act[href*="spill"]{color:var(--spill) !important}
.ni.act[href*="spill"]::before{background:var(--spill) !important;width:100%}
.ni.act[href*="jejak"]{color:var(--jejak) !important}
.ni.act[href*="jejak"]::before{background:var(--jejak) !important;width:100%}
.ni.act[href*="glitch"]{color:var(--glitch) !important}
.ni.act[href*="glitch"]::before{background:var(--glitch) !important;width:100%}
.ni.act[href*="cocomeo"]{color:var(--cocomeo) !important}
.ni.act[href*="cocomeo"]::before{background:var(--cocomeo) !important;width:100%}
.nico{font-size:20px}

/* ===== UTILITY ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:8px 16px;z-index:10000;opacity:0;transition:.3s;border-radius:30px;white-space:nowrap}
.toast.show{opacity:1}
.proc{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:10002;display:none;flex-direction:column;align-items:center;justify-content:center}
.proc.on{display:flex}
.pspin{width:48px;height:48px;border:3px solid var(--bd);border-top-color:var(--spill);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.waiting-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center}
.waiting-overlay.show{display:flex}
.waiting-box{background:var(--sf);border:3px solid var(--spill);padding:30px;text-align:center;box-shadow:12px 12px 0 #000}
.waiting-timer{width:100px;height:100px;border:4px solid var(--aq);border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:36px;color:var(--aq)}
.scanning-overlay{display:none;position:fixed;inset:0;background:#000;z-index:2000;align-items:center;justify-content:center;font-family:var(--font-mono)}
.scanning-overlay.show{display:flex}
.scanning-box{text-align:center;width:100%;max-width:400px;padding:20px}
.scanning-text{font-size:24px;color:var(--spill);text-align:center;min-height:120px;display:flex;align-items:center;justify-content:center}
.scanning-progress{width:100%;height:2px;background:var(--bd2);margin-top:30px}
.scanning-bar{height:100%;width:0%;background:var(--spill);transition:width .1s linear}
</style>
</head>
<body>
<div class="w">
<header>
  <div><div class="logo" onclick="location.reload()">SP<span class="x">✕</span>LL</div><div class="tagline">vibe radar</div></div>
  <div class="top-right"><span class="huser" id="huser">@anon</span><div class="dot" id="odot"></div>
    <div class="smenu"><button class="mtrig" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      <div class="mdd" id="mdd"><button class="mi" onclick="logoutUser()">Logout</button></div>
    </div>
  </div>
</header>

<section class="radar-sect">
  <div class="radar-header"><span class="radar-label">VIBE RADAR</span><span class="online-badge" id="onlineCount">21 ONLINE</span></div>
  <div class="radar-wrapper"><div class="radar-bezel"><div class="radar-cont" id="radarCont"><canvas class="radar-canvas" id="radarCanvas"></canvas></div></div></div>
  <div class="radar-ctas"><div class="gender-row">
    <button class="btn-vibe btn-soft" id="vibeSoftBtn"><span class="vibe-icon">❤️</span><span>SOFT TALK</span><span class="vibe-temp"><span>🌡️</span><span>38°C</span></span></button>
    <button class="btn-vibe btn-hot" id="vibeHotBtn"><span class="vibe-icon">♠️</span><span>HOT TAKE</span><span class="vibe-temp"><span>🔥</span><span>99°C</span></span></button>
  </div><button class="btn-whisper" id="whisperBtn">✦ WHISPERER <span>NEW</span></button></div>
</section>

<div class="filter-sect"><div class="filter-top"><span class="filter-title">KESELARASAN</span><span class="match-pct" id="vibePct">87%</span></div><input type="range" class="vibe-slider" id="vibeSlider" min="0" max="100" value="87"></div>

<section class="spills-sect">
  <div class="sect-header"><span>SPILL TERKINI</span><span id="feedMeta">0 spill</span></div>
  <div id="spillsList"></div>
</section>
</div>

<!-- OVERLAYS -->
<div class="waiting-overlay" id="waitingOverlay"><div class="waiting-box"><div class="waiting-timer" id="waitingTimer">15</div><button class="btn" id="cancelWaiting" style="margin-top:16px;padding:12px 24px;background:transparent;border:2px solid var(--bd2);color:var(--txs);cursor:pointer">BATAL</button></div></div>
<div class="scanning-overlay" id="scanningOverlay"><div class="scanning-box"><div class="scanning-text" id="scanningText"></div><div class="scanning-progress"><div class="scanning-bar" id="scanningBar"></div></div></div></div>
<div class="chat-room" id="chatRoom">
  <div class="chat-head"><span id="partnerLabel">STRANGER</span><span class="chat-timer" id="chatTimer">15:00</span><button class="chat-close" id="closeChatBtn">✕</button></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap"><input class="chat-input" id="chatInput" placeholder="ketik pesan..."><button class="chat-send" id="sendButton">➤</button></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav"><div class="bnav-c">
  <a href="spill.html" class="ni act"><span class="nico">✕</span><span>Spill</span></a>
  <a href="jejak.html" class="ni"><span class="nico">◈</span><span>Jejak</span></a>
  <a href="glitch.html" class="ni"><span class="nico">‼</span><span>Glitch</span></a>
  <a href="cocomeo.html" class="ni"><span class="nico">〜</span><span>Cocomeo</span></a>
</div></nav>

<div class="proc" id="proc"><div class="pspin"></div><div class="ptxt">Loading...</div></div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/shared-constants.js"></script>
<script src="/shared-utils.js"></script>
<script>
// ========== SUPABASE INIT ==========
if (!window.supabase?.createClient) throw new Error('Supabase not loaded');
const supabaseClient = window.supabase.createClient(JEJAK.SUPABASE_URL, JEJAK.SUPABASE_KEY, { auth: { persistSession: true, autoRefreshToken: true } });
const session = JEJAK.getSession();
if (!session?.loggedIn || !session?.uid || !session?.username) window.location.replace('/index.html');

const S = { username: session.username, userId: session.uid, entries: [], currentPartner: null, chatHistory: [], isTyping: false };
document.getElementById('huser').textContent = '@' + S.username;
if (document.getElementById('odot')) document.getElementById('odot').classList.remove('off');

// ========== BOTTOM NAV ACTIVE ==========
(function forceActive() {
  const page = window.location.pathname.split('/').pop() || 'spill.html';
  document.querySelectorAll('.bnav .ni').forEach(link => {
    const href = link.getAttribute('href');
    if (href === page) link.classList.add('act');
    else link.classList.remove('act');
  });
})();

// ========== HELPER ==========
const $ = id => document.getElementById(id);
const toast = (msg, d=3000) => { const t=$('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), d); };
const escape = t => t ? String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]) : '';

// ========== MENU ==========
window.toggleMenu = () => $('mdd')?.classList.toggle('on');
window.logoutUser = () => { if(confirm('Yakin logout?')){ JEJAK.clearSession(); sessionStorage.clear(); window.location.href='index.html'; } };
document.addEventListener('click', e => { if(!e.target.closest('.smenu')) $('mdd')?.classList.remove('on'); });

// ========== SPILLS ==========
async function loadSpills() {
  if (!S.userId) return;
  const { data, error } = await supabaseClient.from('entries').select('*').order('created_at', { ascending: false }).limit(20);
  if (error) { toast('Gagal load: ' + error.message); return; }
  S.entries = data || [];
  renderSpills();
}
function renderSpills() {
  const container = $('#spillsList');
  if (!container) return;
  if (!S.entries.length) { container.innerHTML = '<div class="spill-card"><div class="spill-content">Belum ada spill</div></div>'; return; }
  const html = S.entries.map(e => `<div class="spill-card"><div class="spill-header"><span class="spill-author">@${escape(e.username)}</span><span class="spill-mood ${e.mood}">${e.mood}</span></div><div class="spill-content">${escape(e.content)}</div><div class="spill-reactions">${['skull','cry','fire','upside'].map(r => `<button class="react-btn" data-id="${e.id}" data-key="${r}">${r==='skull'?'💀':r==='cry'?'😭':r==='fire'?'🔥':'🙃'}<span class="rcount">${e.reactions?.[r]||0}</span></button>`).join('')}</div></div>`).join('');
  container.innerHTML = html;
  $('#feedMeta').textContent = S.entries.length + ' spill';
  
  // Attach reaction events
  document.querySelectorAll('.react-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const id = btn.dataset.id;
      const key = btn.dataset.key;
      const entry = S.entries.find(e => e.id === id);
      if (!entry) return;
      entry.reactions = entry.reactions || { skull:0, cry:0, fire:0, upside:0 };
      entry.reactions[key] = (entry.reactions[key] || 0) + 1;
      await supabaseClient.from('entries').update({ reactions: entry.reactions }).eq('id', id);
      renderSpills();
    });
  });
}

// ========== VIBE CHECK ==========
const startVibe = async type => {
  const ov = $('#waitingOverlay');
  const timer = $('#waitingTimer');
  if (!ov || !timer) return;
  ov.classList.add('show');
  let sec = 15;
  timer.textContent = sec;
  const int = setInterval(() => { sec--; timer.textContent = sec; if (sec <= 0) { clearInterval(int); ov.classList.remove('show'); openChat(type === 'soft' ? 'beby.manis' : 'agak.koplak'); } }, 1000);
  $('#cancelWaiting').onclick = () => { clearInterval(int); ov.classList.remove('show'); };
};
const openChat = name => { 
  const cr = $('#chatRoom');
  if (cr) { cr.classList.add('on'); S.currentPartner = name; }
};
$('#vibeSoftBtn')?.addEventListener('click', () => startVibe('soft'));
$('#vibeHotBtn')?.addEventListener('click', () => startVibe('hot'));
$('#closeChatBtn')?.addEventListener('click', () => $('#chatRoom')?.classList.remove('on'));

// ========== RADAR ==========
function initRadar() {
  const cv = $('#radarCanvas');
  const ct = $('#radarCont');
  if (!cv || !ct) return;
  const w = ct.clientWidth || 300, h = ct.clientHeight || 300;
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  if (!ctx) return;
  const cx = w/2, cy = h/2, maxR = Math.min(cx, cy) * 0.8;
  let angle = 0;
  setInterval(() => {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#020a02';
    ctx.fillRect(0,0,w,h);
    angle += 0.02;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.fillStyle = 'rgba(255,59,111,0.2)';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,maxR,0,Math.PI/4);
    ctx.lineTo(0,0);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#ff3b6f';
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle)*maxR*0.7, cy + Math.sin(angle)*maxR*0.7, 4, 0, 2*Math.PI);
    ctx.fill();
  }, 50);
}

// ========== INIT ==========
setTimeout(initRadar, 100);
loadSpills();
const onlineEl = $('#onlineCount');
if (onlineEl) setInterval(() => onlineEl.textContent = Math.floor(Math.random()*20+10) + ' ONLINE', 30000);
</script>
</body>
</html>
