<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0A0A0A;--sf:#141414;--bd:#2A2A2A;--bd2:#333;--tx:#FFF;--txs:#888;
            --spill:#ff3b6f;--cocomeo:#00e5ff;--jejak:#9900ff;--glitch:#FFD700;
            --ap:var(--spill);--as:var(--cocomeo);--aq:#bfff00;
            --font-display:'Arial Black',sans-serif;--font-mono:'Courier New',monospace;--font-body:Arial,sans-serif
        }
        body{background:var(--bg);color:var(--tx);font-family:var(--font-body);height:100vh;display:flex;flex-direction:column}
        .app{max-width:500px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;background:var(--bg);border-left:2px solid var(--bd);border-right:2px solid var(--bd);position:relative;overflow:hidden}

        /* HEADER */
        .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:2px solid var(--bd);background:var(--sf);position:relative;z-index:10}
        .logo{font-family:var(--font-display);font-size:34px}
        .logo .x{color:var(--ap);display:inline-block;animation:spin 4s infinite}
        @keyframes spin{95%{transform:rotate(180deg)}}
        .user-section{display:flex;align-items:center;gap:12px}
        .user-badge{font-family:var(--font-mono);background:#000;border:2px solid var(--bd);padding:4px 8px;color:var(--as);font-size:12px}
        .settings-btn{width:30px;height:30px;background:0 0;border:2px solid var(--bd2);color:var(--txs);font-size:18px;cursor:pointer;border-radius:4px}
        .settings-dropdown{position:absolute;top:60px;right:18px;background:var(--sf);border:2px solid var(--bd);box-shadow:6px 6px 0 #000;z-index:200;min-width:180px;display:none}
        .settings-dropdown.show{display:block}
        .dropdown-item{padding:12px 16px;font-family:var(--font-mono);font-size:12px;color:var(--tx);cursor:pointer;border-bottom:1px solid var(--bd)}

        .scroll{flex:1;overflow-y:auto;padding-bottom:70px;scrollbar-width:thin;scrollbar-color:var(--bd2) var(--bg)}

        /* RADAR */
        .radar-sect{background:var(--sf);border-bottom:2px solid var(--bd)}
        .radar-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
        .radar-label{font-family:var(--font-mono);font-size:10px;color:var(--as)}
        .online-badge{background:rgba(0,0,0,.3);padding:6px 12px;border:1px solid var(--bd);font-family:var(--font-mono);font-size:11px}
        .radar-wrapper{padding:0 18px 16px}
        .radar-bezel{position:relative;padding:4px;background:var(--bg);border:2px solid var(--bd2);box-shadow:6px 6px 0 #000}
        .radar-cont{position:relative;width:100%;aspect-ratio:1;background:#020a02;overflow:hidden}
        .radar-cont.chat-mode{background:rgba(0,0,0,0.97)}
        .radar-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px)}
        .radar-ring{position:absolute;inset:8%;border:1px solid rgba(0,229,255,.08);border-radius:50%}
        .radar-ring::before{content:'';position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.05);inset:28%}
        .radar-cross{position:absolute;inset:0;background:linear-gradient(90deg,transparent calc(50% - 1px),rgba(0,229,255,.06) calc(50% - 1px),rgba(0,229,255,.06) calc(50% + 1px),transparent calc(50% + 1px)),linear-gradient(0deg,transparent calc(50% - 1px),rgba(0,229,255,.06) calc(50% - 1px),rgba(0,229,255,.06) calc(50% + 1px),transparent calc(50% + 1px))}
        .radar-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:10;display:block}
        .radar-dots{position:absolute;inset:0;z-index:5}
        .radar-dot{position:absolute;width:6px;height:6px;transform:translate(-50%,-50%) rotate(45deg);background:var(--as);opacity:.3}
        .radar-dot.active{opacity:1;transform:translate(-50%,-50%) rotate(45deg) scale(2.5)}

        /* CHAT */
        .radar-chat-container{position:absolute;inset:0;background:rgba(0,0,0,0.97);z-index:100;display:none;flex-direction:column;justify-content:flex-end;padding:48px 12px 78px;overflow-y:auto;gap:4px}
        .radar-chat-container.show{display:flex}
        .message{max-width:85%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.45;word-wrap:break-word;margin-bottom:2px;flex-shrink:0}
        .message.user{align-self:flex-end;background:var(--as);color:#000;border-bottom-right-radius:4px}
        .message.stranger{align-self:flex-start;background:var(--sf);color:var(--tx);border:1px solid var(--bd2);border-bottom-left-radius:4px}
        .message.system{align-self:center;background:rgba(255,255,255,0.07);color:var(--txs);font-family:var(--font-mono);font-size:10px;padding:5px 12px;border-radius:20px;margin:6px 0;text-align:center}
        .typing-bubble{align-self:flex-start;background:var(--sf);border:1px solid var(--bd2);padding:10px 14px;border-radius:16px;border-bottom-left-radius:4px;display:none;gap:4px;align-items:center;flex-shrink:0}
        .typing-bubble.show{display:flex}
        .typing-bubble span{width:6px;height:6px;background:var(--txs);border-radius:50%;animation:bounce 1.2s infinite}
        .typing-bubble span:nth-child(2){animation-delay:.2s}
        .typing-bubble span:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

        /* CHAT HEADER */
        .radar-chat-header{position:absolute;top:0;left:0;right:0;background:rgba(10,10,10,0.97);border-bottom:1px solid var(--bd2);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:102}
        .chat-vibe-label{font-family:var(--font-mono);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700}
        .chat-vibe-label.hot_take{background:var(--ap);color:#fff}
        .chat-vibe-label.soft_talk{background:var(--as);color:#000}
        .chat-stranger-label{font-family:var(--font-mono);font-size:13px;color:var(--tx);font-weight:bold}
        .radar-chat-close{background:0 0;border:1px solid var(--bd2);color:var(--txs);padding:4px 10px;cursor:pointer;font-size:12px;border-radius:4px}

        /* CHAT INPUT */
        .radar-chat-input-wrapper{position:absolute;bottom:8px;left:8px;right:8px;display:none;gap:6px;padding:6px;background:rgba(20,20,20,0.97);border:2px solid var(--bd2);border-radius:30px;z-index:102}
        .radar-chat-input-wrapper.show{display:flex}
        .radar-chat-input{flex:1;padding:10px 16px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);border-radius:30px;font-size:14px;outline:none}
        .radar-chat-send{width:44px;height:44px;background:var(--ap);border:2px solid #000;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}

        /* SCANNING */
        .radar-scanning-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.93);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;color:var(--as);font-family:var(--font-mono);gap:0}
        .radar-scanning-overlay.show{display:flex}
        .scan-vibe{font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 14px;border-radius:20px;margin-bottom:14px}
        .scan-vibe.hot_take{background:var(--ap);color:#fff}
        .scan-vibe.soft_talk{background:var(--as);color:#000}
        .scan-title{font-size:14px;font-weight:bold;margin-bottom:6px}
        .scan-sub{font-size:10px;color:var(--txs);margin-bottom:18px;text-align:center;padding:0 24px}
        .scan-timer{font-size:32px;font-weight:bold;color:var(--ap);margin-bottom:10px;font-family:var(--font-display)}
        .scan-progress{width:76%;height:3px;background:var(--bd2);margin:8px 0;border-radius:2px}
        .scan-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--as),var(--ap));border-radius:2px;transition:width .25s}
        .scan-dots{display:flex;gap:8px;margin:10px 0}
        .scan-dots span{width:7px;height:7px;background:var(--as);border-radius:50%;animation:bounce 1.2s infinite}
        .scan-dots span:nth-child(2){animation-delay:.2s}
        .scan-dots span:nth-child(3){animation-delay:.4s}
        .scan-cancel{margin-top:14px;background:0 0;border:1px solid var(--bd2);color:var(--txs);padding:8px 22px;cursor:pointer;font-family:var(--font-mono);font-size:11px;border-radius:4px}

        /* INVITATION POPUP */
        .invite-popup{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
        .invite-popup.show{display:flex}
        .invite-box{background:var(--sf);border:3px solid var(--as);padding:30px 24px;max-width:300px;width:100%;box-shadow:10px 10px 0 #000;text-align:center}
        .invite-vibe-badge{display:inline-block;padding:6px 18px;font-size:13px;font-weight:700;letter-spacing:2px;margin-bottom:14px}
        .invite-vibe-badge.hot_take{background:var(--ap);color:#fff}
        .invite-vibe-badge.soft_talk{background:var(--as);color:#000}
        .invite-text{font-size:13px;color:var(--txs);margin-bottom:18px;line-height:1.6}
        .invite-countdown{font-family:var(--font-display);font-size:36px;color:var(--ap);font-weight:bold;margin-bottom:18px;line-height:1}
        .invite-actions{display:flex;gap:10px}
        .invite-btn{flex:1;padding:14px 8px;border:2px solid #000;font-size:13px;font-weight:bold;cursor:pointer;letter-spacing:1px;font-family:var(--font-mono)}
        .invite-btn.accept{background:var(--as);color:#000}
        .invite-btn.decline{background:0 0;border-color:var(--bd2);color:var(--txs)}

        /* CTA */
        .radar-ctas{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px}
        .gender-row{display:flex;gap:10px}
        .btn-gender{flex:1;padding:18px 8px;border:2px solid #000;font-family:var(--font-display);font-size:16px;letter-spacing:2px;cursor:pointer;box-shadow:5px 5px 0 #000;display:flex;flex-direction:column;align-items:center;gap:5px}
        .btn-gender:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000}
        .btn-gender:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:5px 5px 0 #000}
        .btn-hot{background:linear-gradient(145deg,var(--ap),#ff6b8b);color:#fff}
        .btn-soft{background:linear-gradient(145deg,var(--as),#4d7aff);color:#000}
        .gender-icon{font-size:34px}
        .btn-whisper{width:100%;padding:14px;background:0 0;border:2px dashed var(--bd2);font-family:var(--font-body);cursor:pointer;display:flex;justify-content:space-between;color:var(--txs)}

        /* SPILLS */
        .spills-sect{padding:18px}
        .sect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-family:var(--font-mono);font-size:12px}
        .spill-card{background:var(--sf);border:2px solid var(--bd2);margin-bottom:20px;padding:16px;box-shadow:4px 4px 0 #000}
        .spill-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--font-mono);font-size:12px}
        .spill-author{color:var(--as)}
        .spill-mood{padding:4px 8px;font-size:10px;font-weight:700;letter-spacing:1px}
        .spill-mood.surviving{background:var(--ap);color:#fff}
        .spill-mood.thriving{background:var(--aq);color:#000}
        .spill-mood.chaotic{background:var(--as);color:#000}
        .spill-mood.doom{background:#9900ff;color:#fff}
        .spill-content{font-size:14px;line-height:1.6;margin-bottom:12px}
        .spill-reactions{display:flex;gap:8px;border-top:2px solid var(--bd);padding-top:12px}
        .react-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;background:var(--bg);border:2px solid var(--bd2);color:var(--txs);cursor:pointer;font-family:var(--font-mono);font-size:14px}
        .react-count{font-size:11px;font-weight:700}
        .empty-state{text-align:center;padding:40px;color:var(--txs);font-family:var(--font-mono);font-size:14px;border:2px dashed var(--bd2)}

        /* NAV */
        .bnav{background:#050505;border-top:2px solid var(--bd);padding:8px 16px 12px;width:100%;max-width:500px;z-index:50}
        .bnav-c{display:flex;justify-content:space-around;align-items:flex-end;gap:4px}
        .ni{font-family:var(--font-mono);text-decoration:none;display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;flex:1;color:var(--txs);gap:4px}
        .nico{font-size:24px;font-weight:bold;line-height:1}
        .ni span:last-child{font-size:10px;text-transform:uppercase}
        .ni[href="spill.html"]{color:var(--spill)}
        .ni[href="jejak.html"]{color:var(--jejak)}
        .ni[href="glitch.html"]{color:var(--glitch)}
        .ni[href="cocomeo.html"]{color:var(--cocomeo)}
        .ni.act{color:var(--tx);transform:translateY(-4px)}
        .ni.act .nico{transform:scale(1.2)}

        /* MISC */
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:12px 22px;z-index:2000;border-radius:30px;display:none;font-size:13px;white-space:nowrap}
        .toast.show{display:block}
        .whisper-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1500;align-items:center;justify-content:center}
        .whisper-overlay.show{display:flex}
        .whisper-box{background:var(--sf);border:3px solid var(--as);padding:25px;text-align:center;box-shadow:12px 12px 0 #000;max-width:350px;width:90%}
        .whisper-input{width:100%;padding:15px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);margin:15px 0;font-size:14px}
        .whisper-actions{display:flex;gap:10px}
        .whisper-btn{flex:1;padding:12px;border:2px solid #000;cursor:pointer;font-size:14px}
        .whisper-btn.send{background:var(--as);color:#000}
        .whisper-btn.cancel{background:0 0;color:var(--txs)}
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">SP<span class="x">✕</span>LL</div>
        <div class="user-section">
            <span class="user-badge" id="userNameDisplay">@loading...</span>
            <button class="settings-btn" id="settingsBtn">⋮</button>

        <div class="settings-dropdown" id="settingsDropdown">

    <div class="scroll">
        <div class="radar-sect">
            <div class="radar-header">
                <span class="radar-label">VIBE RADAR</span>
                <div class="online-badge"><span id="onlineCount">— ONLINE</span></div>
            </div>
            <div class="radar-wrapper">
                <div class="radar-bezel">
                    <div class="radar-cont" id="radarCont">
                        <div class="radar-grid"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-cross"></div>
                        <canvas class="radar-canvas" id="radarCanvas"></canvas>
                        <div class="radar-dots" id="radarDots"></div>

                        <!-- SCANNING OVERLAY -->
                        <div class="radar-scanning-overlay" id="scanOverlay">
                            <div class="scan-vibe" id="scanVibeBadge">HOT TAKE</div>

                            <div class="scan-timer" id="scanTimer">15</div>
                            <div class="scan-progress"><div class="scan-bar" id="scanBar"></div></div>

                        <!-- CHAT -->
                        <div class="radar-chat-container" id="radarChat">

                            </div>

                                <span></span><span></span><span></span>
                            </div>
                        </div>
                        <div class="radar-chat-input-wrapper" id="chatInputWrap">
                            <input type="text" class="radar-chat-input" id="chatInput"
                                   placeholder="Ketik pesan..." maxlength="500" autocomplete="off">
                            <button class="radar-chat-send" id="chatSend">➤</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="radar-ctas">
                <div class="gender-row">
                    <button class="btn-gender btn-hot" id="btnHot">
                        <span class="gender-icon">🔥</span><span>HOT TAKE</span>
                    </button>
                    <button class="btn-gender btn-soft" id="btnSoft">
                        <span class="gender-icon">💬</span><span>SOFT TALK</span>
                    </button>
                </div>
                <button class="btn-whisper" id="whisperBtn">✦ WHISPERER <span>NEW</span></button>
            </div>
        </div>

        <div class="spills-sect">
            <div class="sect-header">
                <span>SPILL TERKINI</span>
                <span id="feedMeta">0 spill</span>
            </div>
            <div id="spillsList"><div class="empty-state">🍃 MEMUAT SPILL...</div></div>
        </div>
    </div>

    <nav class="bnav">
        <div class="bnav-c">
            <a href="spill.html" class="ni act"><span class="nico">✕</span><span>Spill</span></a>
            <a href="jejak.html" class="ni"><span class="nico">◈</span><span>Jejak</span></a>
            <a href="glitch.html" class="ni"><span class="nico">‼</span><span>Glitch</span></a>
            <a href="cocomeo.html" class="ni"><span class="nico">〜</span><span>Cocomeo</span></a>
        </div>
    </nav>
</div>

<!-- INVITATION POPUP — hanya tampil vibe, tanpa nama siapapun -->
<div class="invite-popup" id="invitePopup">
    <div class="invite-box">
        <div class="invite-vibe-badge" id="inviteVibeBadge">🔥 HOT TAKE</div>
        <div class="invite-text">Ada stranger yang ingin<br>ngobrol sama kamu.<br>Mau terima?</div>
        <div class="invite-countdown" id="inviteCountdown">15</div>
        <div class="invite-actions">
            <button class="invite-btn accept" id="btnAccept">✓ YEP</button>
            <button class="invite-btn decline" id="btnDecline">✕ NOPE</button>
        </div>

</div>

<!-- WHISPER -->
<div class="whisper-overlay" id="whisperOverlay">
    <div class="whisper-box">
        <div style="font-family:var(--font-mono);margin-bottom:10px">✦ WHISPERER</div>
        <input type="text" class="whisper-input" id="whisperTarget" placeholder="@username">

        </div>
    </div>
</div>

<script>
(function(){
'use strict';

// ── CONFIG ────────────────────────────────────────────────────

const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';

};

// ── STATE ─────────────────────────────────────────────────────
const S={IDLE:'idle',BIDDING:'bidding',CHAT_REAL:'chat_real',CHAT_AI:'chat_ai'};
let state=S.IDLE, vibe=null, roomId=null, aiChar=null;
let chatHist=[], lastMsgTs=null;
let tBid=null,tHeart=null,tPollMatch=null,tPollMsg=null,tPollInv=null,tScan=null,tInvPop=null;
let pendingInv=null;

// ── LIFECYCLE ─────────────────────────────────────────────────
async function init(){
    $('userNameDisplay').textContent='@'+ME;
    initRadar(); loadSpills();
    // Register online — username disimpan di server, tidak di-expose ke user lain
    await api('/api/invite',{action:'register',userId:UID,username:ME,sessionId:SID});
    startHeartbeat();
    loadCount();
    setInterval(loadCount,15000);
    startBrewInterval(); // auto brew setiap 7 menit
    // Poll invitation setiap 2 detik
    tPollInv=setInterval(pollInvitation,POLL_INV_MS);
}

function startHeartbeat(){
    if(tHeart)clearInterval(tHeart);
    tHeart=setInterval(()=>api('/api/invite',{action:'heartbeat',userId:UID,username:ME}),HEARTBEAT_MS);
}

// ── BID (klik HOT TAKE / SOFT TALK) ──────────────────────────
async function startBid(v){
    if(state!==S.IDLE)return;
    state=S.BIDDING; vibe=v;
    $('btnHot').disabled=true; $('btnSoft').disabled=true;
    showScan(true,v);
    startCountdown(BID_TIMEOUT_MS/1000);

    try{
        const r=await api('/api/invite',{action:'bid',userId:UID,username:ME,sessionId:SID,vibe:v});

        if(r.action==='matched'){
            // Langsung match dari waiting_room (concurrent bidding)
            clearBidTimers();
            enterChatReal(r.room_id,v);
            return;
        }
        if(r.action==='already_waiting'){
            toast('Sedang dalam antrian...');
            enterIdle(); return;
        }
        if(r.action==='waiting'){
            const n=r.invites_sent||0;
            $('scanSub').textContent = n>0
                ? `Invitation terkirim ke ${n} stranger...`
                : 'Tidak ada stranger online, menyiapkan AI...';
            if(n===0){
                // Tidak ada user online sama sekali → langsung AI
                setTimeout(()=>fallbackAI(),1500);
                return;
            }
        }
    }catch(e){
        console.warn('Bid error:',e);
        setTimeout(()=>fallbackAI(),1500);
        return;
    }

    // Poll apakah ada yang accept
    tPollMatch=setInterval(pollMatch,POLL_MATCH_MS);
    // Timeout → AI
    tBid=setTimeout(()=>{if(state===S.BIDDING)fallbackAI();},BID_TIMEOUT_MS);
}

// ── POLL MATCH (inviter side) ─────────────────────────────────
async function pollMatch(){
    if(state!==S.BIDDING)return;
    try{
        const r=await fetch(`/api/invite?userId=${UID}&role=inviter`);
        const d=await r.json();
        if(d.matched){
            clearBidTimers();
            enterChatReal(d.room_id,d.vibe||vibe);
        }else if(d.all_expired){
            clearBidTimers();
            fallbackAI();
        }
    }catch(e){}
}

// ── POLL INVITATION (invitee side) ────────────────────────────
async function pollInvitation(){
    if(state!==S.IDLE)return;
    if($('invitePopup').classList.contains('show'))return;
    try{
        const r=await fetch(`/api/invite?userId=${UID}&role=invitee`);
        const d=await r.json();
        if(d.hasInvitation){
            pendingInv=d.invitation;
            showInvitePopup(d.invitation);
        }
    }catch(e){}
}

// ── INVITATION POPUP ──────────────────────────────────────────
// PRIVACY: hanya tampil vibe, tanpa nama/identitas inviter
function showInvitePopup(inv){
    const badge=$('inviteVibeBadge');
    badge.textContent = inv.vibe==='hot_take'?'🔥 HOT TAKE':'💬 SOFT TALK';
    badge.className   = 'invite-vibe-badge '+inv.vibe;
    $('invitePopup').classList.add('show');

    const exp=new Date(inv.expires_at).getTime();
    if(tInvPop)clearInterval(tInvPop);
    tInvPop=setInterval(()=>{
        const left=Math.max(0,Math.ceil((exp-Date.now())/1000));
        $('inviteCountdown').textContent=left;
        if(left<=0){clearInterval(tInvPop);hidePopup();toast('Invitation expired');}
    },400);
}

function hidePopup(){
    $('invitePopup').classList.remove('show');
    if(tInvPop){clearInterval(tInvPop);tInvPop=null;}
    pendingInv=null;
}

async function acceptInv(){
    if(!pendingInv)return;
    const inv=pendingInv; hidePopup();
    try{
        const r=await api('/api/invite',{action:'accept',userId:UID,username:ME,invitationId:inv.id});
        if(r.success){
            enterChatReal(r.room_id,r.vibe||inv.vibe);
        }else{
            toast(r.reason==='inviter_no_longer_waiting'?'⚡ Sudah diambil stranger lain!':'Invitation expired');
        }
    }catch(e){toast('Gagal connect');}
}

// ── ENTER REAL CHAT ───────────────────────────────────────────
function enterChatReal(rId,v){
    state=S.CHAT_REAL; roomId=rId; vibe=v;
    chatHist=[]; lastMsgTs=new Date().toISOString();
    openChatUI(v,false);
    addSys('🔗 Terhubung dengan stranger');
    tPollMsg=setInterval(pollMsg,POLL_MSG_MS);
    loadCount();
}

// ── FALLBACK AI ───────────────────────────────────────────────
function fallbackAI(){
    if(state===S.CHAT_REAL||state===S.CHAT_AI)return;
    state=S.CHAT_AI;
    clearBidTimers();
    showScan(false);
    // Expire invitations dari user ini
    fetch('/api/invite',{method:'DELETE',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userId:UID})}).catch(()=>{});
    // Pilih AI persona (tersembunyi dari UI)
    const pool=AI[vibe]||AI.soft_talk;
    aiChar=pool[Math.floor(Math.random()*pool.length)];
    roomId=null; chatHist=[];
    openChatUI(vibe,true);
    setTimeout(()=>sendAI('',true),600);
}

// ── IDLE ──────────────────────────────────────────────────────
function enterIdle(){
    clearAllTimers();
    state=S.IDLE; vibe=null; roomId=null; aiChar=null; chatHist=[];
    $('btnHot').disabled=false; $('btnSoft').disabled=false;
    closeChatUI(); showScan(false); hidePopup();
    loadCount();
}

// ── MESSAGES (REAL) ───────────────────────────────────────────
async function pollMsg(){
    if(state!==S.CHAT_REAL||!roomId)return;
    try{
        const since=lastMsgTs||new Date(Date.now()-5000).toISOString();
        const r=await fetch(`/api/messages?roomId=${roomId}&since=${encodeURIComponent(since)}`);
        const msgs=await r.json();
        if(!Array.isArray(msgs)||!msgs.length)return;
        for(const m of msgs){
            if(m.sender_id!==UID)addMsg('stranger',m.content);
            if(!lastMsgTs||m.created_at>lastMsgTs)lastMsgTs=m.created_at;
        }
    }catch(e){}
}

async function sendReal(content){
    if(!roomId||!content.trim())return;
    addMsg('user',content);
    try{
        const r=await fetch('/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({roomId,senderId:UID,senderName:ME,content:content.trim()})});
        if(!r.ok){
            const e=await r.json();
            if(e.error==='Room not found or ended'){addSys('⚠️ Stranger meninggalkan chat');setTimeout(enterIdle,2000);}
        }
    }catch(e){toast('Gagal kirim pesan');}
}

// ── AI CHAT ───────────────────────────────────────────────────
async function sendAI(msg,first=false){
    if(state!==S.CHAT_AI)return;
    showTyping(true);
    try{
        if(!first&&msg)chatHist.push({role:'user',content:msg});
        const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message:first?'hai':msg,characterName:aiChar,lastMessages:chatHist.slice(-8)})});
        const d=await r.json();
        showTyping(false);
        if(d.reply){
            const delay=Math.max(500,Math.min(d.reply.length*30,2500));
            setTimeout(()=>{addMsg('stranger',d.reply);chatHist.push({role:'assistant',content:d.reply});},delay);
        }
    }catch(e){showTyping(false);addMsg('stranger','😅');}
}

// ── CHAT UI ───────────────────────────────────────────────────
function openChatUI(v,isAI){
    // PRIVACY: selalu tampil "STRANGER", tidak pernah nama
    const badge=$('chatVibeBadge');
    badge.textContent = v==='hot_take'?'🔥 HOT TAKE':'💬 SOFT TALK';
    badge.className   = 'chat-vibe-label '+(v||'hot_take');
    $('radarChat').classList.add('show');
    $('chatInputWrap').classList.add('show');
    $('radarCont').classList.add('chat-mode');
    $('chatInput').focus();
}
function closeChatUI(){
    const c=$('radarChat'),h=c.querySelector('.radar-chat-header'),t=$('typingBubble');
    c.innerHTML='';c.appendChild(h);c.appendChild(t);
    c.classList.remove('show');
    $('chatInputWrap').classList.remove('show');
    $('radarCont').classList.remove('chat-mode');
}
function addMsg(who,text){
    const c=$('radarChat'),t=$('typingBubble');
    const m=document.createElement('div');m.className='message '+who;m.textContent=text;
    c.insertBefore(m,t);c.scrollTop=c.scrollHeight;
}
function addSys(text){
    const c=$('radarChat'),t=$('typingBubble');
    const m=document.createElement('div');m.className='message system';m.textContent=text;
    c.insertBefore(m,t);c.scrollTop=c.scrollHeight;
}
function showTyping(on){
    const t=$('typingBubble');
    if(on)t.classList.add('show');else t.classList.remove('show');
    $('radarChat').scrollTop=$('radarChat').scrollHeight;
}

// ── SCAN UI ───────────────────────────────────────────────────
function showScan(on,v){
    const o=$('scanOverlay');
    if(on){
        const b=$('scanVibeBadge');
        b.textContent=v==='hot_take'?'🔥 HOT TAKE':'💬 SOFT TALK';
        b.className='scan-vibe '+(v||'hot_take');
        o.classList.add('show');
    }else{
        o.classList.remove('show');
        if(tScan){clearInterval(tScan);tScan=null;}
    }
}
function startCountdown(sec){
    let left=sec;
    $('scanTimer').textContent=sec;$('scanBar').style.width='0%';
    if(tScan)clearInterval(tScan);
    tScan=setInterval(()=>{
        left--;
        $('scanTimer').textContent=Math.max(0,left);
        $('scanBar').style.width=((sec-left)/sec*100).toFixed(1)+'%';
        if(left<=5&&left>0)$('scanSub').textContent='Hampir habis, menyiapkan AI...';
        if(left<=0)clearInterval(tScan);
    },1000);
}

// ── TIMERS ────────────────────────────────────────────────────
function clearBidTimers(){
    if(tBid){clearTimeout(tBid);tBid=null;}
    if(tPollMatch){clearInterval(tPollMatch);tPollMatch=null;}
    if(tScan){clearInterval(tScan);tScan=null;}
    showScan(false);
}
function clearAllTimers(){
    clearBidTimers();
    if(tHeart){clearInterval(tHeart);tHeart=null;}
    if(tPollMsg){clearInterval(tPollMsg);tPollMsg=null;}
    if(tPollInv){clearInterval(tPollInv);tPollInv=null;}
    if(tInvPop){clearInterval(tInvPop);tInvPop=null;}
}

// ── ONLINE COUNT ──────────────────────────────────────────────
async function loadCount(){
    try{
        const r=await fetch(`/api/invite?userId=${UID}&role=count`);
        const d=await r.json();
        const el=$('onlineCount');
        if(el)el.textContent=(d.count||0)+' ONLINE';
    }catch(e){}
}

// ── SPILLS ────────────────────────────────────────────────────
// ── SPILL BREW TRIGGER (7 menit) ────────────────────────────
const BREW_INTERVAL_MS = 7 * 60 * 1000; // 7 menit
const BREW_KEY = 'spill_last_brew';

async function maybeBrewSpill(){
    const last = parseInt(localStorage.getItem(BREW_KEY)||'0');
    const now  = Date.now();
    if(now - last < BREW_INTERVAL_MS) return false; // belum 7 menit
    localStorage.setItem(BREW_KEY, now.toString());
    try{
        await fetch('/api/brew',{method:'POST',headers:{'Content-Type':'application/json'}});
        return true; // brew berhasil
    }catch(e){
        console.warn('[Brew] trigger failed:', e.message);
        localStorage.setItem(BREW_KEY, '0'); // reset agar bisa retry
        return false;
    }
}

// Auto-brew setiap 7 menit + reload feed setelah brew
function startBrewInterval(){
    setInterval(async()=>{
        localStorage.setItem(BREW_KEY,'0'); // force trigger tiap interval
        const brewed = await maybeBrewSpill();
        if(brewed){
            setTimeout(loadSpills, 3000); // reload feed 3 detik setelah brew
        }
    }, BREW_INTERVAL_MS);
}

async function loadSpills(){
    $('spillsList').innerHTML='<div class="empty-state">🍃 MEMUAT SPILL...</div>';
    // Trigger brew jika sudah > 7 menit (non-blocking)
    maybeBrewSpill();
    try{
        // Ambil semua spill dari entries (user + AI sudah mix di DB)
        const data = await sbGet('/entries?select=*&order=created_at.desc&limit=50');
        const all  = (data||[]).map(x=>({
            author:    x.username||'anon',
            mood:      x.mood||'chaotic',
            content:   x.content||'...',
            reactions: x.reactions||{skull:0,cry:0,fire:0,upside:0},
            created_at: x.created_at,
            is_ai:     x.is_ai||false
        }));
        renderSpills(all);
    }catch(e){$('spillsList').innerHTML='<div class="empty-state">🍃 Gagal memuat spill</div>';}
}
function renderSpills(all){
    const c=$('spillsList'),meta=$('feedMeta');
    if(!all.length){c.innerHTML='<div class="empty-state">🍃 Belum ada spill</div>';meta.textContent='0 spill';return;}
    c.innerHTML=all.map((s,i)=>`<div class="spill-card"><div class="spill-header"><span class="spill-author">@${s.author}</span><span class="spill-mood ${s.mood}">${s.mood.toUpperCase()}</span></div><div class="spill-content">${s.content}</div><div class="spill-reactions">${['skull','cry','fire','upside'].map(r=>`<button class="react-btn" onclick="rs(${i},'${r}')">${r==='skull'?'💀':r==='cry'?'😭':r==='fire'?'🔥':'🙃'}<span class="react-count">${s.reactions[r]||0}</span></button>`).join('')}</div></div>`).join('');
    meta.textContent=all.length+' spill';
}
window.rs=(i,t)=>toast('➕ '+t);

// ── RADAR ─────────────────────────────────────────────────────
let dots=[],nAngle=0,nSpin=0,phase=Math.random()*Math.PI*2,trail=new Float32Array(120),ptr=0,gm=new Map(),raf,rint;
function initRadar(){
    const cv=$('radarCanvas'),ct=$('radarCont');if(!cv||!ct)return;
    const rsz=()=>{const r=ct.getBoundingClientRect();if(r.width>0){cv.width=r.width;cv.height=r.height;}};
    rsz();window.addEventListener('resize',rsz);
    spawnDots();
    if(rint)clearInterval(rint);
    rint=setInterval(()=>{dots.forEach(d=>{d.vx=d.vx*.88+(Math.random()-.5)*.3;d.vy=d.vy*.88+(Math.random()-.5)*.3;d.x=Math.max(9,Math.min(91,d.x+d.vx));d.y=Math.max(9,Math.min(91,d.y+d.vy));if(d.el){d.el.style.left=d.x+'%';d.el.style.top=d.y+'%';}});},100);
    nAngle=Math.random()*Math.PI*2;trail.fill(nAngle);radarLoop(cv);
}
function spawnDots(){const c=$('radarDots');if(!c)return;c.innerHTML='';dots=[];for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,d=12+Math.random()*70,x=50+Math.cos(a)*d/2,y=50+Math.sin(a)*d/2;const el=document.createElement('div');el.className='radar-dot';el.style.left=x+'%';el.style.top=y+'%';c.appendChild(el);dots.push({el,x,y,vx:0,vy:0,id:i});}}
function radarLoop(cv){const ctx=cv.getContext('2d');function draw(){const w=cv.width,h=cv.height,cx=w/2,cy=h/2,R=Math.min(cx,cy)*.88;if(!w||!h){raf=requestAnimationFrame(draw);return;}phase+=.007;nSpin+=((60/4*Math.PI*2)/(60*60)*(1+Math.sin(phase)*.35)-nSpin)*.028;nAngle=(nAngle+nSpin)%(Math.PI*2);trail[ptr]=nAngle;ptr=(ptr+1)%120;ctx.fillStyle='rgba(2,10,2,.18)';ctx.fillRect(0,0,w,h);for(let i=0;i<119;i++){const a=Math.pow(1-i/120,2.2)*.12;if(a<.002)break;const s=nAngle-(i+1)*nSpin,e=nAngle-i*nSpin;ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,Math.min(s,e),Math.max(s,e));ctx.closePath();ctx.fillStyle=`rgba(0,229,255,${a})`;ctx.fill();ctx.restore();}ctx.save();ctx.translate(cx,cy);ctx.rotate(nAngle);ctx.shadowColor='rgba(0,229,255,.95)';ctx.shadowBlur=12;const g=ctx.createLinearGradient(0,0,R,0);g.addColorStop(0,'rgba(0,229,255,1)');g.addColorStop(.8,'rgba(0,229,255,.4)');g.addColorStop(1,'rgba(0,229,255,0)');ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(R,0);ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=20;ctx.beginPath();ctx.rect(-4,-4,8,8);ctx.fillStyle='#00e5ff';ctx.fill();ctx.restore();dots.forEach((d,i)=>{const px=d.x/100*w,py=d.y/100*h,da=((Math.atan2(py-cy,px-cx))%(Math.PI*2)+Math.PI*2)%(Math.PI*2);const diff=(nAngle-da+Math.PI*2)%(Math.PI*2);const age=gm.get(i)??999;if(diff<.18&&age>30){gm.set(i,0);if(d.el){d.el.classList.add('active');setTimeout(()=>d.el?.classList.remove('active'),800);}}else gm.set(i,age+1);if(age<55){const t=age/55,ga=(1-t)*(1-t)*.9;if(ga<.01)return;const gr=ctx.createRadialGradient(px,py,0,px,py,16*(1-t)+3);gr.addColorStop(0,`rgba(0,229,255,${ga})`);gr.addColorStop(1,`rgba(0,229,255,0)`);ctx.beginPath();ctx.arc(px,py,16*(1-t)+3,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();}});raf=requestAnimationFrame(draw);}draw();}

// ── CLEANUP ───────────────────────────────────────────────────
async function cleanup(){
    clearAllTimers();
    const body={userId:UID};
    if(roomId)body.roomId=roomId;
    try{await fetch('/api/invite',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),keepalive:true});}catch(e){}
}
window.addEventListener('beforeunload',cleanup);

// ── EVENT LISTENERS ───────────────────────────────────────────
window.addEventListener('load',async()=>{
    await init();

    // Settings
    const sb=$('settingsBtn'),sd=$('settingsDropdown');
    sb.onclick=e=>{e.stopPropagation();sd.classList.toggle('show');};
    document.addEventListener('click',e=>{if(!sb.contains(e.target)&&!sd.contains(e.target))sd.classList.remove('show');});
    $('logoutBtn').onclick=async()=>{await cleanup();localStorage.removeItem(K.l);toast('👋 Sampai jumpa!');setTimeout(()=>window.location.href='index.html',1000);};

    // Vibe buttons
    $('btnHot').onclick  = ()=>{if(state===S.IDLE)startBid('hot_take');};
    $('btnSoft').onclick = ()=>{if(state===S.IDLE)startBid('soft_talk');};

    // Cancel bid
    $('scanCancel').onclick=async()=>{
        if(state===S.BIDDING){
            clearBidTimers();
            await fetch('/api/invite',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:UID})});
            enterIdle();toast('Pencarian dibatalkan');
        }
    };

    // Invitation popup
    $('btnAccept').onclick  = acceptInv;
    $('btnDecline').onclick = async()=>{
        if(pendingInv)await api('/api/invite',{action:'decline',userId:UID,username:ME,invitationId:pendingInv.id});
        hidePopup();
    };

    // Chat send
    const send=async()=>{
        const inp=$('chatInput'),msg=inp.value.trim();
        if(!msg)return;inp.value='';
        if(state===S.CHAT_REAL)await sendReal(msg);
        else if(state===S.CHAT_AI){addMsg('user',msg);await sendAI(msg,false);}
    };
    $('chatSend').onclick=send;
    $('chatInput').onkeypress=e=>{if(e.key==='Enter')send();};

    // End chat
    $('chatClose').onclick=async()=>{
        if(state===S.CHAT_REAL){
            addSys('🔴 Kamu mengakhiri chat');
            await fetch('/api/invite',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:UID,roomId})});
        }
        setTimeout(enterIdle,500);
    };

    // Whisper
    $('whisperBtn').onclick=()=>$('whisperOverlay').classList.add('show');
    $('whisperCancel').onclick=()=>$('whisperOverlay').classList.remove('show');
    $('whisperSend').onclick=async()=>{
        const to=$('whisperTarget').value.trim().replace('@',''),msg=$('whisperMessage').value.trim();
        if(!to||!msg){toast('Isi semua field');return;}
        $('whisperOverlay').classList.remove('show');
        try{await fetch('/api/whisper',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:ME,to,message:msg})});toast('✉️ Whisper terkirim');}
        catch(e){toast('Gagal mengirim');}
    };
});
})();
