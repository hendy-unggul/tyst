<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0A0A0A;--sf:#141414;--bd:#2A2A2A;--bd2:#333;--tx:#FFF;--txs:#888;
            --spill:#ff3b6f;--cocomeo:#00e5ff;--jejak:#9900ff;--glitch:#FFD700;
            --ap:var(--spill);--as:var(--cocomeo);
        }
        body{background:var(--bg);color:var(--tx);font-family:Arial,sans-serif;height:100vh;display:flex;flex-direction:column}
        .app{max-width:500px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;background:var(--bg)}
        
        /* Header */
        .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:2px solid var(--bd);background:var(--sf)}
        .logo{font-family:'Arial Black',sans-serif;font-size:34px}
        .logo .x{color:var(--ap);display:inline-block;animation:spin 4s infinite}
        @keyframes spin{95%{transform:rotate(180deg)}}
        .user-badge{font-family:'Courier New',monospace;background:#000;border:2px solid var(--bd);padding:4px 8px;color:var(--as);font-size:12px}
        .settings-btn{width:30px;height:30px;background:0 0;border:2px solid var(--bd2);color:var(--txs);cursor:pointer}
        .settings-dropdown{position:absolute;top:60px;right:18px;background:var(--sf);border:2px solid var(--bd);display:none;z-index:100}
        .settings-dropdown.show{display:block}
        .dropdown-item{padding:12px 16px;border-bottom:1px solid var(--bd);cursor:pointer}
        
        /* Main content */
        .scroll{flex:1;overflow-y:auto;padding-bottom:70px}
        
        /* Radar */
        .radar-sect{background:var(--sf);border-bottom:2px solid var(--bd)}
        .radar-header{display:flex;justify-content:space-between;padding:14px 18px}
        .radar-label{font-family:'Courier New',monospace;font-size:10px;color:var(--as)}
        .online-badge{padding:6px 12px;border:1px solid var(--bd);font-family:'Courier New',monospace;font-size:11px}
        .radar-wrapper{padding:0 18px 16px}
        .radar-bezel{padding:4px;background:var(--bg);border:2px solid var(--bd2);box-shadow:6px 6px 0 #000}
        .radar-cont{position:relative;width:100%;aspect-ratio:1;background:#020a02;overflow:hidden}
        .radar-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px)}
        .radar-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:10}
        .radar-dots{position:absolute;inset:0;z-index:5}
        .radar-dot{position:absolute;width:6px;height:6px;transform:translate(-50%,-50%) rotate(45deg);background:var(--as)}
        
        /* Radar Chat */
        .radar-chat-container {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100;
            display: none; flex-direction: column; justify-content: flex-end;
            padding: 40px 12px 70px 12px; overflow-y: auto; gap: 4px;
        }
        .radar-chat-container .message {
            max-width: 85%; padding: 8px 12px; border-radius: 16px; font-size: 13px;
            margin-bottom: 2px; flex-shrink: 0;
        }
        .radar-chat-container .message.user {
            align-self: flex-end; background: var(--as); color: #000;
            border-bottom-right-radius: 4px;
        }
        .radar-chat-container .message.stranger {
            align-self: flex-start; background: var(--sf); color: var(--tx);
            border: 1px solid var(--bd2); border-bottom-left-radius: 4px;
        }
        .radar-chat-container .typing-indicator {
            align-self: flex-start; color: var(--txs); font-style: italic; font-size: 11px;
            padding: 5px 10px;
        }
        
        /* Chat Input */
        .radar-chat-input-wrapper {
            position: absolute; bottom: 8px; left: 8px; right: 8px; display: flex;
            gap: 6px; padding: 6px; background: rgba(20,20,20,0.95);
            border: 2px solid var(--bd2); border-radius: 30px; z-index: 102;
        }
        .radar-chat-input {
            flex: 1; padding: 10px 16px; background: var(--bg); border: 2px solid var(--bd2);
            color: var(--tx); border-radius: 30px; font-size: 14px; outline: none;
        }
        .radar-chat-send {
            width: 44px; height: 44px; background: var(--ap); border: 2px solid #000;
            color: #fff; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 18px;
        }
        
        /* Scanning Overlay */
        .radar-scanning-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: var(--as); font-family: 'Courier New', monospace;
        }
        .radar-scanning-overlay.show { display: flex; }
        .radar-scanning-text { font-size: 16px; margin-bottom: 20px; }
        .radar-scanning-progress { width: 80%; height: 2px; background: var(--bd2); margin: 15px 0; }
        .radar-scanning-bar { height: 100%; width: 0%; background: var(--as); transition: width 0.1s; }
        
        /* Buttons */
        .radar-ctas{padding:16px 18px;display:flex;flex-direction:column;gap:10px}
        .gender-row{display:flex;gap:10px}
        .btn-gender{flex:1;padding:18px;border:2px solid #000;font-family:'Arial Black',sans-serif;font-size:18px;cursor:pointer;box-shadow:5px 5px 0 #000;background:var(--sf);color:var(--tx)}
        .btn-heart{background:linear-gradient(145deg,var(--ap),#ff6b8b);color:#fff}
        .btn-spade{background:linear-gradient(145deg,var(--as),#4d7aff);color:#000}
        .btn-whisper{width:100%;padding:14px;background:0 0;border:2px dashed var(--bd2);cursor:pointer}
        
        /* Spills */
        .spills-sect{padding:18px}
        .spill-card{background:var(--sf);border:2px solid var(--bd2);margin-bottom:20px;padding:16px;box-shadow:4px 4px 0 #000}
        .spill-author{color:var(--as)}
        .spill-content{font-size:14px;margin:12px 0}
        .spill-reactions{display:flex;gap:8px;border-top:2px solid var(--bd);padding-top:12px}
        .react-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:var(--bg);border:2px solid var(--bd2);cursor:pointer}
        
        /* Chat room fallback */
        .chat-room{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column}
        .chat-room.on{display:flex}
        .chat-messages{flex:1;overflow-y:auto;padding:18px}
        .chat-input-wrap{display:flex;gap:10px;padding:12px 18px;border-top:2px solid var(--bd)}
        .chat-input{flex:1;padding:13px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx)}
        .chat-send{width:48px;height:48px;background:var(--ap);border:2px solid #000;color:#fff;cursor:pointer}
        
        /* Toast & Whisper */
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:12px 22px;border-radius:30px;display:none}
        .toast.show{display:block}
        .whisper-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1500}
        .whisper-overlay.show{display:flex;align-items:center;justify-content:center}
        .whisper-box{background:var(--sf);border:3px solid var(--as);padding:25px;width:90%;max-width:350px}
        .sound-toggle{position:fixed;bottom:80px;right:20px;width:44px;height:44px;background:rgba(0,0,0,.7);border:2px solid var(--as);border-radius:50%;color:var(--as);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2100}
    </style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="logo">SP<span class="x">✕</span>LL</div>
        <div class="user-section">
            <span class="user-badge" id="userNameDisplay">@loading...</span>
            <button class="settings-btn" id="settingsBtn">⋮</button>
        </div>
        <div class="settings-dropdown" id="settingsDropdown">
            <div class="dropdown-item" id="logoutBtn"><span>🚪</span> Logout</div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="scroll">
        <!-- Radar Section -->
        <div class="radar-sect">
            <div class="radar-header">
                <span class="radar-label">VIBE RADAR</span>
                <div class="online-badge"><span id="onlineCount">0 ONLINE</span></div>
            </div>
            <div class="radar-wrapper">
                <div class="radar-bezel">
                    <div class="radar-cont" id="radarCont">
                        <div class="radar-grid"></div>
                        <canvas class="radar-canvas" id="radarCanvas"></canvas>
                        <div class="radar-dots" id="radarDots"></div>
                        
                        <!-- Scanning Overlay -->
                        <div class="radar-scanning-overlay" id="radarScanningOverlay">
                            <div class="radar-scanning-text" id="radarScanningText">MENCARI LAWAN BICARA</div>
                            <div class="radar-scanning-progress"><div class="radar-scanning-bar" id="radarScanningBar"></div></div>
                        </div>
                        
                        <!-- Chat Container -->
                        <div class="radar-chat-container" id="radarChatContainer">
                            <div class="radar-chat-header">✦ CHAT ✦</div>
                        </div>
                        
                        <!-- Chat Input -->
                        <div class="radar-chat-input-wrapper" id="radarChatInputWrapper" style="display:none">
                            <input type="text" class="radar-chat-input" id="radarChatInput" placeholder="Ketik pesan...">
                            <button class="radar-chat-send" id="radarChatSend">➤</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="radar-ctas">
                <div class="gender-row">
                    <button class="btn-gender btn-heart" id="vibeFemaleBtn"><span class="gender-icon">♠️</span><span>HOT TAKE</span></button>
                    <button class="btn-gender btn-spade" id="vibeMaleBtn"><span class="gender-icon">❤️</span><span>SOFT TALK</span></button>
                </div>
                <button class="btn-whisper" id="whisperBtn">✦ WHISPERER</button>
            </div>
        </div>
        
        <!-- Spills Section -->
        <div class="spills-sect">
            <div class="sect-header">SPILL TERKINI</div>
            <div id="spillsList"><div class="empty-state">🍃 MEMUAT SPILL...</div></div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bnav">
        <div class="bnav-c">
            <a href="spill.html" class="ni act">✕ Spill</a>
            <a href="jejak.html" class="ni">◈ Jejak</a>
            <a href="glitch.html" class="ni">‼ Glitch</a>
            <a href="cocomeo.html" class="ni">〜 Cocomeo</a>
        </div>
    </nav>
</div>

<!-- Chat Room Fallback -->
<div class="chat-room" id="chatRoom">
    <div class="chat-head">
        <span id="partnerLabel">STRANGER</span>
        <button class="chat-close" id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chatInput" placeholder="ketik pesan...">
        <button class="chat-send" id="sendButton">➤</button>
    </div>
</div>

<!-- Whisper Modal -->
<div class="whisper-overlay" id="whisperOverlay">
    <div class="whisper-box">
        <div class="whisper-title">✦ WHISPERER</div>
        <input type="text" class="whisper-input" id="whisperTarget" placeholder="@username">
        <textarea class="whisper-input" id="whisperMessage" placeholder="Tulis pesan rahasia..."></textarea>
        <div class="whisper-actions">
            <button class="whisper-btn cancel" id="whisperCancel">BATAL</button>
            <button class="whisper-btn send" id="whisperSend">KIRIM</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<div class="sound-toggle" id="soundToggle">🔊</div>

<script>
(function(){
    // ============ KONFIGURASI ============
    const SUPABASE_URL = 'https://fuovfrdicdhnlymnacpz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';
    
    // ============ USER ============
    const K={u:'jejak_username',i:'jejak_uid',l:'jejak_logged_in'};
    if(localStorage.getItem(K.l)!=='true'){window.location.href='index.html';return;}
    const U=localStorage.getItem(K.u),UID=localStorage.getItem(K.i);
    
    // ============ UTILS ============
    const $=id=>document.getElementById(id);
    const toast=(msg)=>{let o=$('toast');if(o){o.textContent=msg;o.classList.add('show');setTimeout(()=>o.classList.remove('show'),3000);}};
    
    // ============ WEBSOCKET ============
    let ws=null,wsConnected=false;
    function connectWebSocket() {
        ws = new WebSocket('ws://localhost:3001');
        ws.onopen=()=>{wsConnected=true;ws.send(JSON.stringify({type:'IDENTIFY',userId:UID,username:U}));};
        ws.onmessage=(e)=>{let d=JSON.parse(e.data);
            if(d.type==='CHAT_REQUEST'&&confirm(`@${d.from} ingin ngobrol?`)){
                ws.send(JSON.stringify({type:'CHAT_REQUEST_RESPONSE',requestId:d.requestId,accepted:true}));
            }else if(d.type==='MATCH_SUCCESS'){openChat(d.partner.username);
            }else if(d.type==='CHAT_MESSAGE'){addMessage('stranger',d.text);}
        };
        ws.onclose=()=>{wsConnected=false;setTimeout(connectWebSocket,3000);};
    }
    
    // ============ CHAT ============
    let currentPartner=null,chatHistory=[],isTyping=false,radarChatActive=false;
    const aiChars={heart:['beby.manis','pretty.sad','strawberry.shortcake'],spade:['agak.koplak','chili.padi','satria.bajahitam']};
    
    function openChat(name){
        currentPartner=name;chatHistory=[];
        if(USE_RADAR_CHAT){
            $('radarChatContainer').style.display='flex';
            $('radarChatInputWrapper').style.display='flex';
            $('radarCont').classList.add('chat-mode');
            $('chatRoom').classList.remove('on');
        }else{
            $('chatRoom').classList.add('on');
        }
        setTimeout(()=>sendMessage('',true),500);
    }
    
    function addMessage(sender,text){
        let container=USE_RADAR_CHAT?$('radarChatContainer'):$('chatMessages');
        if(!container)return;
        let msg=document.createElement('div');
        msg.className=`message ${sender}`;
        msg.textContent=text;
        container.appendChild(msg);
    }
    
    async function sendMessage(msg,first){
        if(!currentPartner)return;
        if(!first)addMessage('user',msg);
        isTyping=true;
        try{
            let res=await fetch('/api/chat',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({message:msg||'hai',characterName:currentPartner,lastMessages:chatHistory})
            });
            let data=await res.json();
            if(msg)chatHistory.push({role:'assistant',content:data.reply});
            isTyping=false;
            addMessage('stranger',data.reply);
        }catch(e){isTyping=false;addMessage('stranger','😅');}
    }
    
    function closeChat(){
        currentPartner=null;chatHistory=[];isTyping=false;radarChatActive=false;
        $('radarChatContainer').style.display='none';
        $('radarChatInputWrapper').style.display='none';
        $('radarCont').classList.remove('chat-mode');
        $('chatRoom').classList.remove('on');
    }
    
    // ============ VIBE ============
    function startVibe(gender){
        if(USE_RADAR_CHAT){
            radarChatActive=true;
            $('radarScanningOverlay').classList.add('show');
            setTimeout(()=>{
                $('radarScanningOverlay').classList.remove('show');
                let aiName=aiChars[gender][Math.floor(Math.random()*aiChars[gender].length)];
                openChat(aiName);
            },3000);
        }else{
            radarChatActive=true;
            openChat(aiChars[gender][Math.floor(Math.random()*aiChars[gender].length)]);
        }
    }
    
    // ============ WHISPER ============
    function initWhisper(){
        let o=$('whisperOverlay'),tg=$('whisperTarget'),msg=$('whisperMessage');
        $('whisperBtn').onclick=()=>o.classList.add('show');
        $('whisperCancel').onclick=()=>o.classList.remove('show');
        $('whisperSend').onclick=async()=>{
            let t=tg.value.trim().replace('@',''),m=msg.value.trim();
            if(!t||!m){toast('Isi semua field');return;}
            o.classList.remove('show');
            try{
                await fetch('/api/whisper',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({from:U,to:t,message:m})
                });
                toast('Whisper terkirim');
            }catch(e){toast('Gagal');}
        };
    }
    
    // ============ SPILLS ============
    let entries=[];
    async function loadSpills(){
        try{
            let res=await fetch(`${SUPABASE_URL}/rest/v1/entries?select=*&order=created_at.desc&limit=10`,{
                headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
            });
            let data=await res.json();
            entries=data.map(e=>({
                author:e.username||'anon',
                content:e.content||'...',
                reactions:e.reactions||{skull:0,cry:0,fire:0,upside:0}
            }));
            renderSpills();
        }catch(e){entries=[];renderSpills();}
    }
    
    function renderSpills(){
        let c=$('spillsList');
        if(!entries.length){c.innerHTML='<div class="empty-state">🍃 Belum ada spill</div>';return;}
        c.innerHTML=entries.map((s,i)=>`
            <div class="spill-card">
                <div class="spill-author">@${s.author}</div>
                <div class="spill-content">${s.content}</div>
                <div class="spill-reactions">
                    ${['skull','cry','fire','upside'].map(r=>`
                        <button class="react-btn" onclick="reactToSpill(${i},'${r}')">
                            ${r==='skull'?'💀':r==='cry'?'😭':r==='fire'?'🔥':'🙃'}
                            <span>${s.reactions[r]||0}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }
    window.reactToSpill=(i,t)=>{entries[i].reactions[t]++;renderSpills();};
    
    // ============ RADAR ANIMATION ============
    let dots=[],angle=0,spin=0,phase=Math.random()*Math.PI*2,raf;
    function initRadar(){
        let cv=$('radarCanvas'),ct=$('radarCont');
        if(!cv||!ct)return;
        let resize=()=>{let r=ct.getBoundingClientRect();if(r.width>0){cv.width=r.width;cv.height=r.height;}};
        resize();window.addEventListener('resize',resize);
        spawnDots();
        setInterval(()=>{
            dots.forEach(d=>{d.vx=d.vx*.88+(Math.random()-.5)*.3;d.vy=d.vy*.88+(Math.random()-.5)*.3;
            d.x=Math.max(9,Math.min(91,d.x+d.vx));d.y=Math.max(9,Math.min(91,d.y+d.vy));
            if(d.el){d.el.style.left=d.x+'%';d.el.style.top=d.y+'%';}});
        },100);
        radarLoop(cv);
    }
    function spawnDots(){
        let c=$('radarDots');if(!c)return;c.innerHTML='';dots=[];
        for(let i=0;i<8;i++){let a=Math.random()*Math.PI*2,d=12+Math.random()*70,x=50+Math.cos(a)*d/2,y=50+Math.sin(a)*d/2,
            dot=document.createElement('div');dot.className='radar-dot';dot.style.left=x+'%';dot.style.top=y+'%';
            c.appendChild(dot);dots.push({el:dot,x,y,vx:0,vy:0,id:i});}
    }
    function radarLoop(cv){
        let ctx=cv.getContext('2d');
        function draw(){
            let w=cv.width,h=cv.height,cx=w/2,cy=h/2,r=Math.min(cx,cy)*.88;
            if(!w||!h){raf=requestAnimationFrame(draw);return;}
            phase+=.007;spin+=((60/4*Math.PI*2)/(60*60)*(1+Math.sin(phase)*.35)-spin)*.028;
            angle=(angle+spin)%(Math.PI*2);
            ctx.fillStyle='rgba(2,10,2,.18)';ctx.fillRect(0,0,w,h);
            ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
            let grad=ctx.createLinearGradient(0,0,r,0);grad.addColorStop(0,'rgba(0,229,255,1)');grad.addColorStop(1,'rgba(0,229,255,0)');
            ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(r,0);ctx.strokeStyle=grad;ctx.lineWidth=2;ctx.stroke();
            ctx.beginPath();ctx.rect(-4,-4,8,8);ctx.fillStyle='#00e5ff';ctx.fill();
            ctx.restore();
            raf=requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ============ SETTINGS ============
    function initSettings(){
        let b=$('settingsBtn'),d=$('settingsDropdown');
        b.onclick=e=>{e.stopPropagation();d.classList.toggle('show');};
        document.addEventListener('click',e=>{if(!b.contains(e.target)&&!d.contains(e.target))d.classList.remove('show');});
        $('logoutBtn').onclick=()=>{localStorage.removeItem(K.l);toast('👋 Sampai jumpa!');setTimeout(()=>window.location.href='index.html',1000);};
    }
    
    // ============ INIT ============
    window.addEventListener('load',()=>{
        $('userNameDisplay').textContent='@'+U;
        connectWebSocket();
        initRadar();
        initSettings();
        initWhisper();
        loadSpills();
        
        // Sound toggle
        let soundOn=false,audioCtx=null;
        $('soundToggle').onclick=()=>{
            soundOn=!soundOn;
            $('soundToggle').textContent=soundOn?'🔊':'🔇';
            if(soundOn&&!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)();}
        };
        
        // Vibe buttons
        $('vibeFemaleBtn').onclick=()=>startVibe('heart');
        $('vibeMaleBtn').onclick=()=>startVibe('spade');
        
        // Chat input
        $('radarChatSend').onclick=async()=>{
            if(isTyping)return;
            let msg=$('radarChatInput').value.trim();
            if(!msg||!currentPartner)return;
            $('radarChatInput').value='';
            await sendMessage(msg,false);
        };
        $('radarChatInput').onkeypress=e=>{if(e.key==='Enter'&&!isTyping)$('radarChatSend').click();};
        
        // Fallback chat
        $('sendButton').onclick=async()=>{
            if(isTyping)return;
            let msg=$('chatInput').value.trim();
            if(!msg||!currentPartner)return;
            $('chatInput').value='';
            await sendMessage(msg,false);
        };
        $('chatInput').onkeypress=e=>{if(e.key==='Enter'&&!isTyping)$('sendButton').click();};
        
        // Close chat
        $('closeChatBtn').onclick=closeChat;
    });
})();
</script>
</body>
</html>
