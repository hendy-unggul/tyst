<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    <!-- SHARED CSS - SATU-SATUNYA SUMBER KEBENARAN -->
    <link rel="stylesheet" href="/shared.css">
    <style>
        /* ========== SPILL-SPECIFIC STYLES ========== */
        /* Hanya style yang GA ADA di shared.css */
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            padding-top: calc(14px + var(--st));
            border-bottom: 2px solid var(--bd);
            background: var(--bg);
        }
        
        .logo {
            font-family: var(--font-display);
            font-size: 34px;
        }
        
        .logo .x {
            color: var(--ap);
            display: inline-block;
            animation: spin 4s infinite;
        }
        
        @keyframes spin {
            95% { transform: rotate(180deg); }
        }
        
        .user-badge {
            font-family: var(--font-mono);
            background: #000;
            border: 2px solid var(--bd);
            padding: 4px 8px;
            color: var(--as);
        }
        
        .scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 62px;
        }
        
        /* RADAR */
        .radar-sect {
            background: var(--sf);
            border-bottom: 2px solid var(--bd);
        }
        
        .radar-header {
            display: flex;
            justify-content: space-between;
            padding: 14px 18px;
        }
        
        .radar-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--as);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .label-dot {
            width: 8px;
            height: 8px;
            background: var(--as);
            transform: rotate(45deg);
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0.2; }
        }
        
        .online-badge {
            background: rgba(0,229,255,0.1);
            padding: 6px 12px;
            border: 1px solid var(--bd);
            font-family: var(--font-mono);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--aq);
            transform: rotate(45deg);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%,100% { transform: rotate(45deg) scale(1); }
            50% { transform: rotate(45deg) scale(1.2); }
        }
        
        .radar-wrapper {
            padding: 0 18px 16px;
        }
        
        .radar-bezel {
            position: relative;
            padding: 4px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            box-shadow: 6px 6px 0 #000;
        }
        
        .radar-cont {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #020a02;
            overflow: hidden;
        }
        
        .radar-grid {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px),
                repeating-linear-gradient(90deg, rgba(0,229,255,0.04) 0px, transparent 1px, transparent 28px);
        }
        
        .radar-ring {
            position: absolute;
            inset: 8%;
            border: 1px solid rgba(0,229,255,0.08);
            border-radius: 50%;
        }
        
        .radar-ring::before {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0,229,255,0.05);
            inset: 28%;
        }
        
        .radar-cross {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(90deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(0deg, transparent calc(50% - 1px), rgba(0,229,255,0.06) calc(50% - 1px), rgba(0,229,255,0.06) calc(50% + 1px), transparent calc(50% + 1px));
        }
        
        .radar-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: block;
        }
        
        .radar-dots {
            position: absolute;
            inset: 0;
            z-index: 5;
        }
        
        .radar-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            transform: translate(-50%,-50%) rotate(45deg);
            background: var(--as);
            opacity: 0.3;
        }
        
        /* TOMBOL GENDER */
        .radar-ctas {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .gender-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        
        .btn-gender {
            flex: 1;
            padding: 18px 8px;
            border: 2px solid #000;
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.1s;
        }
        
        .btn-gender:active { 
            transform: translate(3px, 3px); 
            box-shadow: 2px 2px 0 #000; 
        }
        
        .btn-heart { 
            background: linear-gradient(145deg, var(--ap), #ff6b8b); 
            color: white; 
        }
        
        .btn-spade { 
            background: linear-gradient(145deg, var(--as), #4d7aff); 
            color: black; 
        }
        
        .gender-icon { 
            font-size: 38px; 
        }
        
        .gender-tag { 
            font-family: var(--font-mono); 
            font-size: 9px; 
            background: #000; 
            color: var(--aq); 
            padding: 4px 8px; 
        }
        
        .btn-whisper { 
            width: 100%; 
            padding: 14px; 
            background: transparent; 
            border: 2px dashed var(--bd2); 
            font-family: var(--font-body); 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            color: var(--txs);
        }
        
        /* FILTER */
        .filter-sect {
            padding: 18px;
            border-bottom: 2px solid var(--bd);
        }
        
        .filter-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        
        .filter-title {
            font-family: var(--font-mono);
            font-size: 9px;
            color: var(--txs);
            letter-spacing: 3px;
        }
        
        .match-pct {
            font-family: var(--font-display);
            font-size: 26px;
            color: var(--ap);
        }
        
        .vibe-slider {
            width: 100%;
            height: 3px;
            background: var(--bd2);
            -webkit-appearance: none;
        }
        
        .vibe-slider::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            background: var(--ap);
            border: 3px solid var(--bg);
            box-shadow: 0 0 0 2px var(--ap), 3px 3px 0 #000;
            cursor: pointer;
            -webkit-appearance: none;
        }
        
        /* SPILLS - PAKAI SHARED.CSS + CUSTOM LAYOUT */
        .spills-sect {
            padding: 18px;
        }
        
        .spill-card {
            background: var(--sf);
            border: 2px solid var(--bd2);
            margin-bottom: 16px;
            padding: 16px;
            box-shadow: 4px 4px 0 #000;
        }
        
        .spill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        
        .spill-author {
            color: var(--as);
        }
        
        .spill-mood {
            padding: 4px 8px;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* WARNA MOOD - PAKAI VARIABEL DARI SHARED.CSS */
        .spill-mood.surviving { 
            background: var(--ap); 
            color: white; 
        }
        
        .spill-mood.thriving { 
            background: var(--aq); 
            color: black; 
        }
        
        .spill-mood.chaotic { 
            background: var(--as); 
            color: black; 
        }
        
        .spill-mood.doom { 
            background: var(--purple); 
            color: white; 
        }
        
        .spill-content {
            font-size: 14px;
            line-height: 1.6;
            color: var(--tx);
            font-family: var(--font-body);
        }
        
        /* HILANGKAN MOOD TAB */
        .mood-scroll {
            display: none;
        }
        
        /* WAITING OVERLAY */
        .waiting-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .waiting-box {
            background: var(--sf);
            border: 3px solid var(--as);
            padding: 30px;
            text-align: center;
            box-shadow: 12px 12px 0 #000;
        }
        
        .waiting-timer {
            width: 100px;
            height: 100px;
            border: 4px solid var(--aq);
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 36px;
            color: var(--aq);
        }
        
        #cancelWaiting {
            background: transparent;
            border: 2px solid var(--bd2);
            color: var(--txs);
            padding: 14px 24px;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
        }
        
        /* CHAT ROOM */
        .chat-room {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 500;
            flex-direction: column;
        }
        
        .chat-room.on { display: flex; }
        
        .chat-head {
            display: flex;
            justify-content: space-between;
            padding: 12px 18px;
            border-bottom: 2px solid var(--bd);
            background: var(--sf);
        }
        
        #partnerLabel {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--as);
            background: rgba(0,229,255,0.1);
            padding: 6px 14px;
            border: 1px solid var(--bd);
        }
        
        .chat-timer {
            font-family: var(--font-display);
            font-size: 22px;
            color: var(--aq);
            background: var(--bg);
            padding: 8px 14px;
            border: 2px solid var(--bd);
            box-shadow: 3px 3px 0 #000;
        }
        
        .chat-close {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border: 2px solid var(--bd);
            color: var(--txs);
            font-size: 18px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }
        
        .chat-input-wrap {
            display: flex;
            gap: 10px;
            padding: 12px 18px;
            border-top: 2px solid var(--bd);
            background: var(--sf);
        }
        
        .chat-input {
            flex: 1;
            padding: 13px;
            background: var(--bg);
            border: 2px solid var(--bd2);
            color: var(--tx);
            font-family: var(--font-body);
        }
        
        .chat-send {
            width: 48px;
            height: 48px;
            background: var(--ap);
            border: 2px solid #000;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">SP<span class="x">✕</span>LL</div>
        <span class="user-badge" id="userNameDisplay">@beby.manis</span>
    </div>
    
    <!-- MAIN SCROLL -->
    <div class="scroll">
        <!-- RADAR SECTION -->
        <div class="radar-sect">
            <div class="radar-header">
                <span class="radar-label"><span class="label-dot"></span>VIBE RADAR</span>
                <div class="online-badge">
                    <span class="online-dot"></span>
                    <span id="onlineCount">21 ONLINE</span>
                </div>
            </div>
            
            <!-- RADAR VISUAL -->
            <div class="radar-wrapper">
                <div class="radar-bezel">
                    <div class="radar-cont" id="radarCont">
                        <div class="radar-grid"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-cross"></div>
                        <canvas class="radar-canvas" id="radarCanvas"></canvas>
                        <div class="radar-dots" id="radarDots"></div>
                    </div>
                </div>
            </div>
            
            <!-- TOMBOL HEART & SPADE -->
            <div class="radar-ctas">
                <div class="gender-row">
                    <button class="btn-gender btn-heart" id="vibeFemaleBtn">
                        <span class="gender-icon">❤️</span>
                        <span>YUK NGROBOL</span>
                        <span class="gender-tag">CARI CEWEK</span>
                    </button>
                    
                    <button class="btn-gender btn-spade" id="vibeMaleBtn">
                        <span class="gender-icon">♠️</span>
                        <span>YUK BIKIN RUSUH</span>
                        <span class="gender-tag">CARI COWOK</span>
                    </button>
                </div>
                <button class="btn-whisper" id="whisperBtn">✦ WHISPERER <span>NEW</span></button>
            </div>
        </div>
        
        <!-- FILTER SECTION -->
        <div class="filter-sect">
            <div class="filter-top">
                <span class="filter-title">KESELARASAN</span>
                <span class="match-pct" id="vibePct">87%</span>
            </div>
            <input type="range" class="vibe-slider" id="vibeSlider" min="0" max="100" value="87">
        </div>
        
        <!-- SPILLS SECTION -->
        <div class="spills-sect">
            <div class="sect-header">
                <div class="sect-title">SPILL TERKINI</div>
                <span id="feedMeta">8 spill</span>
            </div>
            <div id="spillsList">
                <div class="empty-state">🍃 MEMUAT SPILL...</div>
            </div>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="nav-container">
            <div class="nav-item active" data-page="spill">✕ SPILL</div>
            <div class="nav-item" data-page="jejak">✦ JEJAK</div>
            <div class="nav-item" data-page="glitch">⚡ GLITCH</div>
            <div class="nav-item" data-page="cocomeo">〜 COCOMEO</div>
        </div>
    </nav>
</div>

<!-- WAITING OVERLAY -->
<div class="waiting-overlay" id="waitingOverlay">
    <div class="waiting-box">
        <div class="waiting-icon" id="waitingIcon">❤️</div>
        <div class="waiting-timer" id="waitingTimer">15</div>
        <button id="cancelWaiting">BATAL</button>
    </div>
</div>

<!-- CHAT ROOM -->
<div class="chat-room" id="chatRoom">
    <div class="chat-head">
        <span id="partnerLabel">STRANGER</span>
        <span class="chat-timer" id="chatTimer">15:00</span>
        <button class="chat-close" id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div style="text-align:center; color:#777; padding:20px;">👥 Perfect stranger</div>
    </div>
    <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chatInput" placeholder="ketik...">
        <button class="chat-send" id="sendButton">➤</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- SPILL GENERATOR -->
<script src="/spill-generator.js"></script>

<!-- MAIN SCRIPT -->
<script>
(function() {
    'use strict';
    
    const $ = (id) => document.getElementById(id);
    
    // ========== DATA SPILL ==========
    const dummySpills = [
        {
            author: 'satria.bajahitam',
            mood: 'surviving',
            content: 'hari ini nangis di toilet kantor gara-gara dimarahin boss. rasanya pengen resign aja tapi takut ga dapet kerjaan lain 😭😭😭'
        },
        {
            author: 'chili.padi',
            mood: 'thriving',
            content: 'akhirnya sidang ACC, lulus 🥳🥳🥳'
        },
        {
            author: 'cinnamon.girl',
            mood: 'doom',
            content: 'ga semangat ngapa-ngapain 😭😭😭'
        },
        {
            author: 'pretty.sad',
            mood: 'thriving',
            content: 'alhamdulillah dapet beasiswa S2 ke luar negeri. perjuangan ngurus berkas, ikut tes, wawancara, akhirnya berbuah manis 😭😭😭'
        },
        {
            author: 'pretty.sad',
            mood: 'surviving',
            content: 'minggu malem anxiety attack, mikirin minggu depan ada meeting penting, presentasi, deadline. ditambah hubungan sama keluarga lagi ga baik. rasanya pengen lari 😭😭😭'
        }
    ];
    
    // Override render function
    window.renderSpills = function() {
        const container = $('#spillsList');
        if (!container) return;
        
        container.innerHTML = dummySpills.map(spill => `
            <div class="spill-card">
                <div class="spill-header">
                    <span class="spill-author">@${spill.author}</span>
                    <span class="spill-mood ${spill.mood}">${spill.mood.toUpperCase()}</span>
                </div>
                <div class="spill-content">
                    ${spill.content}
                </div>
            </div>
        `).join('');
        
        const meta = $('#feedMeta');
        if (meta) meta.textContent = dummySpills.length + ' spill';
    };
    
    // Panggil render
    window.renderSpills();
    
    // ========== VIBE CHECK ==========
    function startVibeCheck(type) {
        console.log(`[Vibe] ${type} clicked`);
        
        const overlay = $('#waitingOverlay');
        const icon = $('#waitingIcon');
        if (overlay && icon) {
            icon.textContent = type === 'heart' ? '❤️' : '♠️';
            overlay.style.display = 'flex';
            
            let seconds = 15;
            const timerEl = $('#waitingTimer');
            if (timerEl) timerEl.textContent = seconds;
            
            const timer = setInterval(() => {
                seconds--;
                if (timerEl) timerEl.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(timer);
                    overlay.style.display = 'none';
                }
            }, 1000);
            
            $('#cancelWaiting').onclick = () => {
                clearInterval(timer);
                overlay.style.display = 'none';
            };
        }
    }
    
    // ========== EVENT LISTENERS ==========
    $('#vibeFemaleBtn').onclick = (e) => {
        e.preventDefault();
        startVibeCheck('heart');
    };
    
    $('#vibeMaleBtn').onclick = (e) => {
        e.preventDefault();
        startVibeCheck('spade');
    };
    
    $('#closeChatBtn').onclick = () => {
        $('#chatRoom').classList.remove('on');
    };
    
    // ========== INIT ==========
    console.log('[App] Ready!');
})();
</script>
</body>
</html>
