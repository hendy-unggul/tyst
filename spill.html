<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0A0A0A;--sf:#141414;--sfe:#1E1E1E;--bd:#2A2A2A;--bd2:#333;--tx:#FFF;--txs:#888;--txm:#555;
            --spill:#ff3b6f;--cocomeo:#00e5ff;--jejak:#9900ff;--glitch:#FFD700;
            --ap:var(--spill);--as:var(--cocomeo);--at:#FF006E;--aq:#bfff00;--aw:#FFD700;
            --font-display:'Arial Black',sans-serif;--font-mono:'Courier New',monospace;--font-body:Arial,sans-serif
        }
        body{background:var(--bg);color:var(--tx);font-family:var(--font-body);height:100vh;display:flex;flex-direction:column}
        .app{max-width:500px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;background:var(--bg);border-left:2px solid var(--bd);border-right:2px solid var(--bd);position:relative}
        
        /* ===== HEADER ===== */
        .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:2px solid var(--bd);background:var(--sf);position:relative}
        .logo{font-family:var(--font-display);font-size:34px}
        .logo .x{color:var(--ap);display:inline-block;animation:spin 4s infinite}
        @keyframes spin{95%{transform:rotate(180deg)}}
        .user-section{display:flex;align-items:center;gap:12px}
        .user-badge{font-family:var(--font-mono);background:#000;border:2px solid var(--bd);padding:4px 8px;color:var(--as);font-size:12px}
        .settings-btn{width:30px;height:30px;background:0 0;border:2px solid var(--bd2);color:var(--txs);font-size:18px;cursor:pointer;border-radius:4px}
        .settings-dropdown{position:absolute;top:60px;right:18px;background:var(--sf);border:2px solid var(--bd);box-shadow:6px 6px 0 #000;z-index:100;min-width:180px;display:none}
        .settings-dropdown.show{display:block}
        .dropdown-item{padding:12px 16px;font-family:var(--font-mono);font-size:12px;color:var(--tx);cursor:pointer;border-bottom:1px solid var(--bd)}
        
        /* ===== SCROLL AREA ===== */
        .scroll{flex:1;overflow-y:auto;padding-bottom:70px;scrollbar-width:thin;scrollbar-color:var(--bd2) var(--bg)}
        
        /* ===== RADAR SECTION ===== */
        .radar-sect{background:var(--sf);border-bottom:2px solid var(--bd)}
        .radar-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
        .radar-label{font-family:var(--font-mono);font-size:10px;color:var(--as)}
        .online-badge{background:rgba(0,0,0,.3);padding:6px 12px;border:1px solid var(--bd);font-family:var(--font-mono);font-size:11px}
        .radar-wrapper{padding:0 18px 16px}
        .radar-bezel{position:relative;padding:4px;background:var(--bg);border:2px solid var(--bd2);box-shadow:6px 6px 0 #000}
        .radar-cont{position:relative;width:100%;aspect-ratio:1;background:#020a02;overflow:hidden;border-radius:0}
        .radar-cont.chat-mode{border-radius:24px;background:rgba(0,0,0,0.95)}
        .radar-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px)}
        .radar-ring{position:absolute;inset:8%;border:1px solid rgba(0,229,255,.08);border-radius:50%}
        .radar-ring::before{content:'';position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.05);inset:28%}
        .radar-cross{position:absolute;inset:0;background:linear-gradient(90deg,transparent calc(50% - 1px),rgba(0,229,255,.06) calc(50% - 1px),rgba(0,229,255,.06) calc(50% + 1px),transparent calc(50% + 1px)),linear-gradient(0deg,transparent calc(50% - 1px),rgba(0,229,255,.06) calc(50% - 1px),rgba(0,229,255,.06) calc(50% + 1px),transparent calc(50% + 1px))}
        .radar-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:10;display:block}
        .radar-dots{position:absolute;inset:0;z-index:5}
        .radar-dot{position:absolute;width:6px;height:6px;transform:translate(-50%,-50%) rotate(45deg);background:var(--as);opacity:.3}
        .radar-dot.active{opacity:1;transform:translate(-50%,-50%) rotate(45deg) scale(2.5)}
        
        /* ===== RADAR CHAT ===== */
        .radar-chat-container {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100;
            display: none; flex-direction: column; justify-content: flex-end;
            padding: 40px 12px 70px 12px; overflow-y: auto; color: var(--tx); gap: 4px;
        }
        .radar-chat-container .message {
            max-width: 85%; padding: 8px 12px; border-radius: 16px; font-size: 13px;
            line-height: 1.4; word-wrap: break-word; margin-bottom: 2px; flex-shrink: 0;
        }
        .radar-chat-container .message.user {
            align-self: flex-end; background: var(--as); color: #000;
            border-bottom-right-radius: 4px;
        }
        .radar-chat-container .message.stranger {
            align-self: flex-start; background: var(--sf); color: var(--tx);
            border: 1px solid var(--bd2); border-bottom-left-radius: 4px;
        }
        .radar-chat-container .typing-indicator {
            align-self: flex-start; color: var(--txs); font-style: italic;
            font-size: 11px; padding: 5px 10px; flex-shrink: 0;
        }
        .radar-chat-input-wrapper {
            position: absolute; bottom: 8px; left: 8px; right: 8px; display: flex;
            gap: 6px; padding: 6px; background: rgba(20,20,20,0.95);
            border: 2px solid var(--bd2); border-radius: 30px; z-index: 102;
        }
        .radar-chat-input {
            flex: 1; padding: 10px 16px; background: var(--bg); border: 2px solid var(--bd2);
            color: var(--tx); border-radius: 30px; font-size: 14px; outline: none;
        }
        .radar-chat-send {
            width: 44px; height: 44px; background: var(--ap); border: 2px solid #000;
            color: #fff; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 18px;
        }
        .radar-chat-header {
            position: absolute; top: 8px; left: 0; right: 0; text-align: center;
            font-family: var(--font-mono); font-size: 10px; color: var(--txs);
            background: rgba(0,0,0,0.5); width: fit-content; margin: 0 auto;
            padding: 4px 16px; border-radius: 20px; z-index: 103;
        }
        
        /* ===== SCANNING OVERLAY ===== */
        .radar-scanning-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: var(--as); font-family: var(--font-mono); backdrop-filter: blur(2px);
        }
        .radar-scanning-overlay.show { display: flex; }
        .radar-scanning-text { font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 20px; color: var(--as); }
        .radar-scanning-progress { width: 80%; height: 2px; background: var(--bd2); margin: 15px 0; }
        .radar-scanning-bar { height: 100%; width: 0%; background: var(--as); transition: width 0.1s; }
        .radar-scanning-dots { display: flex; gap: 8px; margin-top: 10px; }
        .radar-scanning-dots span { width: 6px; height: 6px; background: var(--as); border-radius: 50%; }
        
        /* ===== CTA BUTTONS ===== */
        .radar-ctas{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px}
        .gender-row{display:flex;gap:10px}
        .btn-gender{flex:1;padding:18px 8px;border:2px solid #000;font-family:var(--font-display);font-size:18px;letter-spacing:2px;cursor:pointer;box-shadow:5px 5px 0 #000;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--sf);color:var(--tx)}
        .btn-gender:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000}
        .btn-heart{background:linear-gradient(145deg,var(--ap),#ff6b8b);color:#fff}
        .btn-spade{background:linear-gradient(145deg,var(--as),#4d7aff);color:#000}
        .gender-icon{font-size:38px}
        .btn-whisper{width:100%;padding:14px;background:0 0;border:2px dashed var(--bd2);font-family:var(--font-body);cursor:pointer;display:flex;justify-content:space-between;color:var(--txs)}
        
        /* ===== SPILLS SECTION ===== */
        .spills-sect{padding:18px}
        .sect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-family:var(--font-mono);font-size:12px}
        .spill-card{background:var(--sf);border:2px solid var(--bd2);margin-bottom:20px;padding:16px;box-shadow:4px 4px 0 #000}
        .spill-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--font-mono);font-size:12px}
        .spill-author{color:var(--as)}
        .spill-mood{padding:4px 8px;font-size:10px;font-weight:700;letter-spacing:1px}
        .spill-mood.surviving{background:var(--ap);color:#fff}
        .spill-mood.thriving{background:var(--aq);color:#000}
        .spill-mood.chaotic{background:var(--as);color:#000}
        .spill-mood.doom{background:#9900ff;color:#fff}
        .spill-content{font-size:14px;line-height:1.6;color:var(--tx);margin-bottom:12px}
        .spill-reactions{display:flex;gap:8px;border-top:2px solid var(--bd);padding-top:12px}
        .react-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;background:var(--bg);border:2px solid var(--bd2);color:var(--txs);cursor:pointer;font-family:var(--font-mono);font-size:14px}
        .react-count{font-size:11px;font-weight:700}
        .empty-state{text-align:center;padding:40px;color:var(--txs);font-family:var(--font-mono);font-size:14px;border:2px dashed var(--bd2)}
        
        /* ===== BOTTOM NAV ===== */
        .bnav{background:#050505;border-top:2px solid var(--bd);padding:8px 16px 12px;width:100%;max-width:500px;z-index:50}
        .bnav-c{display:flex;justify-content:space-around;align-items:flex-end;gap:4px}
        .ni{font-family:var(--font-mono);text-decoration:none;display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;flex:1;color:var(--txs);gap:4px}
        .nico{font-size:24px;font-weight:bold;line-height:1}
        .ni span:last-child{font-size:10px;text-transform:uppercase}
        .ni[href="spill.html"]{color:var(--spill)}
        .ni[href="jejak.html"]{color:var(--jejak)}
        .ni[href="glitch.html"]{color:var(--glitch)}
        .ni[href="cocomeo.html"]{color:var(--cocomeo)}
        .ni.act{color:var(--tx);transform:translateY(-4px)}
        .ni.act .nico{transform:scale(1.2)}
        
        /* ===== FALLBACK CHAT ===== */
        .chat-room{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column}
        .chat-room.on{display:flex}
        .chat-head{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:2px solid var(--bd);background:var(--sf)}
        .chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
        .chat-input-wrap{display:flex;gap:10px;padding:12px 18px;border-top:2px solid var(--bd);background:var(--sf)}
        .chat-input{flex:1;padding:13px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);border-radius:8px;font-size:14px}
        .chat-send{width:48px;height:48px;background:var(--ap);border:2px solid #000;color:#fff;font-size:20px;cursor:pointer;border-radius:8px}
        .chat-close{width:40px;height:40px;background:var(--bg);border:2px solid var(--bd);color:var(--txs);cursor:pointer}
        
        /* ===== TOAST & WHISPER ===== */
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:12px 22px;z-index:2000;border-radius:30px;display:none}
        .toast.show{display:block}
        .whisper-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1500;align-items:center;justify-content:center}
        .whisper-overlay.show{display:flex}
        .whisper-box{background:var(--sf);border:3px solid var(--as);padding:25px;text-align:center;box-shadow:12px 12px 0 #000;max-width:350px;width:90%}
        .whisper-input{width:100%;padding:15px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);margin:15px 0}
        .whisper-actions{display:flex;gap:10px}
        .whisper-btn{flex:1;padding:12px;border:2px solid #000;cursor:pointer}
        .whisper-btn.send{background:var(--as);color:#000}
        .whisper-btn.cancel{background:0 0;color:var(--txs)}
        .sound-toggle{position:fixed;bottom:80px;right:20px;width:44px;height:44px;background:rgba(0,0,0,.7);border:2px solid var(--as);border-radius:50%;color:var(--as);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2100}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">SP<span class="x">✕</span>LL</div>
        <div class="user-section">
            <span class="user-badge" id="userNameDisplay">@loading...</span>
            <button class="settings-btn" id="settingsBtn">⋮</button>
        </div>
        <div class="settings-dropdown" id="settingsDropdown">
            <div class="dropdown-item" id="logoutBtn">🚪 Logout</div>
        </div>
    </div>
    
    <!-- MAIN SCROLL -->
    <div class="scroll">
        <!-- RADAR SECTION -->
        <div class="radar-sect">
            <div class="radar-header">
                <span class="radar-label">VIBE RADAR</span>
                <div class="online-badge"><span id="onlineCount">0 ONLINE</span></div>
            </div>
            <div class="radar-wrapper">
                <div class="radar-bezel">
                    <div class="radar-cont" id="radarCont">
                        <div class="radar-grid"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-cross"></div>
                        <canvas class="radar-canvas" id="radarCanvas"></canvas>
                        <div class="radar-dots" id="radarDots"></div>
                        
                        <!-- Scanning Overlay -->
                        <div class="radar-scanning-overlay" id="radarScanningOverlay">
                            <div class="radar-scanning-text" id="radarScanningText">MENCARI LAWAN BICARA</div>
                            <div class="radar-scanning-dots"><span></span><span></span><span></span></div>
                            <div class="radar-scanning-progress"><div class="radar-scanning-bar" id="radarScanningBar"></div></div>
                        </div>
                        
                        <!-- Radar Chat -->
                        <div class="radar-chat-container" id="radarChatContainer">
                            <div class="radar-chat-header">✦ CHAT ✦</div>
                        </div>
                        <div class="radar-chat-input-wrapper" id="radarChatInputWrapper" style="display:none">
                            <input type="text" class="radar-chat-input" id="radarChatInput" placeholder="Ketik pesan...">
                            <button class="radar-chat-send" id="radarChatSend">➤</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="radar-ctas">
                <div class="gender-row">
                    <button class="btn-gender btn-heart" id="vibeFemaleBtn"><span class="gender-icon">♠️</span><span>HOT TAKE</span></button>
                    <button class="btn-gender btn-spade" id="vibeMaleBtn"><span class="gender-icon">❤️</span><span>SOFT TALK</span></button>
                </div>
                <button class="btn-whisper" id="whisperBtn">✦ WHISPERER <span>NEW</span></button>
            </div>
        </div>
        
        <!-- SPILLS SECTION -->
        <div class="spills-sect">
            <div class="sect-header">
                <span>SPILL TERKINI</span>
                <span id="feedMeta">0 spill</span>
            </div>
            <div id="spillsList"><div class="empty-state">🍃 MEMUAT SPILL...</div></div>
        </div>
    </div>
    
    <!-- BOTTOM NAV -->
    <nav class="bnav">
        <div class="bnav-c">
            <a href="spill.html" class="ni act"><span class="nico">✕</span><span>Spill</span></a>
            <a href="jejak.html" class="ni"><span class="nico">◈</span><span>Jejak</span></a>
            <a href="glitch.html" class="ni"><span class="nico">‼</span><span>Glitch</span></a>
            <a href="cocomeo.html" class="ni"><span class="nico">〜</span><span>Cocomeo</span></a>
        </div>
    </nav>
</div>

<!-- FALLBACK CHAT -->
<div class="chat-room" id="chatRoom">
    <div class="chat-head">
        <span id="partnerLabel">STRANGER</span>
        <span class="chat-timer" id="chatTimer">15:00</span>
        <button class="chat-close" id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chatInput" placeholder="ketik pesan...">
        <button class="chat-send" id="sendButton">➤</button>
    </div>
</div>

<!-- WHISPER MODAL -->
<div class="whisper-overlay" id="whisperOverlay">
    <div class="whisper-box">
        <div class="whisper-title">✦ WHISPERER</div>
        <input type="text" class="whisper-input" id="whisperTarget" placeholder="@username">
        <textarea class="whisper-input" id="whisperMessage" placeholder="Tulis pesan rahasia..."></textarea>
        <div class="whisper-actions">
            <button class="whisper-btn cancel" id="whisperCancel">BATAL</button>
            <button class="whisper-btn send" id="whisperSend">KIRIM</button>
        </div>
    </div>
</div>

<!-- TOAST & SOUND -->
<div class="toast" id="toast"></div>
<div class="sound-toggle" id="soundToggle">🔊</div>

<script>
(function(){
    // ============ SUPABASE CONFIG ============
    const SUPABASE_URL = 'https://fuovfrdicdhnlymnacpz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';
    
    // Inisialisasi Supabase
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // ============ USER ============
    const K={u:'jejak_username',i:'jejak_uid',l:'jejak_logged_in'};
    if(localStorage.getItem(K.l)!=='true'){window.location.href='index.html';return;}
    const U=localStorage.getItem(K.u),UID=localStorage.getItem(K.i);
    
    // ============ UTILS ============
    const $=id=>document.getElementById(id);
    const toast=(msg,err)=>{let o=$('toast');if(o){o.textContent=msg;o.className='toast'+(err?' error':'');o.classList.add('show');setTimeout(()=>o.classList.remove('show'),3000);}};
    
    // ============ CHAT STATE ============
    let currentPartner = null;
    let chatChannel = null;
    let isSearching = false;
    let radarChatActive = false;
    let isTyping = false;
    let ch = []; // buat AI chat
    
    // ============ AI CHARACTERS ============
    const aiChars={heart:['beby.manis','pretty.sad','strawberry.shortcake','cinnamon.girl','move.on'],spade:['agak.koplak','chili.padi','sejuta.badai','satria.bajahitam']};
    const getRandomAI = (gender) => aiChars[gender][Math.floor(Math.random()*aiChars[gender].length)];
    
    // ============ FIND PARTNER ============
    async function findPartner(gender) {
        if (isSearching) return;
        isSearching = true;
        
        // Tampilkan overlay scanning
        $('radarScanningOverlay').classList.add('show');
        
        // Hapus dari waiting room kalo sebelumnya ada
        await supabase
            .from('waiting_room')
            .delete()
            .eq('user_id', UID);
        
        // Masuk ke waiting room
        await supabase
            .from('waiting_room')
            .insert([{ 
                user_id: UID, 
                username: U,
                gender: gender 
            }]);
        
        // Cari partner yang cocok (gender sama, bukan diri sendiri)
        const { data: candidates } = await supabase
            .from('waiting_room')
            .select('*')
            .eq('gender', gender)
            .neq('user_id', UID)
            .order('created_at', { ascending: false })
            .limit(5);
        
        if (candidates && candidates.length > 0) {
            // Ada calon partner, pilih yang paling baru
            const partner = candidates[0];
            
            // Hapus dari waiting room
            await supabase
                .from('waiting_room')
                .delete()
                .eq('user_id', UID);
            await supabase
                .from('waiting_room')
                .delete()
                .eq('user_id', partner.user_id);
            
            // Buat channel chat
            const channelName = `chat_${UID}_${partner.user_id}_${Date.now()}`;
            
            // Simpan ke active_chats
            await supabase
                .from('active_chats')
                .insert([{
                    user1_id: UID,
                    user2_id: partner.user_id,
                    channel_name: channelName
                }]);
            
            // Setup channel
            setupChatChannel(channelName, partner.username);
            
        } else {
            // Ga ada partner, tunggu 10 detik
            setTimeout(() => {
                // Cek lagi kalo masih nyari
                if (isSearching) {
                    $('radarScanningOverlay').classList.remove('show');
                    isSearching = false;
                    
                    // Fallback ke AI
                    const aiName = getRandomAI(gender);
                    openChat(aiName);
                    toast('Partner tidak ditemukan, coba dengan AI');
                }
            }, 10000);
            
            // Listen untuk dipanggil partner
            const matchListener = supabase.channel('match_notification');
            matchListener.on('broadcast', { event: 'match_found' }, (payload) => {
                if (payload.payload.partnerId !== UID) return;
                
                // Dapet match!
                $('radarScanningOverlay').classList.remove('show');
                isSearching = false;
                
                // Setup channel
                setupChatChannel(payload.payload.channel, payload.payload.partner);
                
                // Bersihin listener
                supabase.removeChannel(matchListener);
            });
            matchListener.subscribe();
        }
    }
    
    // ============ SETUP CHAT CHANNEL ============
    function setupChatChannel(channelName, partnerName) {
        // Hapus channel lama kalo ada
        if (chatChannel) {
            supabase.removeChannel(chatChannel);
        }
        
        // Buat channel baru
        chatChannel = supabase.channel(channelName);
        
        // Listen for messages
        chatChannel.on('broadcast', { event: 'message' }, (payload) => {
            addMessage('stranger', payload.payload.text);
        });
        
        chatChannel.subscribe((status) => {
            if (status === 'SUBSCRIBED') {
                // Berhasil subscribe, buka chat
                currentPartner = partnerName;
                openChat(partnerName);
            }
        });
    }
    
    // ============ SEND MESSAGE ============
    async function sendMessage(text) {
        if (!chatChannel || !currentPartner) return;
        
        // Tampilkan di UI sendiri
        addMessage('user', text);
        
        // Kirim ke partner via broadcast
        await chatChannel.send({
            type: 'broadcast',
            event: 'message',
            payload: { text }
        });
    }
    
    // ============ LEAVE CHAT ============
    async function leaveChat() {
        if (chatChannel) {
            // Hapus dari active_chats
            await supabase
                .from('active_chats')
                .delete()
                .eq('channel_name', chatChannel.topic);
            
            // Unsubscribe
            supabase.removeChannel(chatChannel);
            chatChannel = null;
        }
        
        currentPartner = null;
        closeChatUI();
    }
    
    // ============ CHAT FUNCTIONS ============
    function openChat(name) {
        const pl = $('partnerLabel');
        const ct = $('chatTimer');
        const cr = $('chatRoom');
        const cm = $('chatMessages');
        const radarCont = $('radarCont');
        const radarChat = $('radarChatContainer');
        const radarInputWrapper = $('radarChatInputWrapper');
        
        if (pl) pl.textContent = name.toUpperCase();
        if (ct) ct.textContent = '15:00';
        
        if (radarChatActive && radarChat) {
            radarChat.style.display = 'flex';
            radarChat.innerHTML = '<div class="radar-chat-header">✦ CHAT ✦</div>';
            if (radarInputWrapper) radarInputWrapper.style.display = 'flex';
            if (radarCont) radarCont.classList.add('chat-mode');
            if (cr) cr.classList.remove('on');
            
            setTimeout(() => $('radarChatInput')?.focus(), 300);
        } else {
            if (cr) cr.classList.add('on');
            if (cm) cm.innerHTML = '';
            if (radarChat) radarChat.style.display = 'none';
            if (radarInputWrapper) radarInputWrapper.style.display = 'none';
        }
    }
    
    function closeChatUI() {
        const radarCont = $('radarCont');
        const radarChat = $('radarChatContainer');
        const radarInputWrapper = $('radarChatInputWrapper');
        const cr = $('chatRoom');
        
        if (radarChat) {
            radarChat.style.display = 'none';
            radarChat.innerHTML = '<div class="radar-chat-header">✦ CHAT ✦</div>';
        }
        if (radarInputWrapper) radarInputWrapper.style.display = 'none';
        if (radarCont) radarCont.classList.remove('chat-mode');
        if (cr) cr.classList.remove('on');
    }
    
    function addMessage(sender, text) {
        let container = radarChatActive ? $('radarChatContainer') : $('chatMessages');
        if (!container) return;
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.textContent = text;
        container.appendChild(msgDiv);
    }
    
    // ============ AI CHAT (FALLBACK) ============
    async function sendAIMessage(msg, first) {
        if (!currentPartner) return;
        if (!first) addMessage('user', msg);
        
        showTyping();
        isTyping = true;
        
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: msg || 'hai',
                    characterName: currentPartner,
                    lastMessages: ch
                })
            });
            
            const data = await response.json();
            
            if (msg) ch.push({ role: 'assistant', content: data.reply });
            
            hideTyping();
            isTyping = false;
            addMessage('stranger', data.reply);
            
        } catch (error) {
            hideTyping();
            isTyping = false;
            addMessage('stranger', '😅');
        }
    }
    
    function showTyping() {
        let container = radarChatActive ? $('radarChatContainer') : $('chatMessages');
        if (!container) return;
        
        const oldIndicator = document.getElementById('typingIndicator');
        if (oldIndicator) oldIndicator.remove();
        
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = 'Stranger mengetik <span class="typing-dots"><span></span><span></span><span></span></span>';
        container.appendChild(indicator);
    }
    
    function hideTyping() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }
    
    // ============ VIBE START ============
    const startVibe = (gender) => {
        if (isTyping) {
            toast('Tunggu sampai pesan terkirim');
            return;
        }
        
        radarChatActive = true;
        findPartner(gender);
    };
    
    // ============ SEND MESSAGE WRAPPER ============
    const sendM = async (msg, first) => {
        if (!currentPartner) return;
        
        // Check if it's AI or real user
        if (aiChars.heart.includes(currentPartner) || aiChars.spade.includes(currentPartner)) {
            // AI mode
            await sendAIMessage(msg, first);
        } else {
            // Real user mode via Supabase
            if (!first) await sendMessage(msg);
        }
    };
    
    // ============ CLOSE CHAT ============
    const closeChat = async () => {
        if (chatChannel) {
            await leaveChat();
        } else {
            closeChatUI();
        }
        currentPartner = null;
        ch = [];
        isTyping = false;
        radarChatActive = false;
    };
    
    // ============ INIT RADAR ============
    // (Radar animation code - copy dari yang lama)
    let dots=[],needleAngle=0,needleSpin=0,phaseAngle=Math.random()*Math.PI*2,trail=new Float32Array(120),ptr=0,glowMap=new Map(),raf,rint;
    
    function initRadar(){
        let cv=$('radarCanvas'),ct=$('radarCont');
        if(!cv||!ct)return;
        let resize=()=>{let r=ct.getBoundingClientRect();if(r.width>0){cv.width=r.width;cv.height=r.height;}};
        resize();window.addEventListener('resize',resize);
        spawnDots();
        if(rint)clearInterval(rint);
        rint=setInterval(()=>{
            dots.forEach(d=>{d.vx=d.vx*.88+(Math.random()-.5)*.3;d.vy=d.vy*.88+(Math.random()-.5)*.3;
            d.x=Math.max(9,Math.min(91,d.x+d.vx));d.y=Math.max(9,Math.min(91,d.y+d.vy));
            if(d.el){d.el.style.left=d.x+'%';d.el.style.top=d.y+'%';}});
        },100);
        needleAngle=Math.random()*Math.PI*2;
        trail.fill(needleAngle);
        radarLoop(cv);
    }
    
    function spawnDots(){
        let c=$('radarDots');if(!c)return;c.innerHTML='';dots=[];
        for(let i=0;i<8;i++){
            let a=Math.random()*Math.PI*2,d=12+Math.random()*70,x=50+Math.cos(a)*d/2,y=50+Math.sin(a)*d/2,
            dot=document.createElement('div');dot.className='radar-dot';dot.style.left=x+'%';dot.style.top=y+'%';
            c.appendChild(dot);dots.push({el:dot,x,y,vx:0,vy:0,id:i});
        }
    }
    
    function radarLoop(cv){
        let ctx=cv.getContext('2d');
        function draw(){
            let w=cv.width,h=cv.height,cx=w/2,cy=h/2,R=Math.min(cx,cy)*.88;
            if(!w||!h){raf=requestAnimationFrame(draw);return;}
            
            phaseAngle+=.007;
            needleSpin+=((60/4*Math.PI*2)/(60*60)*(1+Math.sin(phaseAngle)*.35)-needleSpin)*.028;
            needleAngle=(needleAngle+needleSpin)%(Math.PI*2);
            trail[ptr]=needleAngle;
            ptr=(ptr+1)%120;
            
            ctx.fillStyle='rgba(2,10,2,.18)';
            ctx.fillRect(0,0,w,h);
            
            // Gambar trail
            for(let i=0;i<119;i++){
                let a=Math.pow(1-i/120,2.2)*.12;
                if(a<.002)break;
                let s=needleAngle-(i+1)*needleSpin,e=needleAngle-i*needleSpin;
                ctx.save();ctx.translate(cx,cy);
                ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,Math.min(s,e),Math.max(s,e));ctx.closePath();
                ctx.fillStyle=`rgba(0,229,255,${a})`;ctx.fill();ctx.restore();
            }
            
            // Gambar jarum utama
            ctx.save();ctx.translate(cx,cy);ctx.rotate(needleAngle);
            ctx.shadowColor='rgba(0,229,255,.95)';ctx.shadowBlur=12;
            let grad=ctx.createLinearGradient(0,0,R,0);
            grad.addColorStop(0,'rgba(0,229,255,1)');grad.addColorStop(.8,'rgba(0,229,255,.4)');grad.addColorStop(1,'rgba(0,229,255,0)');
            ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(R,0);ctx.strokeStyle=grad;ctx.lineWidth=2;ctx.stroke();
            ctx.shadowBlur=20;ctx.beginPath();ctx.rect(-4,-4,8,8);ctx.fillStyle='#00e5ff';ctx.fill();
            ctx.restore();
            
            // Efek glow
            dots.forEach((d,i)=>{
                let px=d.x/100*w,py=d.y/100*h;
                let da=Math.atan2(py-cy,px-cx);if(da<0)da+=Math.PI*2;
                let diff=needleAngle-da;if(diff<0)diff+=Math.PI*2;
                let age=glowMap.get(i)??999;
                if(diff<.18&&age>30){glowMap.set(i,0);if(d.el){d.el.classList.add('active');setTimeout(()=>d.el?.classList.remove('active'),800);}
                }else glowMap.set(i,age+1);
                
                if(age<55){
                    let t=age/55,ga=(1-t)*(1-t)*.9;
                    if(ga<.01)return;
                    let gr=ctx.createRadialGradient(px,py,0,px,py,16*(1-t)+3);
                    gr.addColorStop(0,`rgba(0,229,255,${ga})`);gr.addColorStop(1,`rgba(0,229,255,0)`);
                    ctx.beginPath();ctx.arc(px,py,16*(1-t)+3,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
                }
            });
            
            raf=requestAnimationFrame(draw);
        }
        draw();
    }
    
    // ============ SETTINGS ============
    function initSettings(){
        let b=$('settingsBtn'),d=$('settingsDropdown');
        if(b&&d){
            b.onclick=e=>{e.stopPropagation();d.classList.toggle('show');};
            document.addEventListener('click',e=>{if(!b.contains(e.target)&&!d.contains(e.target))d.classList.remove('show');});
        }
        $('logoutBtn')?.addEventListener('click',()=>{localStorage.removeItem(K.l);toast('👋 Sampai jumpa!');setTimeout(()=>window.location.href='index.html',1000);});
    }
    
    // ============ WHISPER ============
    function initWhisper(){
        let b=$('whisperBtn'),o=$('whisperOverlay'),c=$('whisperCancel'),s=$('whisperSend'),tg=$('whisperTarget'),msg=$('whisperMessage');
        if(!b||!o)return;
        b.onclick=()=>o.classList.add('show');
        c.onclick=()=>o.classList.remove('show');
        s.onclick=async()=>{
            let t=tg.value.trim().replace('@',''),m=msg.value.trim();
            if(!t||!m){toast('Isi semua field');return;}
            o.classList.remove('show');
            try{
                await fetch('/api/whisper',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:U,to:t,message:m})});
                toast('Whisper terkirim');
            }catch(e){toast('Gagal mengirim whisper');}
        };
    }
    
    // ============ NAV ============
    const initNav=()=>{
        let p=window.location.pathname.split('/').pop()||'spill.html';
        document.querySelectorAll('.ni').forEach(i=>{
            const href=i.getAttribute('href');
            i.classList.toggle('act',href===p);
        });
    };
    
    // ============ SPILLS ============
    let entries=[],aiEntries=[];
    async function loadSpills(){
        try{
            let res=await fetch(`${SUPABASE_URL}/rest/v1/entries?select=*&order=created_at.desc&limit=10`,{
                headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}
            });
            let data=await res.json();
            entries=data.map(e=>({
                author:e.username||'anon',
                mood:e.mood||'chaotic',
                content:e.content||'...',
                reactions:e.reactions||{skull:0,cry:0,fire:0,upside:0},
                created_at:e.created_at
            }));
        }catch(e){entries=[];}
        
        // Generate AI spills
        let moods=['surviving','thriving','chaotic','doom'];
        let contents={
            surviving:['deadline skripsi makin deket 😮‍💨','capek banget hari ini 🥲'],
            thriving:['alhamdulillah hari ini cuan! 💰','sidang kelar nilai A'],
            chaotic:['client minta revisi jam 11 malem 🔥','hidup lagi kacau balau'],
            doom:['motor mogok, dompet tipis 🫠','6 bulan nganggur']
        };
        aiEntries=[];
        for(let i=0;i<6;i++){
            let mood=moods[Math.floor(Math.random()*moods.length)];
            aiEntries.push({
                author:['sejuta.badai','agak.koplak','strawberry.shortcake','cinnamon.girl','satria.bajahitam','move.on'][Math.floor(Math.random()*6)],
                mood:mood,
                content:contents[mood][Math.floor(Math.random()*contents[mood].length)],
                reactions:{
                    skull:Math.floor(Math.random()*30)+5,
                    cry:Math.floor(Math.random()*40)+10,
                    fire:Math.floor(Math.random()*20)+1,
                    upside:Math.floor(Math.random()*15)+2
                }
            });
        }
        
        let all=[...entries,...aiEntries];
        all.sort((a,b)=>new Date(b.created_at||Date.now())-new Date(a.created_at||Date.now()));
        renderSpills(all);
    }
    
    function renderSpills(all){
        let c=$('spillsList'),meta=$('feedMeta');
        if(!all||!all.length){c.innerHTML='<div class="empty-state">🍃 Belum ada spill</div>';meta.textContent='0 spill';return;}
        c.innerHTML=all.map((s,i)=>`
            <div class="spill-card">
                <div class="spill-header">
                    <span class="spill-author">@${s.author}</span>
                    <span class="spill-mood ${s.mood}">${s.mood.toUpperCase()}</span>
                </div>
                <div class="spill-content">${s.content}</div>
                <div class="spill-reactions">
                    ${['skull','cry','fire','upside'].map(r=>`
                        <button class="react-btn" onclick="reactToSpill(${i},'${r}')">
                            ${r==='skull'?'💀':r==='cry'?'😭':r==='fire'?'🔥':'🙃'}
                            <span class="react-count">${s.reactions[r]||0}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        `).join('');
        meta.textContent=all.length+' spill';
    }
    window.reactToSpill=(i,t)=>{toast(`➕ ${t}`);};
    
    // ============ INIT RADAR CHAT INPUT ============
    const initRadarChatInput = () => {
        const radarInput = $('radarChatInput');
        const radarSend = $('radarChatSend');
        if (!radarInput || !radarSend) return;
        
        radarSend.onclick = async () => {
            if (isTyping) {
                toast('Tunggu sampai pesan terkirim');
                return;
            }
            const msg = radarInput.value.trim();
            if (!msg || !currentPartner) return;
            radarInput.value = '';
            await sendM(msg, false);
        };
        
        radarInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !isTyping) {
                radarSend.click();
            }
        };
    };
    
    // ============ INIT CLOSE CHAT ============
    const initCloseChat = () => {
        const closeBtn = $('closeChatBtn');
        if (closeBtn) {
            closeBtn.onclick = closeChat;
        }
    };
    
    // ============ CLEANUP ON PAGE CLOSE ============
    window.addEventListener('beforeunload', async () => {
        if (isSearching) {
            await supabase
                .from('waiting_room')
                .delete()
                .eq('user_id', UID);
        }
        if (chatChannel) {
            await leaveChat();
        }
    });
    
    // ============ LOAD EVENT ============
    window.addEventListener('load', async () => {
        $('userNameDisplay').textContent = '@' + U;
        
        initRadar();
        initSettings();
        initWhisper();
        initNav();
        initRadarChatInput();
        initCloseChat();
        await loadSpills();
        
        // Sound toggle
        let soundOn=false,audioCtx=null;
        $('soundToggle').onclick=()=>{
            soundOn=!soundOn;
            $('soundToggle').textContent=soundOn?'🔊':'🔇';
            if(soundOn&&!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)();}
        };
        
        // Vibe buttons
        $('vibeFemaleBtn').addEventListener('click', (e) => {
            e.preventDefault();
            startVibe('heart');
        });
        $('vibeMaleBtn').addEventListener('click', (e) => {
            e.preventDefault();
            startVibe('spade');
        });
        
        // Fallback chat
        const send = $('sendButton');
        const inp = $('chatInput');
        if (send && inp) {
            send.onclick = async () => {
                if (isTyping) {
                    toast('Tunggu sampai pesan terkirim');
                    return;
                }
                const msg = inp.value.trim();
                if (!msg || !currentPartner) return;
                inp.value = '';
                await sendM(msg, false);
            };
            inp.onkeypress = (e) => {
                if (e.key === 'Enter' && !isTyping) send.click();
            };
        }
    });
})();
</script>
