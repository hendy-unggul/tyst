<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPILL — vibe radar</title>
    <link rel="stylesheet" href="/shared.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0a0a0a;--sf:#111;--bd:#222;--bd2:#333;--tx:#fff;--txs:#888;
            --ap:#ff3b6f;--as:#00e5ff;--aq:#ccff00;--purple:#9900ff;
            --font-display:'Arial Black',sans-serif;--font-mono:'Courier New',monospace;--font-body:Arial,sans-serif
        }
        body{background:var(--bg);color:var(--tx);font-family:var(--font-body);height:100vh;display:flex;flex-direction:column}
        .app{max-width:500px;margin:0 auto;width:100%;height:100vh;display:flex;flex-direction:column;background:var(--bg);border-left:2px solid var(--bd);border-right:2px solid var(--bd);position:relative}
        .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:2px solid var(--bd);background:var(--sf);position:relative}
        .logo{font-family:var(--font-display);font-size:34px}
        .logo .x{color:var(--ap);display:inline-block;animation:spin 4s infinite}
        @keyframes spin{95%{transform:rotate(180deg)}}
        .user-section{display:flex;align-items:center;gap:12px}
        .user-badge{font-family:var(--font-mono);background:#000;border:2px solid var(--bd);padding:4px 8px;color:var(--as);font-size:12px}
        .settings-btn{width:30px;height:30px;background:0 0;border:2px solid var(--bd2);color:var(--txs);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:.1s}
        .settings-btn:active{border-color:var(--as);color:var(--as)}
        .settings-dropdown{position:absolute;top:60px;right:18px;background:var(--sf);border:2px solid var(--bd);box-shadow:6px 6px 0 #000;z-index:100;min-width:180px;display:none}
        .settings-dropdown.show{display:block}
        .dropdown-item{padding:12px 16px;font-family:var(--font-mono);font-size:12px;color:var(--tx);cursor:pointer;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
        .dropdown-item:last-child{border-bottom:none}
        .dropdown-item:active{background:var(--bd)}
        .dropdown-item.language{display:flex;justify-content:space-between}
        .language-select{display:flex;gap:8px}
        .lang-option{padding:2px 8px;border:1px solid var(--bd2);color:var(--txs);cursor:pointer}
        .lang-option.active{background:var(--as);color:#000;border-color:var(--as)}
        .scroll{flex:1;overflow-y:auto;padding-bottom:62px;scrollbar-width:thin;scrollbar-color:var(--bd2) var(--bg)}
        .scroll::-webkit-scrollbar{width:4px}
        .scroll::-webkit-scrollbar-track{background:var(--bg)}
        .scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
        .radar-sect{background:var(--sf);border-bottom:2px solid var(--bd)}
        .radar-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
        .radar-label{font-family:var(--font-mono);font-size:10px;color:var(--as);display:flex;align-items:center;gap:8px}
        .online-badge{background:rgba(0,0,0,.3);padding:6px 12px;border:1px solid var(--bd);font-family:var(--font-mono);font-size:11px;display:flex;align-items:center;gap:6px}
        .online-icon{width:16px;height:16px;display:flex;align-items:center;justify-content:center}
        .online-icon::before{content:'❤️';color:var(--ap);animation:switchIcon 2s infinite}
        @keyframes switchIcon{
            0%,45%{content:'❤️';color:var(--ap)}
            50%,95%{content:'♠️';color:var(--as)}
            100%{content:'❤️';color:var(--ap)}
        }
        .radar-wrapper{padding:0 18px 16px}
        .radar-bezel{position:relative;padding:4px;background:var(--bg);border:2px solid var(--bd2);box-shadow:6px 6px 0 #000}
        .radar-cont{position:relative;width:100%;aspect-ratio:1;background:#020a02;overflow:hidden}
        .radar-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px),repeating-linear-gradient(90deg,rgba(0,229,255,.04) 0,transparent 1px,transparent 28px)}
        .radar-ring{position:absolute;inset:8%;border:1px solid rgba(0,229,255,.08);border-radius:50%}
        .radar-ring::before{content:'';position:absolute;border-radius:50%;border:1px solid rgba(0,229,255,.05);inset:28%}
        .radar-cross{position:absolute;inset:0;background:linear-gradient(90deg,transparent calc(50% - 1px),rgba(0,229,255,.06) calc(50% - 1px),rgba(0,229,255,.06) calc(50% + 1px),transparent calc(50% + 1px)),linear-gradient(0deg,transparent calc(50% - 1px),rgba(0,229,255,.06) calc(50% - 1px),rgba(0,229,255,.06) calc(50% + 1px),transparent calc(50% + 1px))}
        .radar-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:10;display:block}
        .radar-dots{position:absolute;inset:0;z-index:5}
        .radar-dot{position:absolute;width:6px;height:6px;transform:translate(-50%,-50%) rotate(45deg);background:var(--as);opacity:.3;transition:opacity .1s}
        .radar-dot.active{opacity:1;transform:translate(-50%,-50%) rotate(45deg) scale(2.5)}
        .radar-ctas{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px}
        .gender-row{display:flex;gap:10px;width:100%}
        .btn-gender{flex:1;padding:18px 8px;border:2px solid #000;font-family:var(--font-display);font-size:18px;letter-spacing:2px;cursor:pointer;box-shadow:5px 5px 0 #000;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.1s;background:var(--sf);color:var(--tx)}
        .btn-gender:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #000}
        .btn-heart{background:linear-gradient(145deg,var(--ap),#ff6b8b);color:#fff}
        .btn-spade{background:linear-gradient(145deg,var(--as),#4d7aff);color:#000}
        .gender-icon{font-size:38px}
        .gender-tag{font-family:var(--font-mono);font-size:9px;background:#000;color:var(--aq);padding:4px 8px}
        .btn-whisper{width:100%;padding:14px;background:0 0;border:2px dashed var(--bd2);font-family:var(--font-body);cursor:pointer;display:flex;justify-content:space-between;color:var(--txs);transition:.1s}
        .btn-whisper:active{border-color:var(--as);color:var(--as)}
        .filter-sect{padding:18px;border-bottom:2px solid var(--bd)}
        .filter-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .filter-title{font-family:var(--font-mono);font-size:9px;color:var(--txs);letter-spacing:3px}
        .match-pct{font-family:var(--font-display);font-size:26px;color:var(--ap);transition:color .3s}
        .vibe-slider{width:100%;height:4px;background:var(--bd2);-webkit-appearance:none;border-radius:2px}
        .vibe-slider::-webkit-slider-thumb{width:20px;height:20px;background:var(--ap);border:3px solid var(--bg);box-shadow:0 0 0 2px var(--ap),3px 3px 0 #000;cursor:pointer;-webkit-appearance:none;border-radius:50%;transition:.1s}
        .vibe-slider::-webkit-slider-thumb:active{transform:scale(.95)}
        .spills-sect{padding:18px}
        .sect-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-family:var(--font-mono);font-size:12px}
        .sect-title{font-weight:700;letter-spacing:2px}
        .spill-card{background:var(--sf);border:2px solid var(--bd2);margin-bottom:20px;padding:16px;box-shadow:4px 4px 0 #000;position:relative;transition:.2s}
        .spill-card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #000}
        .spill-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--font-mono);font-size:12px}
        .spill-author{color:var(--as)}
        .spill-mood{padding:4px 8px;font-size:10px;font-weight:700;letter-spacing:1px}
        .spill-mood.surviving{background:var(--ap);color:#fff}
        .spill-mood.thriving{background:var(--aq);color:#000}
        .spill-mood.chaotic{background:var(--as);color:#000}
        .spill-mood.doom{background:#9900ff;color:#fff}
        .spill-content{font-size:14px;line-height:1.6;color:var(--tx);font-family:var(--font-body);margin-bottom:12px}
        .spill-reactions{display:flex;gap:8px;border-top:2px solid var(--bd);padding-top:12px}
        .react-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;background:var(--bg);border:2px solid var(--bd2);color:var(--txs);cursor:pointer;font-family:var(--font-mono);font-size:14px;transition:.1s}
        .react-btn:active{background:var(--bd2);transform:translate(2px,2px)}
        .react-count{font-size:11px;font-weight:700}
        .empty-state{text-align:center;padding:40px;color:var(--txs);font-family:var(--font-mono);font-size:14px;border:2px dashed var(--bd2)}
        .bottom-nav{background:var(--sf);border-top:2px solid var(--bd);padding:8px 12px;width:100%;max-width:500px;z-index:50}
        .nav-container{display:flex;justify-content:space-between;gap:4px}
        .nav-item{font-family:var(--font-mono);font-size:12px;color:var(--txs);cursor:pointer;padding:10px 8px;transition:.1s;text-align:center;flex:1;border:1px solid transparent;user-select:none;text-decoration:none;display:block}
        .nav-item:active{background:var(--bd);transform:scale(.95)}
        .nav-item.active{color:var(--as);border-bottom:2px solid var(--as);background:rgba(0,229,255,.05)}
        .chat-room{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column}
        .chat-room.on{display:flex}
        .chat-head{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:2px solid var(--bd);background:var(--sf)}
        #partnerLabel{font-family:var(--font-mono);font-size:12px;color:var(--as);background:rgba(0,229,255,.1);padding:6px 14px;border:1px solid var(--bd)}
        .chat-timer{font-family:var(--font-display);font-size:22px;color:var(--aq);background:var(--bg);padding:8px 14px;border:2px solid var(--bd);box-shadow:3px 3px 0 #000}
        .chat-close{width:40px;height:40px;background:var(--bg);border:2px solid var(--bd);color:var(--txs);font-size:18px;cursor:pointer;box-shadow:3px 3px 0 #000;display:flex;align-items:center;justify-content:center}
        .chat-close:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
        .chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--bd2) var(--bg)}
        .chat-messages::-webkit-scrollbar{width:4px}
        .chat-messages::-webkit-scrollbar-track{background:var(--bg)}
        .chat-messages::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
        .message{max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.4;word-wrap:break-word;position:relative}
        .message.user{align-self:flex-end;background:var(--as);color:#000;border-bottom-right-radius:4px}
        .message.stranger{align-self:flex-start;background:var(--sf);color:var(--tx);border:1px solid var(--bd2);border-bottom-left-radius:4px}
        .typing-indicator{align-self:flex-start;color:var(--txs);font-style:italic;font-size:12px;padding:5px 10px;display:flex;align-items:center;gap:4px}
        .typing-dots{display:flex;gap:3px}
        .typing-dots span{width:4px;height:4px;background:var(--txs);border-radius:50%;animation:typingDot 1.4s infinite}
        .typing-dots span:nth-child(2){animation-delay:.2s}
        .typing-dots span:nth-child(3){animation-delay:.4s}
        @keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}
        .chat-input-wrap{display:flex;gap:10px;padding:12px 18px;border-top:2px solid var(--bd);background:var(--sf)}
        .chat-input{flex:1;padding:13px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);font-family:var(--font-body);outline:0;border-radius:8px;font-size:14px}
        .chat-input:focus{border-color:var(--as)}
        .chat-input::placeholder{color:var(--txs)}
        .chat-send{width:48px;height:48px;background:var(--ap);border:2px solid #000;color:#fff;font-size:20px;cursor:pointer;box-shadow:3px 3px 0 #000;border-radius:8px;display:flex;align-items:center;justify-content:center}
        .chat-send:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
        .chat-send.disabled{opacity:.3;pointer-events:none}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--tx);color:var(--bg);padding:12px 22px;z-index:2000;opacity:0;transition:.25s;border:2px solid #000;box-shadow:4px 4px 0 #000;border-radius:30px;font-size:14px;white-space:nowrap}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
        .toast.error{background:var(--ap);color:#fff}
        .whisper-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .whisper-overlay.show{display:flex}
        .whisper-box{background:var(--sf);border:3px solid var(--as);padding:25px;text-align:center;box-shadow:12px 12px 0 #000;max-width:350px;width:90%}
        .whisper-title{font-family:var(--font-display);font-size:24px;color:var(--as);margin-bottom:15px}
        .whisper-timer{font-family:var(--font-mono);font-size:12px;color:var(--txs);margin-bottom:15px}
        .whisper-input{width:100%;padding:15px;background:var(--bg);border:2px solid var(--bd2);color:var(--tx);font-family:var(--font-body);margin:15px 0;resize:none;min-height:100px}
        .whisper-input:focus{border-color:var(--as);outline:0}
        .whisper-actions{display:flex;gap:10px}
        .whisper-btn{flex:1;padding:12px;border:2px solid #000;font-family:var(--font-mono);cursor:pointer;box-shadow:3px 3px 0 #000;transition:.1s}
        .whisper-btn.send{background:var(--as);color:#000}
        .whisper-btn.cancel{background:0 0;color:var(--txs)}
        .whisper-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000}
        .whisper-message{background:var(--sf);border:2px solid var(--as);padding:15px;margin:10px 0;position:relative;animation:whisperGlow 2s infinite}
        @keyframes whisperGlow{0%,100%{box-shadow:0 0 5px var(--as)}50%{box-shadow:0 0 15px var(--as)}}
        .whisper-timer-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--as);animation:timerShrink 5s linear forwards}
        @keyframes timerShrink{from{width:100%}to{width:0%}}
        .waiting-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .waiting-box{background:var(--sf);border:3px solid var(--as);padding:30px;text-align:center;box-shadow:12px 12px 0 #000;max-width:300px;width:80%}
        .waiting-icon{font-size:48px;margin-bottom:16px;animation:pulse 1.5s infinite}
        .waiting-timer{width:100px;height:100px;border:4px solid var(--aq);border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:36px;color:var(--aq)}
        #cancelWaiting{background:0 0;border:2px solid var(--bd2);color:var(--txs);padding:14px 24px;margin-top:16px;cursor:pointer;width:100%;font-family:var(--font-mono);transition:.1s}
        #cancelWaiting:active{background:var(--bd2);color:var(--tx)}
        .scanning-overlay{display:none;position:fixed;inset:0;background:#000;z-index:2000;align-items:center;justify-content:center;font-family:var(--font-mono)}
        .scanning-overlay.show{display:flex}
        .scanning-box{text-align:center;width:100%;max-width:400px;padding:20px}
        .scanning-text{font-size:24px;font-weight:700;letter-spacing:4px;min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.8;color:var(--as);text-shadow:0 0 10px var(--as)}
        .scanning-progress{width:100%;height:2px;background:var(--bd2);margin-top:30px;position:relative;overflow:hidden}
        .scanning-bar{position:absolute;left:0;top:0;height:100%;width:0%;background:var(--as);box-shadow:0 0 20px var(--as);transition:width .1s linear}
        .scanning-timer{margin-top:20px;font-size:14px;color:var(--txs);letter-spacing:2px}
        @media (max-width:500px){
            .app{border-left:none;border-right:none}
            .bottom-nav{border-left:none;border-right:none}
            .toast{font-size:12px;padding:10px 18px}
            .nav-item{padding:8px 4px;font-size:11px}
            .scanning-text{font-size:20px}
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">SP<span class="x">✕</span>LL</div>
        <div class="user-section">
            <span class="user-badge" id="userNameDisplay">@loading...</span>
            <button class="settings-btn" id="settingsBtn">⋮</button>
        </div>
        <div class="settings-dropdown" id="settingsDropdown">
            <div class="dropdown-item" id="logoutBtn"><span>🚪</span> Logout</div>
            <div class="dropdown-item language">
                <span>🌐</span> Language
                <div class="language-select">
                    <span class="lang-option active" data-lang="id">ID</span>
                    <span class="lang-option" data-lang="en">EN</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="scroll">
        <div class="radar-sect">
            <div class="radar-header">
                <span class="radar-label">VIBE RADAR</span>
                <div class="online-badge">
                    <span class="online-icon"></span>
                    <span id="onlineCount">17 ONLINE</span>
                </div>
            </div>
            <div class="radar-wrapper">
                <div class="radar-bezel">
                    <div class="radar-cont" id="radarCont">
                        <div class="radar-grid"></div>
                        <div class="radar-ring"></div>
                        <div class="radar-cross"></div>
                        <canvas class="radar-canvas" id="radarCanvas"></canvas>
                        <div class="radar-dots" id="radarDots"></div>
                    </div>
                </div>
            </div>
            <div class="radar-ctas">
                <div class="gender-row">
                    <button class="btn-gender btn-heart" id="vibeFemaleBtn">
                        <span class="gender-icon">❤️</span><span>SOFT TALK</span><span class="gender-tag"></span>
                    </button>
                    <button class="btn-gender btn-spade" id="vibeMaleBtn">
                        <span class="gender-icon">♠️</span><span>HOT TAKE</span><span class="gender-tag"></span>
                    </button>
                </div>
                <button class="btn-whisper" id="whisperBtn">✦ WHISPERER <span>NEW</span></button>
            </div>
        </div>
        
        <div class="filter-sect">
            <div class="filter-top">
                <span class="filter-title">KESELARASAN</span>
                <span class="match-pct" id="vibePct">87%</span>
            </div>
            <input type="range" class="vibe-slider" id="vibeSlider" min="0" max="100" value="87">
        </div>
        
        <div class="spills-sect">
            <div class="sect-header">
                <div class="sect-title">SPILL TERKINI</div>
                <span id="feedMeta">0 spill</span>
            </div>
            <div id="spillsList"><div class="empty-state">🍃 MEMUAT SPILL...</div></div>
        </div>
    </div>
    
    <nav class="bottom-nav">
        <div class="nav-container">
            <a href="spill.html" class="nav-item active" data-page="spill">✕ SPILL</a>
            <a href="jejak.html" class="nav-item" data-page="jejak">✦ JEJAK</a>
            <a href="glitch.html" class="nav-item" data-page="glitch">⚡ GLITCH</a>
            <a href="cocomeo.html" class="nav-item" data-page="cocomeo">〜 COCOMEO</a>
        </div>
    </nav>
</div>

<div class="scanning-overlay" id="scanningOverlay">
    <div class="scanning-box">
        <div class="scanning-text" id="scanningText"></div>
        <div class="scanning-progress"><div class="scanning-bar" id="scanningBar"></div></div>
        <div class="scanning-timer" id="scanningTimer">0s</div>
    </div>
</div>

<div class="waiting-overlay" id="waitingOverlay">
    <div class="waiting-box">
        <div class="waiting-icon" id="waitingIcon">❤️</div>
        <div class="waiting-timer" id="waitingTimer">15</div>
        <button id="cancelWaiting">BATAL</button>
    </div>
</div>

<div class="whisper-overlay" id="whisperOverlay">
    <div class="whisper-box">
        <div class="whisper-title">✦ WHISPERER</div>
        <div class="whisper-timer">Kirim ke siapapun (ketik manual)</div>
        <input type="text" class="whisper-input" id="whisperTarget" placeholder="@username" maxlength="30">
        <textarea class="whisper-input" id="whisperMessage" placeholder="Tulis pesan rahasia..." maxlength="200" rows="3"></textarea>
        <div class="whisper-actions">
            <button class="whisper-btn cancel" id="whisperCancel">BATAL</button>
            <button class="whisper-btn send" id="whisperSend">KIRIM</button>
        </div>
    </div>
</div>

<div class="chat-room" id="chatRoom">
    <div class="chat-head">
        <span id="partnerLabel">STRANGER</span>
        <span class="chat-timer" id="chatTimer">15:00</span>
        <button class="chat-close" id="closeChatBtn">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
        <input type="text" class="chat-input" id="chatInput" placeholder="ketik pesan..." autocomplete="off">
        <button class="chat-send" id="sendButton">➤</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
    'use strict';

        window.location.href='index.html';return;

    const USERNAME=localStorage.getItem(KEYS.username),UID=localStorage.getItem(KEYS.uid);
    console.log(`[App] Welcome, ${USERNAME}`);
    
    // Config
    const SUPABASE_URL='https://fuovfrdicdhnlymnacpz.supabase.co';
    const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1b3ZmcmRpY2Robmx5bW5hY3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwMjYxMzEsImV4cCI6MjA4MjYwMjEzMX0.oX4fVTEIWiRG2NaNJJKOV8dTnSHWhicLVMIFzZUl1o0';
    
    // State
    let userEntries=[],aiEntries=[],allEntries=[],aiTimer,currentPartner=null,chatHistory=[],isTyping=false,currentLang='id',vibe=87;
    const AVAILABLE_NAMES=['beby.manis','chili.padi','pretty.sad','sejuta.badai','agak.koplak','strawberry.shortcake','cinnamon.girl','satria.bajahitam','malam.minggu','hujan.gerimis','kopi.pahit','luka.luka','senja.redup','kota.tua','patah.hati','move.on'];
    const nameCache=new Map();
    const getUsername=(uid)=>{
        if(!uid)return 'anonymous';
        if(nameCache.has(uid))return nameCache.get(uid);
        let h=0;for(let i=0;i<uid.length;i++)h=((h<<5)-h)+uid.charCodeAt(i),h|=0;
        const name=AVAILABLE_NAMES[Math.abs(h)%AVAILABLE_NAMES.length];
        nameCache.set(uid,name);return name;
    };
    
    // Helpers
    const $=id=>document.getElementById(id);
    const toast=(msg,err)=>{const t=$('toast');if(!t)return;t.textContent=msg;t.className='toast'+(err?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);};
    
    // Settings
    const initSettings=()=>{
        const btn=$('settingsBtn'),dd=$('settingsDropdown');
        if(btn&&dd){btn.onclick=e=>{e.stopPropagation();dd.classList.toggle('show');};document.addEventListener('click',e=>{if(!btn.contains(e.target)&&!dd.contains(e.target))dd.classList.remove('show');});}
        $('logoutBtn')?.addEventListener('click',()=>{
            localStorage.removeItem(KEYS.loggedIn);
            localStorage.removeItem('vibe_value');localStorage.removeItem('chat_history');
            toast('👋 Sampai jumpa!');setTimeout(()=>window.location.href='index.html',1000);
        });
        document.querySelectorAll('.lang-option').forEach(opt=>opt.addEventListener('click',function(){
            document.querySelectorAll('.lang-option').forEach(o=>o.classList.remove('active'));
            this.classList.add('active');currentLang=this.dataset.lang;toast(`🌐 Language: ${currentLang==='id'?'Indonesia':'English'}`);
        }));
    };
    
    // Whisper
    const initWhisper=()=>{
        const btn=$('whisperBtn'),ov=$('whisperOverlay'),cancel=$('whisperCancel'),send=$('whisperSend'),target=$('whisperTarget'),msg=$('whisperMessage');
        if(!btn||!ov)return;
        btn.onclick=()=>{ov.classList.add('show');target.value='';msg.value='';target.focus();};
        cancel.onclick=()=>ov.classList.remove('show');
        send.onclick=async()=>{
            const t=target.value.trim().replace('@',''),m=msg.value.trim();
            if(!t){toast('Masukkan username tujuan');return;}
            if(!m){toast('Pesan tidak boleh kosong');return;}
            ov.classList.remove('show');
            showLocalWhisper(`@${t}: ${m}`);
            try{
                const r=await fetch('/api/whisper',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:USERNAME,to:t,message:m})});
                if(!r.ok)throw new Error((await r.json()).error||'Gagal');
                toast(`✧ Whisper terkirim ke @${t}`);
            }catch(e){console.error(e);toast('Gagal mengirim whisper');}
        };
        msg.onkeypress=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send.click();}};
    };
    const showLocalWhisper=text=>{const cm=$('chatMessages');if(!cm)return;const d=document.createElement('div');d.className='whisper-message';d.innerHTML=`<div style="font-family:var(--font-mono);font-size:10px;color:var(--as);margin-bottom:5px;">✧ WHISPER TERKIRIM</div><div style="font-size:14px;">${text}</div><div class="whisper-timer-bar"></div>`;cm.appendChild(d);cm.scrollTop=cm.scrollHeight;setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.5s';setTimeout(()=>d.remove(),500);},5000);};
    const showIncomingWhisper=(sender,msg)=>{const cm=$('chatMessages');if(!cm)return;const d=document.createElement('div');d.className='whisper-message';d.innerHTML=`<div style="font-family:var(--font-mono);font-size:10px;color:var(--as);margin-bottom:5px;">✧ WHISPER DARI @${sender}</div><div style="font-size:14px;">${msg}</div><div class="whisper-timer-bar"></div>`;cm.appendChild(d);cm.scrollTop=cm.scrollHeight;setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity 0.5s';setTimeout(()=>d.remove(),500);},5000);};
    const startWhisperPolling=()=>setInterval(async()=>{try{const r=await fetch(`/api/whisper?user=${USERNAME}`);if(r.ok)(await r.json()).forEach(w=>showIncomingWhisper(w.sender,w.message));}catch(e){console.error(e);}},3000);
    
    // Nav
    const initNav=()=>{const p=window.location.pathname.split('/').pop()||'spill.html';document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.getAttribute('href')===p));};
    
    // Vibe slider
    const initSlider=()=>{const s=$('vibeSlider'),p=$('vibePct');if(!s||!p)return;const v=localStorage.getItem('vibe_value');if(v){s.value=v;p.textContent=v+'%';vibe=parseInt(v);}
    s.oninput=function(){const val=this.value;p.textContent=val+'%';p.style.color=val<30?'var(--ap)':val<70?'var(--aq)':'var(--as)';vibe=parseInt(val);};
    s.onchange=function(){localStorage.setItem('vibe_value',this.value);toast(`✨ Keselarasan ${this.value}%`);};};
    
    // Spills
    const renderSpills=()=>{const c=$('spillsList');if(!c)return;if(!allEntries.length){c.innerHTML='<div class="empty-state">🍃 Belum ada spill</div>';return;}
    c.innerHTML=allEntries.map((s,i)=>`<div class="spill-card"><div class="spill-header"><span class="spill-author">@${s.author}</span><span class="spill-mood ${s.mood}">${s.mood.toUpperCase()}</span></div><div class="spill-content">${s.content}</div><div class="spill-reactions">${['skull','cry','fire','upside'].map(r=>`<button class="react-btn" onclick="window.reactToSpill(${i},'${r}')">${r==='skull'?'💀':r==='cry'?'😭':r==='fire'?'🔥':'🙃'}<span class="react-count">${s.reactions[r]||0}</span></button>`).join('')}</div></div>`).join('');
    $('feedMeta')&&($('feedMeta').textContent=allEntries.length+' spill');};
    const combine=()=>{allEntries=[...userEntries,...aiEntries];allEntries.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));renderSpills();};
    const dummyUsers=()=>[
        {author:'beby.manis',mood:'chaotic',content:'hari ini nangis karena liat mantan bahagia',reactions:{skull:15,cry:30,fire:2,upside:5},created_at:new Date().toISOString()},
        {author:'chili.padi',mood:'thriving',content:'akhirnya sidang ACC, lulus 🥳🥳🥳',reactions:{skull:3,cry:2,fire:45,upside:8},created_at:new Date(Date.now()-3600000).toISOString()},
        {author:'pretty.sad',mood:'doom',content:'ga semangat ngapa-ngapain 😭😭😭',reactions:{skull:22,cry:35,fire:1,upside:4},created_at:new Date(Date.now()-7200000).toISOString()}
    ];
    const fetchEntries=async()=>{try{const r=await fetch(`${SUPABASE_URL}/rest/v1/entries?select=*&order=created_at.desc&limit=10`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});if(!r.ok)throw new Error();const d=await r.json();userEntries=d.length?d.map(e=>({author:e.username||getUsername(e.user_id),mood:e.mood||'chaotic',content:e.content||'...',reactions:e.reactions||{skull:0,cry:0,fire:0,upside:0},created_at:e.created_at})):dummyUsers();}catch(e){userEntries=dummyUsers();}combine();};
    const genAI=(c=6)=>{const a=['sejuta.badai','agak.koplak','strawberry.shortcake','cinnamon.girl','satria.bajahitam','move.on'];const m=['surviving','thriving','chaotic','doom'];const ct={surviving:['deadline skripsi makin deket 😮‍💨','capek banget hari ini 🥲'],thriving:['alhamdulillah hari ini cuan! 💰','sidang kelar nilai A'],chaotic:['client minta revisi jam 11 malem 🔥','hidup lagi kacau balau'],doom:['motor mogok, dompet tipis 🫠','6 bulan nganggur']};return Array(c).fill().map(()=>{const mood=m[Math.floor(Math.random()*m.length)];return{author:a[Math.floor(Math.random()*a.length)],mood,content:ct[mood][Math.floor(Math.random()*ct[mood].length)],reactions:{skull:Math.floor(Math.random()*30)+5,cry:Math.floor(Math.random()*40)+10,fire:Math.floor(Math.random()*20)+1,upside:Math.floor(Math.random()*15)+2},created_at:new Date(Date.now()-(7+Math.floor(Math.random()*23))*24*60*60*1000).toISOString()};});};
    const initAI=()=>{if(!aiEntries.length)aiEntries=genAI(6);combine();if(aiTimer)clearInterval(aiTimer);aiTimer=setInterval(()=>{console.log('[AI] Generating...');const n=genAI(1)[0];aiEntries=[n,...aiEntries.slice(0,5)];combine();},180000);};
    window.reactToSpill=(i,t)=>{if(allEntries[i]){allEntries[i].reactions[t]=(allEntries[i].reactions[t]||0)+1;renderSpills();toast(`➕ ${t}`);}};
    
    // Radar
    let rdots=[],needleA=0,needleO=0,phA=Math.random()*Math.PI*2,trail=new Float32Array(120),ptr=0,glow=new Map(),raf,rint;
    const initRadar=()=>{const cv=$('radarCanvas'),ct=$('radarCont');if(!cv||!ct)return;const rs=()=>{const r=ct.getBoundingClientRect();if(r.width>0&&r.height>0){cv.width=r.width;cv.height=r.height;}};rs();window.addEventListener('resize',rs);spawnDots();if(rint)clearInterval(rint);rint=setInterval(()=>{rdots.forEach(d=>{d.vx=d.vx*.88+(Math.random()-.5)*.3;d.vy=d.vy*.88+(Math.random()-.5)*.3;d.x=Math.max(9,Math.min(91,d.x+d.vx));d.y=Math.max(9,Math.min(91,d.y+d.vy));if(d.el){d.el.style.left=d.x+'%';d.el.style.top=d.y+'%';}});},100);needleA=Math.random()*Math.PI*2;trail.fill(needleA);radarLoop(cv);};
    const spawnDots=()=>{const c=$('radarDots');if(!c)return;c.innerHTML='';rdots=[];for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,d=12+Math.random()*70,x=50+Math.cos(a)*d/2,y=50+Math.sin(a)*d/2,dot=document.createElement('div');dot.className='radar-dot';dot.style.left=x+'%';dot.style.top=y+'%';c.appendChild(dot);rdots.push({el:dot,x,y,vx:0,vy:0,id:i});}};
    const radarLoop=cv=>{const ctx=cv.getContext('2d');const draw=()=>{const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=Math.min(cx,cy)*.88;if(!W||!H){raf=requestAnimationFrame(draw);return;}
    phA+=.007;needleO+=((60/4*Math.PI*2)/(60*60)*(1+Math.sin(phA)*.35)-needleO)*.028;needleA=(needleA+needleO)%(Math.PI*2);trail[ptr]=needleA;ptr=(ptr+1)%120;
    ctx.fillStyle='rgba(2,10,2,.18)';ctx.fillRect(0,0,W,H);
    for(let i=0;i<119;i++){const a=Math.pow(1-i/120,2.2)*.12;if(a<.002)break;const s=needleA-(i+1)*needleO,e=needleA-i*needleO;ctx.save();ctx.translate(cx,cy);ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,Math.min(s,e),Math.max(s,e));ctx.closePath();ctx.fillStyle=`rgba(0,229,255,${a})`;ctx.fill();ctx.restore();}
    ctx.save();ctx.translate(cx,cy);ctx.rotate(needleA);ctx.shadowColor='rgba(0,229,255,.95)';ctx.shadowBlur=12;const g=ctx.createLinearGradient(0,0,R,0);g.addColorStop(0,'rgba(0,229,255,1)');g.addColorStop(.8,'rgba(0,229,255,.4)');g.addColorStop(1,'rgba(0,229,255,0)');ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(R,0);ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=20;ctx.beginPath();ctx.rect(-4,-4,8,8);ctx.fillStyle='#00e5ff';ctx.fill();ctx.restore();
    rdots.forEach((d,i)=>{const px=d.x/100*W,py=d.y/100*H;let da=Math.atan2(py-cy,px-cx);if(da<0)da+=Math.PI*2;let diff=needleA-da;if(diff<0)diff+=Math.PI*2;const age=glow.get(i)??999;if(diff<.18&&age>30){glow.set(i,0);if(d.el){d.el.classList.add('active');setTimeout(()=>d.el?.classList.remove('active'),800);}}else glow.set(i,age+1);
    if(age<55){const t=age/55,ga=(1-t)*(1-t)*.9;if(ga<.01)return;const gr=ctx.createRadialGradient(px,py,0,px,py,16*(1-t)+3);gr.addColorStop(0,`rgba(0,229,255,${ga})`);gr.addColorStop(1,`rgba(0,229,255,0)`);ctx.beginPath();ctx.arc(px,py,16*(1-t)+3,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();}});
    raf=requestAnimationFrame(draw);};draw();};
    
    // DRAMATIC SCANNING - PERSIS CONTOH
    const showDramaticScanning=(gender,cb)=>{
        const ov=$('scanningOverlay'),txt=$('scanningText'),bar=$('scanningBar'),timer=$('scanningTimer');
        if(!ov||!txt||!bar||!timer){cb();return;}
        const seq=[
            {time:0,text:"finding strangers..."},
            {time:4,text:"most strangers here are just people"},
            {time:8,text:"some are ghosts"},
            {time:12,text:"and a few..."},
            {time:14,text:"are trouble"}
        ];
        ov.classList.add('show');
        let start=Date.now(),cur=0;
        const i=setInterval(()=>{
            const e=(Date.now()-start)/1000,p=Math.min(100,(e/15)*100);
            bar.style.width=p+'%';timer.textContent=Math.floor(e)+'s';
            while(cur<seq.length-1&&e>=seq[cur+1].time)cur++;
            if(cur<seq.length)txt.textContent=seq[cur].text;
            if(Math.random()<.1){txt.style.opacity='.5';setTimeout(()=>txt.style.opacity='1',50);}
            if(e>=15){clearInterval(i);ov.classList.remove('show');cb();}
        },100);
        ov.onclick=()=>{clearInterval(i);ov.classList.remove('show');cb();};
    };
    
    // Vibe check
    const startVibeCheck=gender=>{
        if(isTyping){toast('Tunggu sampai pesan terkirim');return;}
        showDramaticScanning(gender,()=>{
            const ov=$('waitingOverlay'),icon=$('waitingIcon'),timer=$('waitingTimer');
            if(!ov||!icon||!timer)return;
            icon.textContent=gender==='heart'?'❤️':'♠️';ov.style.display='flex';
            let sec=15;timer.textContent=sec;
            const t=setInterval(()=>{sec--;timer.textContent=sec;if(sec<=0){clearInterval(t);clearInterval(chk);ov.style.display='none';if(!found){const list=(gender==='heart'?['beby.manis','pretty.sad','strawberry.shortcake','cinnamon.girl','move.on']:['agak.koplak','bang.juned','chili.padi','sejuta.badai','satria.bajahitam']);openChat(list[Math.floor(Math.random()*list.length)]);}}},1000);
            const chk=setInterval(()=>{},2000);
            let found=false;
            $('cancelWaiting').onclick=()=>{clearInterval(t);clearInterval(chk);ov.style.display='none';};
        });
    };
    
    // Chat
    const openChat=name=>{const cr=$('chatRoom'),pl=$('partnerLabel'),cm=$('chatMessages'),ct=$('chatTimer');if(!cr||!pl||!cm)return;pl.textContent='STRANGER';if(ct)ct.textContent='15:00';cm.innerHTML='';cr.classList.add('on');currentPartner=name;chatHistory=[];setTimeout(()=>sendMessage('',true),500);};
    const addMessage=(s,t)=>{const m=$('chatMessages');if(!m)return;const d=document.createElement('div');d.className=`message ${s}`;d.textContent=t;m.appendChild(d);m.scrollTop=m.scrollHeight;};
    const showTyping=()=>{const m=$('chatMessages');if(!m)return;const i=document.createElement('div');i.className='typing-indicator';i.id='typingIndicator';i.innerHTML='Stranger mengetik <span class="typing-dots"><span></span><span></span><span></span></span>';m.appendChild(i);m.scrollTop=m.scrollHeight;};
    const hideTyping=()=>{const i=$('typingIndicator');if(i)i.remove();};
    const sendMessage=async(msg,first)=>{
        if(!currentPartner)return;
        if(!first)addMessage('user',msg);
        showTyping();isTyping=true;
        try{const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg||'hai',characterName:currentPartner,lastMessages:chatHistory})});if(!r.ok)throw new Error();const d=await r.json();if(msg)chatHistory.push({role:'assistant',content:d.reply});hideTyping();isTyping=false;await typeMessage('stranger',d.reply,d.typing);}catch(e){hideTyping();isTyping=false;addMessage('stranger','😅');}
    };
    const typeMessage=async(s,full,info)=>{const m=$('chatMessages');if(!m)return;const d=document.createElement('div');d.className=`message ${s}`;m.appendChild(d);const words=full.split(' ');let txt='',wi=0,ci=0;return new Promise(r=>{const n=()=>{if(wi>=words.length){r();return;}if(ci<words[wi].length){txt+=words[wi][ci];d.textContent=txt+(wi<words.length-1?' ':'');ci++;setTimeout(n,info?.speed||80);}else{wi++;ci=0;if(wi<words.length){txt+=' ';setTimeout(n,info?.wordPause||150);}else{d.textContent=full;setTimeout(r,300);}}};setTimeout(n,info?.initialDelay||500);});};
    
    // Init
    window.addEventListener('load',async()=>{
        $('userNameDisplay')&&($('userNameDisplay').textContent='@'+USERNAME);
        const o=$('onlineCount');if(o){o.textContent=(Math.floor(Math.random()*20)+10)+' ONLINE';}
        setTimeout(initRadar,100);
        initSettings();initWhisper();initNav();initSlider();
        await fetchEntries();initAI();startWhisperPolling();
        
        $('vibeFemaleBtn')?.addEventListener('click',e=>{e.preventDefault();startVibeCheck('heart');});
        $('vibeMaleBtn')?.addEventListener('click',e=>{e.preventDefault();startVibeCheck('spade');});
        $('closeChatBtn')?.addEventListener('click',()=>{$('chatRoom').classList.remove('on');chatHistory=[];currentPartner=null;isTyping=false;});
        const send=$('sendButton'),inp=$('chatInput');
        if(send&&inp){
            send.onclick=async()=>{if(isTyping){toast('Tunggu sampai pesan terkirim');return;}const m=inp.value.trim();if(!m||!currentPartner)return;inp.value='';await sendMessage(m);};
            inp.onkeypress=e=>{if(e.key==='Enter'&&!isTyping)send.click();};
        }
        document.querySelectorAll('button').forEach(b=>b.addEventListener('touchstart',e=>e.preventDefault(),{passive:false}));
    });
    
    window.debug={userEntries:()=>userEntries,aiEntries:()=>aiEntries,allEntries:()=>allEntries};
})();
</script>
